<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBD Technologies — Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c0c14;color:#e0e0e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh;}

/* Header */
.header{background:#0c0c14;padding:8px 12px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px;height:48px;z-index:10;}
.header-title{font-size:17px;font-weight:700;color:#f59e0b;white-space:nowrap;padding-left:8px;}
.header input[type="text"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 10px;border-radius:4px;font-size:13px;font-family:inherit;width:100px;font-weight:600;}
.header input[type="text"]:focus{border-color:#f59e0b;outline:none;}
.header input[type="date"]{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit;}
.header select,.header input[type="number"]{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit;}
.header select{width:52px;}
.header input[type="number"]{width:82px;}
/* Divider */
.hdr-sep{width:1px;height:24px;background:#334155;flex-shrink:0;}
/* Filter group: label + input pair */
.filter-group{display:flex;align-items:center;gap:4px;}
.filter-group .flbl{font-size:11px;color:#888;cursor:pointer;padding:4px 8px;border:1px solid #334155;border-radius:4px;background:#1e293b;font-weight:600;white-space:nowrap;font-family:inherit;}
.filter-group .flbl:hover{color:#ccc;}
.filter-group .flbl.active{background:#f59e0b22;color:#f59e0b;border-color:#f59e0b66;}
.filter-group input[type="number"]{opacity:0.4;pointer-events:none;}
.filter-group.on input[type="number"]{opacity:1;pointer-events:auto;}
.sweep-controls{display:flex;align-items:center;gap:8px;}
.sweep-controls.off .filter-group{opacity:0.3;pointer-events:none;}

/* Layout */
.main{display:flex;height:calc(100vh - 48px);}
.left-panel{width:280px;min-width:280px;background:#0a0a12;border-right:1px solid #1e1e2e;padding:12px;overflow-y:hidden;display:flex;flex-direction:column;transition:width 0.2s,min-width 0.2s,padding 0.2s;}
.left-panel.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border-right:none;}
.chart-area{flex:1;position:relative;overflow:hidden;}
#chartContainer{width:100%;height:100%;position:relative;}
#bubbleCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
#tooltipDiv{position:absolute;display:none;background:rgba(0,0,0,0.85);border:1px solid #334155;border-radius:4px;padding:6px 10px;font-size:11px;color:#e0e0e8;pointer-events:none;z-index:10;white-space:nowrap;}

/* Left panel sections */
.panel-section{margin-bottom:12px;}
.panel-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}

/* Watchlist dropdown */
#watchlistSelect{width:100%;background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:6px 10px;border-radius:4px;font-size:12px;font-family:inherit;margin-bottom:12px;}

/* Ticker list — fills available space, scrollable */
.ticker-list{flex:1;min-height:80px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.ticker-list::-webkit-scrollbar{width:6px;}
.ticker-list::-webkit-scrollbar-track{background:#0a0a12;}
.ticker-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.ticker-list-item{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;font-size:12px;}
.ticker-list-item:hover{background:#14141e;}
.ticker-list-item.active{background:#f59e0b15;border-left:2px solid #f59e0b;}
.ticker-list-item .tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ticker-list-item .tl-ticker{font-weight:600;min-width:48px;}
.ticker-list-item .tl-price{color:#888;margin-left:auto;font-size:11px;font-family:'SF Mono',monospace;}
.ticker-list-item .tl-change{font-size:11px;font-weight:600;min-width:52px;text-align:right;font-family:'SF Mono',monospace;}
.tl-change.pos{color:#10b981;}
.tl-change.neg{color:#ef4444;}

/* Overlay checkboxes section */
.overlay-section{margin-top:8px;margin-bottom:8px;}
.ticker-group-hdr{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;margin-top:6px;}
.ticker-group-hdr:first-child{margin-top:0;}
.ticker-group-hdr input{accent-color:#f59e0b;}
.ticker-group-hdr span{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.ticker-group-hdr:hover span{color:#ccc;}
.ticker-row{display:flex;align-items:center;gap:8px;padding:4px 0 4px 8px;cursor:pointer;}
.ticker-row:hover{background:#14141e;border-radius:4px;}
.ticker-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ticker-label{font-size:12px;font-weight:600;}
.ticker-check{accent-color:#f59e0b;}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
.stat-val{color:#f59e0b;font-weight:600;}

/* Buttons */
.ctrl-btn{background:#1e293b;color:#e2e8f0;border:1px solid #334155;padding:6px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;width:100%;}
.ctrl-btn:hover{background:#334155;}
.ctrl-btn.active{background:#f59e0b22;color:#f59e0b;border-color:#f59e0b66;}

/* Segmented control */
.seg-ctrl{display:inline-flex;border:1px solid #334155;border-radius:4px;overflow:hidden;}
.seg-ctrl button{background:#1e293b;color:#888;border:none;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;border-right:1px solid #334155;font-weight:600;}
.seg-ctrl button:last-child{border-right:none;}
.seg-ctrl button:hover{color:#ccc;}
.seg-ctrl button.active{background:#f59e0b22;color:#f59e0b;}
.collapse-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:#1e293b;border:1px solid #334155;border-left:none;color:#888;padding:8px 4px;cursor:pointer;border-radius:0 4px 4px 0;z-index:6;font-size:10px;}
.collapse-btn:hover{color:#f59e0b;}

/* Sweep feed */
.feed{margin-top:8px;flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.feed::-webkit-scrollbar{width:6px;}
.feed::-webkit-scrollbar-track{background:#0a0a12;}
.feed::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.feed::-webkit-scrollbar-thumb:hover{background:#555;}
.feed-item{font-size:11px;padding:4px 0;border-bottom:1px solid #1a1a26;display:flex;gap:6px;}
.feed-time{color:#555;min-width:55px;}
.feed-ticker{font-weight:600;min-width:32px;}
.feed-notional{color:#f59e0b;margin-left:auto;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Chart</div>
  <input type="text" id="tickerInput" placeholder="Ticker..." spellcheck="false">
  <div class="hdr-sep"></div>
  <button class="ctrl-btn" id="btnAutoRefresh" onclick="toggleAutoRefresh()" style="width:auto;padding:5px 10px;font-size:11px;">Live</button>
  <div class="hdr-sep"></div>
  <div class="seg-ctrl" id="candleIntervalCtrl">
    <button class="active" onclick="setCandleInterval(1,this)">1m</button>
    <button onclick="setCandleInterval(5,this)">5m</button>
    <button onclick="setCandleInterval(60,this)">1h</button>
    <button onclick="setCandleInterval(240,this)">4h</button>
    <button onclick="setCandleInterval(1440,this)">1D</button>
    <button onclick="setCandleInterval(2880,this)">2D</button>
    <button onclick="setCandleInterval(10080,this)">W</button>
    <button onclick="setCandleInterval(43200,this)">M</button>
    <button onclick="setCandleInterval(129600,this)">3M</button>
  </div>
  <div class="hdr-sep"></div>
  <input type="date" id="dateInput">
  <div class="hdr-sep"></div>
  <div class="sweep-controls" id="sweepControls">
    <button class="ctrl-btn active" id="btnSweepToggle" onclick="toggleSweepOverlay()" style="width:auto;padding:5px 10px;font-size:11px;">DP Sweeps</button>
    <div class="filter-group" id="fgNotional">
      <button class="flbl" onclick="toggleFilter('notional')">Min $</button>
      <input type="number" id="minNotional" value="500000" step="100000" min="0">
    </div>
    <div class="filter-group on" id="fgPercentile">
      <button class="flbl active" onclick="toggleFilter('percentile')">Percentile</button>
      <input type="number" id="minPercentile" value="85" step="5" min="0" max="99">
    </div>
  </div>
  <div class="hdr-sep"></div>
  <select id="presetSelect" style="width:120px;" onchange="loadPreset()">
    <option value="">Presets...</option>
  </select>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;" onclick="savePreset()">Save</button>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;color:#ef4444;" onclick="deletePreset()">Del</button>
</div>

<div class="main">
  <div class="left-panel" id="leftPanel">
    <div class="panel-section" style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <select id="watchlistSelect" onchange="onWatchlistChange()">
        <option value="">-- Select Watchlist --</option>
      </select>
      <div class="ticker-list" id="tickerListBox">
        <!-- Populated by JS -->
      </div>
    </div>
    <div class="overlay-section" id="overlaySection" style="display:none;">
      <div class="panel-label">Overlay Tickers</div>
      <div id="overlayList">
        <!-- Group checkboxes for index watchlists -->
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Stats</div>
      <div id="statsBox">
        <div class="stat-row"><span>Sweeps</span><span class="stat-val" id="statSweeps">0</span></div>
        <div class="stat-row"><span>Total $</span><span class="stat-val" id="statNotional">$0</span></div>
        <div class="stat-row"><span>Largest</span><span class="stat-val" id="statLargest">$0</span></div>
      </div>
    </div>
    <div class="panel-section" style="display:flex;flex-direction:column;min-height:0;max-height:200px;">
      <div class="panel-label">Recent Sweeps</div>
      <div class="feed" id="sweepFeed">
        <div style="color:#555;font-size:11px;">No data yet</div>
      </div>
    </div>
  </div>
  <div class="chart-area">
    <button class="collapse-btn" id="collapseBtn" onclick="togglePanel()">&#x25C0;</button>
    <div id="chartContainer"></div>
    <canvas id="bubbleCanvas"></canvas>
    <div id="tooltipDiv"></div>
  </div>
</div>

<script>
// ====================================================================
// WATCHLIST CONFIG
// ====================================================================
var WATCHLIST_CONFIG = {
  SPX: {
    ref: 'SPY',
    groups: [
      {name: 'Underlying', on: true, tickers: [
        {ticker: 'SPY',  color: 'rgba(59,130,246,0.55)',  stroke: '#3b82f6', label: 'SPY',  on: true, isRef: true},
        {ticker: 'VOO',  color: 'rgba(234,179,8,0.55)',   stroke: '#eab308', label: 'VOO',  on: true},
        {ticker: 'IVV',  color: 'rgba(16,185,129,0.55)',  stroke: '#10b981', label: 'IVV',  on: true},
        {ticker: 'SPLG', color: 'rgba(139,92,246,0.55)',  stroke: '#8b5cf6', label: 'SPLG', on: true},
        {ticker: 'RSP',  color: 'rgba(6,182,212,0.55)',   stroke: '#06b6d4', label: 'RSP',  on: true},
      ]},
      {name: 'Leveraged', on: true, tickers: [
        {ticker: 'UPRO', color: 'rgba(239,68,68,0.55)',   stroke: '#ef4444', label: 'UPRO', on: true},
        {ticker: 'SPXL', color: 'rgba(249,115,22,0.55)',  stroke: '#f97316', label: 'SPXL', on: true},
        {ticker: 'SSO',  color: 'rgba(236,72,153,0.55)',  stroke: '#ec4899', label: 'SSO',  on: true},
        {ticker: 'SDS',  color: 'rgba(220,38,38,0.55)',   stroke: '#dc2626', label: 'SDS',  on: true},
        {ticker: 'SH',   color: 'rgba(107,114,128,0.55)', stroke: '#6b7280', label: 'SH',   on: true},
        {ticker: 'SPDN', color: 'rgba(148,163,184,0.55)', stroke: '#94a3b8', label: 'SPDN', on: true},
        {ticker: 'SPXS', color: 'rgba(156,163,175,0.55)', stroke: '#9ca3af', label: 'SPXS', on: true},
        {ticker: 'SPXU', color: 'rgba(75,85,99,0.55)',    stroke: '#4b5563', label: 'SPXU', on: true},
      ]},
    ]
  },
  NDX: {
    ref: 'QQQ',
    groups: [
      {name: 'Underlying', on: true, tickers: [
        {ticker: 'QQQ',  color: 'rgba(59,130,246,0.55)',  stroke: '#3b82f6', label: 'QQQ',  on: true, isRef: true},
        {ticker: 'QQQM', color: 'rgba(234,179,8,0.55)',   stroke: '#eab308', label: 'QQQM', on: true},
      ]},
      {name: 'Leveraged', on: true, tickers: [
        {ticker: 'TQQQ', color: 'rgba(239,68,68,0.55)',   stroke: '#ef4444', label: 'TQQQ', on: true},
        {ticker: 'QLD',  color: 'rgba(249,115,22,0.55)',  stroke: '#f97316', label: 'QLD',  on: true},
        {ticker: 'SQQQ', color: 'rgba(107,114,128,0.55)', stroke: '#6b7280', label: 'SQQQ', on: true},
        {ticker: 'PSQ',  color: 'rgba(156,163,175,0.55)', stroke: '#9ca3af', label: 'PSQ',  on: true},
        {ticker: 'QID',  color: 'rgba(75,85,99,0.55)',    stroke: '#4b5563', label: 'QID',  on: true},
      ]},
    ]
  },
  RTY: {
    ref: 'IWM',
    groups: [
      {name: 'Underlying', on: true, tickers: [
        {ticker: 'IWM',  color: 'rgba(59,130,246,0.55)',  stroke: '#3b82f6', label: 'IWM',  on: true, isRef: true},
        {ticker: 'VTWO', color: 'rgba(234,179,8,0.55)',   stroke: '#eab308', label: 'VTWO', on: true},
      ]},
      {name: 'Leveraged', on: true, tickers: [
        {ticker: 'TNA',  color: 'rgba(239,68,68,0.55)',   stroke: '#ef4444', label: 'TNA',  on: true},
        {ticker: 'UWM',  color: 'rgba(249,115,22,0.55)',  stroke: '#f97316', label: 'UWM',  on: true},
        {ticker: 'TZA',  color: 'rgba(107,114,128,0.55)', stroke: '#6b7280', label: 'TZA',  on: true},
        {ticker: 'RWM',  color: 'rgba(156,163,175,0.55)', stroke: '#9ca3af', label: 'RWM',  on: true},
        {ticker: 'SRTY', color: 'rgba(75,85,99,0.55)',    stroke: '#4b5563', label: 'SRTY', on: true},
      ]},
    ]
  },
  Priority: {
    ref: null,
    tickers: [
      {ticker: 'AAPL', color: 'rgba(59,130,246,0.55)',  stroke: '#3b82f6', label: 'AAPL', on: true},
      {ticker: 'NVDA', color: 'rgba(16,185,129,0.55)',  stroke: '#10b981', label: 'NVDA', on: true},
      {ticker: 'TSLA', color: 'rgba(239,68,68,0.55)',   stroke: '#ef4444', label: 'TSLA', on: true},
      {ticker: 'AMZN', color: 'rgba(234,179,8,0.55)',   stroke: '#eab308', label: 'AMZN', on: true},
      {ticker: 'MSFT', color: 'rgba(139,92,246,0.55)',  stroke: '#8b5cf6', label: 'MSFT', on: true},
      {ticker: 'META', color: 'rgba(6,182,212,0.55)',   stroke: '#06b6d4', label: 'META', on: true},
      {ticker: 'GOOG', color: 'rgba(249,115,22,0.55)',  stroke: '#f97316', label: 'GOOG', on: true},
      {ticker: 'AMD',  color: 'rgba(236,72,153,0.55)',  stroke: '#ec4899', label: 'AMD',  on: true},
      {ticker: 'UBER', color: 'rgba(168,85,247,0.55)',  stroke: '#a855f7', label: 'UBER', on: true},
      {ticker: 'COIN', color: 'rgba(20,184,166,0.55)',  stroke: '#14b8a6', label: 'COIN', on: true},
    ]
  }
};

// ====================================================================
// STATE
// ====================================================================
var _mode = 'watchlist';          // 'single' | 'watchlist'
var _activeTicker = 'SPY';       // ticker whose candles are displayed
var _activeWatchlist = 'SPX';    // current watchlist key
var _sweepOverlayOn = true;      // DP Sweeps toggle

// Overlay state (for index watchlists)
var _overlayGroups = [];         // current groups array (from WATCHLIST_CONFIG)
var _overlayTickers = [];        // flat array of overlay ticker objects

var _candleInterval = 1;
var INTERVAL_DAYS = {1:10, 5:60, 60:504, 240:504, 1440:1260, 2880:2520, 10080:2520, 43200:3780, 129600:3780};

var _chart = null;
var _candleSeries = null;
var _canvas = null;
var _ctx = null;
var _sweeps = [];
var _allSweeps = [];
var _autoRefresh = false;
var _sweepTimer = null;
var _candleTimer = null;
var _candles = [];
var _initialLoad = true;
var _loading = false;
var _tickerPrices = {};  // {ticker: {price, change, changePct}}

// ====================================================================
// INIT
// ====================================================================
(function init(){
  var today = new Date();
  document.getElementById('dateInput').value = today.toISOString().slice(0,10);

  // Populate watchlist dropdown
  var sel = document.getElementById('watchlistSelect');
  Object.keys(WATCHLIST_CONFIG).forEach(function(key){
    var opt = document.createElement('option');
    opt.value = key;
    opt.textContent = key;
    sel.appendChild(opt);
  });
  sel.value = _activeWatchlist;

  // Ticker input — Enter key
  var tickerInput = document.getElementById('tickerInput');
  tickerInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      var val = tickerInput.value.trim().toUpperCase();
      if(val){
        setActiveTicker(val, 'input');
      }
    }
  });

  // Date change — smart interval selection
  document.getElementById('dateInput').addEventListener('change', function(){
    var picked = new Date(document.getElementById('dateInput').value);
    var now = new Date();
    var diffDays = Math.round((now - picked) / 86400000);
    var bestInterval = _candleInterval;
    if(diffDays > 504) bestInterval = 1440;
    else if(diffDays > 60) bestInterval = 60;
    else if(diffDays > 10) bestInterval = 5;
    if(bestInterval !== _candleInterval){
      _candleInterval = bestInterval;
      _syncIntervalButtons();
    }
    loadAll(true);
  });
  document.getElementById('minNotional').addEventListener('change', function(){ applyClientFilter(); });
  document.getElementById('minPercentile').addEventListener('change', function(){ applyClientFilter(); });

  // Build initial watchlist view
  buildWatchlistView();

  // Init chart
  initChart();
  loadAll(true);
})();

// ====================================================================
// CHART
// ====================================================================
function initChart(){
  var container = document.getElementById('chartContainer');
  _chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: {background:{type:'solid',color:'#0c0c14'}, textColor:'#888', fontSize:11},
    grid: {vertLines:{color:'#1a1a26'}, horzLines:{color:'#1a1a26'}},
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#f59e0b33',width:1,style:3},
      horzLine:{color:'#f59e0b33',width:1,style:3},
    },
    timeScale: {borderColor:'#1e1e2e', timeVisible:true, secondsVisible:false},
    rightPriceScale: {borderColor:'#1e1e2e'},
  });

  _candleSeries = _chart.addCandlestickSeries({
    upColor:'transparent', downColor:'#b22833',
    borderUpColor:'#056656', borderDownColor:'#b22833',
    wickUpColor:'#056656', wickDownColor:'#b22833',
  });

  _canvas = document.getElementById('bubbleCanvas');
  _ctx = _canvas.getContext('2d');
  resizeCanvas();

  _chart.timeScale().subscribeVisibleTimeRangeChange(drawBubbles);

  window.addEventListener('resize', function(){
    _chart.resize(container.clientWidth, container.clientHeight);
    resizeCanvas();
    drawBubbles();
  });

  container.addEventListener('mousemove', onMouseMove);
  container.addEventListener('mouseleave', function(){
    document.getElementById('tooltipDiv').style.display = 'none';
  });
}

function resizeCanvas(){
  var container = document.getElementById('chartContainer');
  _canvas.width = container.clientWidth;
  _canvas.height = container.clientHeight;
}

// ====================================================================
// MODE & TICKER MANAGEMENT
// ====================================================================
function setActiveTicker(ticker, source){
  var tickerChanged = (_activeTicker !== ticker);
  _activeTicker = ticker;

  if(source === 'input'){
    // Single ticker mode — clear watchlist selection
    _mode = 'single';
    _activeWatchlist = null;
    _overlayGroups = [];
    _overlayTickers = [];
    document.getElementById('watchlistSelect').value = '';
    document.getElementById('overlaySection').style.display = 'none';
    document.getElementById('tickerInput').value = ticker;
    highlightTickerList(null);
  } else if(source === 'watchlist-click'){
    document.getElementById('tickerInput').value = ticker;
    highlightTickerList(ticker);
  }

  // Clear old candles so chart resets price scale to new ticker's range
  if(tickerChanged){
    _candles = [];
    _candleSeries.setData([]);
    _allSweeps = [];
    _sweeps = [];
    if(_ctx) _ctx.clearRect(0, 0, _canvas.width, _canvas.height);
  }

  loadAll(true);
}

function buildWatchlistView(){
  var key = _activeWatchlist;
  var cfg = key ? WATCHLIST_CONFIG[key] : null;
  var listBox = document.getElementById('tickerListBox');
  var overlaySection = document.getElementById('overlaySection');
  var overlayList = document.getElementById('overlayList');
  listBox.innerHTML = '';
  overlayList.innerHTML = '';

  if(!cfg){
    overlaySection.style.display = 'none';
    return;
  }

  if(cfg.groups){
    // Index watchlist (SPX/NDX/RTY) — has groups with ref ticker
    _activeTicker = cfg.ref;
    document.getElementById('tickerInput').value = cfg.ref;

    // Build flat ticker list from all groups for the list display
    var allTickers = [];
    cfg.groups.forEach(function(g){ g.tickers.forEach(function(t){ allTickers.push(t); }); });

    allTickers.forEach(function(t){
      var item = document.createElement('div');
      item.className = 'ticker-list-item' + (t.ticker === _activeTicker ? ' active' : '');
      item.setAttribute('data-ticker', t.ticker);
      item.innerHTML = '<div class="tl-dot" style="background:'+t.stroke+';"></div>'
        + '<span class="tl-ticker">'+t.label+'</span>'
        + '<span class="tl-price" id="price_'+t.ticker+'">—</span>'
        + '<span class="tl-change" id="change_'+t.ticker+'">—</span>';
      listBox.appendChild(item);
    });

    // Build overlay checkboxes
    _overlayGroups = cfg.groups;
    _overlayTickers = [];
    cfg.groups.forEach(function(g){ g.tickers.forEach(function(t){ t.group = g.name; _overlayTickers.push(t); }); });

    cfg.groups.forEach(function(g, gi){
      var hdr = document.createElement('div');
      hdr.className = 'ticker-group-hdr';
      hdr.innerHTML = '<input type="checkbox" '+(g.on?'checked':'')+' onchange="onGroupToggle('+gi+',this)">'
        + '<span>'+g.name+'</span>';
      overlayList.appendChild(hdr);
      g.tickers.forEach(function(t){
        var row = document.createElement('div');
        row.className = 'ticker-row';
        row.setAttribute('data-group', gi);
        row.innerHTML = '<input type="checkbox" class="ticker-check" data-ticker="'+t.ticker+'" '+(t.on?'checked':'')+' onchange="onTickerToggle(this)">'
          + '<div class="ticker-dot" style="background:'+t.stroke+';"></div>'
          + '<span class="ticker-label">'+t.label+'</span>';
        overlayList.appendChild(row);
      });
    });
    overlaySection.style.display = '';

    // Fetch prices for all tickers
    fetchTickerPrices(allTickers.map(function(t){ return t.ticker; }));

  } else if(cfg.tickers){
    // Flat watchlist (Priority) — no ref ticker, no overlay
    _activeTicker = cfg.tickers[0].ticker;
    document.getElementById('tickerInput').value = _activeTicker;
    _overlayGroups = [];
    _overlayTickers = [];

    cfg.tickers.forEach(function(t){
      var item = document.createElement('div');
      item.className = 'ticker-list-item' + (t.ticker === _activeTicker ? ' active' : '');
      item.setAttribute('data-ticker', t.ticker);
      item.onclick = function(){ setActiveTicker(t.ticker, 'watchlist-click'); };
      item.innerHTML = '<div class="tl-dot" style="background:'+t.stroke+';"></div>'
        + '<span class="tl-ticker">'+t.label+'</span>'
        + '<span class="tl-price" id="price_'+t.ticker+'">—</span>'
        + '<span class="tl-change" id="change_'+t.ticker+'">—</span>';
      listBox.appendChild(item);
    });
    overlaySection.style.display = 'none';

    // Fetch prices
    fetchTickerPrices(cfg.tickers.map(function(t){ return t.ticker; }));
  }
}

function highlightTickerList(ticker){
  var items = document.querySelectorAll('.ticker-list-item');
  items.forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-ticker') === ticker);
  });
}

function onWatchlistChange(){
  var sel = document.getElementById('watchlistSelect');
  var key = sel.value;
  if(!key){
    _activeWatchlist = null;
    _mode = 'single';
    return;
  }
  _activeWatchlist = key;
  _mode = 'watchlist';
  buildWatchlistView();
  loadAll(true);
}

// ====================================================================
// TICKER PRICES (for left panel list)
// ====================================================================
function fetchTickerPrices(tickers){
  // Fetch last daily candle for each ticker to get price + change
  tickers.forEach(function(ticker){
    fetch('/api/0dte/candles?ticker='+ticker+'&date='+getDate()+'&days=2&interval=1440')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var candles = d.candles || [];
        if(candles.length === 0) return;
        var last = candles[candles.length - 1];
        var prev = candles.length > 1 ? candles[candles.length - 2] : null;
        var price = last.close;
        var change = prev ? (price - prev.close) : 0;
        var changePct = prev ? ((change / prev.close) * 100) : 0;
        _tickerPrices[ticker] = {price: price, change: change, changePct: changePct};
        // Update DOM
        var priceEl = document.getElementById('price_'+ticker);
        var changeEl = document.getElementById('change_'+ticker);
        if(priceEl) priceEl.textContent = '$' + price.toFixed(2);
        if(changeEl){
          var sign = changePct >= 0 ? '+' : '';
          changeEl.textContent = sign + changePct.toFixed(2) + '%';
          changeEl.className = 'tl-change ' + (changePct >= 0 ? 'pos' : 'neg');
        }
      })
      .catch(function(){});
  });
}

// ====================================================================
// DATA LOADING
// ====================================================================
function getDate(){ return document.getElementById('dateInput').value; }
function getDays(){ return INTERVAL_DAYS[_candleInterval] || 10; }
function getMinNotional(){ return parseFloat(document.getElementById('minNotional').value) || 500000; }
function getMinPercentile(){ return parseInt(document.getElementById('minPercentile').value) || 0; }

function getSweepTickers(){
  if(_mode === 'single') return [_activeTicker];
  // Watchlist mode — return all overlay tickers if index, or just active ticker if flat
  if(_overlayTickers.length > 0) return _overlayTickers.map(function(t){ return t.ticker; });
  return [_activeTicker];
}

function loadAll(resetView){
  if(resetView) _initialLoad = true;
  fetchCandles();
  if(_sweepOverlayOn) fetchSweeps();
}

function fetchCandles(){
  var date = getDate();
  var days = getDays();
  _setLoading(true);
  fetch('/api/0dte/candles?ticker='+_activeTicker+'&date='+date+'&days='+days+'&interval='+_candleInterval)
    .then(function(r){return r.json();})
    .then(function(d){
      var newCandles = d.candles || [];
      if(newCandles.length === 0){ _setLoading(false); return; }

      if(_initialLoad || _candles.length === 0){
        _candles = newCandles;
        _candleSeries.setData(_candles);
        _chart.timeScale().fitContent();
        _initialLoad = false;
      } else {
        var oldLast = _candles.length > 0 ? _candles[_candles.length - 1].time : 0;
        var updated = false;
        newCandles.forEach(function(c){
          if(c.time > oldLast){
            _candleSeries.update(c);
            _candles.push(c);
            updated = true;
          } else if(c.time === oldLast){
            _candleSeries.update(c);
            _candles[_candles.length - 1] = c;
            updated = true;
          }
        });
        if(!updated && newCandles.length > 0 && newCandles[0].time !== (_candles[0] || {}).time){
          _candles = newCandles;
          _candleSeries.setData(_candles);
          _chart.timeScale().fitContent();
        }
      }
      drawBubbles();
      _setLoading(false);
    })
    .catch(function(e){ console.error('Candle fetch error:', e); _setLoading(false); });
}

function fetchSweeps(){
  if(!_sweepOverlayOn) return;
  var date = getDate();
  var days = getDays();
  var tickers = getSweepTickers();

  _setLoading(true);
  fetch('/api/0dte/sweeps?tickers='+tickers.join(',')+'&date='+date+'&days='+days+'&min_notional=0')
    .then(function(r){return r.json();})
    .then(function(d){
      _allSweeps = d.sweeps || [];
      applyClientFilter();
      _setLoading(false);
    })
    .catch(function(e){ console.error('Sweep fetch error:', e); _setLoading(false); });
}

function applyClientFilter(){
  var notionalOn = document.getElementById('fgNotional').classList.contains('on');
  var pctOn = document.getElementById('fgPercentile').classList.contains('on');
  var minN = getMinNotional();
  var minPct = getMinPercentile();
  _sweeps = _allSweeps.filter(function(s){
    if(notionalOn && s.notional < minN) return false;
    if(pctOn && s.percentile < minPct) return false;
    return true;
  });
  drawBubbles();
  updateStats();
  updateFeed();
}

function _setLoading(on){
  _loading = on;
  document.getElementById('dateInput').style.borderColor = on ? '#f59e0b' : '#2a2a3a';
}

// ====================================================================
// BUBBLE DRAWING (Canvas overlay)
// ====================================================================
function drawBubbles(){
  if(!_ctx || !_chart || !_candleSeries || !_sweepOverlayOn) {
    if(_ctx) _ctx.clearRect(0, 0, _canvas.width, _canvas.height);
    return;
  }
  _ctx.clearRect(0, 0, _canvas.width, _canvas.height);

  // Build active ticker color lookup
  var activeTickers = {};
  if(_mode === 'single'){
    // Single mode — use a default color for the active ticker
    activeTickers[_activeTicker] = {color: 'rgba(59,130,246,0.55)', stroke: '#3b82f6'};
  } else {
    // Watchlist mode — use overlay tickers
    _overlayTickers.forEach(function(t){ if(t.on) activeTickers[t.ticker] = t; });
    // Also check flat watchlist tickers
    if(_overlayTickers.length === 0 && _activeWatchlist){
      var cfg = WATCHLIST_CONFIG[_activeWatchlist];
      if(cfg && cfg.tickers){
        cfg.tickers.forEach(function(t){ if(t.ticker === _activeTicker) activeTickers[t.ticker] = t; });
      }
    }
  }

  var ts = _chart.timeScale();
  var candleCloseMap = {};
  _candles.forEach(function(c){ candleCloseMap[c.time] = c.close; });
  var candleTimes = _candles.map(function(c){ return c.time; });

  function nearestCandleTime(t){
    if(candleTimes.length === 0) return null;
    var lo = 0, hi = candleTimes.length - 1;
    while(lo < hi){
      var mid = (lo + hi) >> 1;
      if(candleTimes[mid] < t) lo = mid + 1;
      else hi = mid;
    }
    var best = candleTimes[lo];
    if(lo > 0 && Math.abs(candleTimes[lo-1] - t) < Math.abs(best - t)){
      best = candleTimes[lo-1];
    }
    return best;
  }

  _sweeps.forEach(function(s){
    var tConf = activeTickers[s.ticker];
    if(!tConf) return;

    var candleT = nearestCandleTime(s.time_unix);
    if(candleT === null) return;

    var x = ts.timeToCoordinate(candleT);
    if(x === null || x < 0 || x > _canvas.width) return;

    // Price mapping: always snap to candle close at that timestamp.
    // This handles stock splits (raw sweep price may be pre-split, candles are adjusted)
    // and also handles non-ref tickers in index mode (different price scale).
    var plotPrice = candleCloseMap[candleT];
    if(!plotPrice) return;

    var y = _candleSeries.priceToCoordinate(plotPrice);
    if(y === null || y < 0 || y > _canvas.height) return;

    var p = s.percentile / 100;
    var radius = 3 + Math.pow(p, 2.5) * 27;

    _ctx.beginPath();
    _ctx.arc(x, y, radius, 0, Math.PI * 2);
    _ctx.fillStyle = tConf.color;
    _ctx.fill();
    _ctx.strokeStyle = tConf.stroke;
    _ctx.lineWidth = 1;
    _ctx.stroke();
  });
}

// ====================================================================
// TOOLTIP
// ====================================================================
function onMouseMove(e){
  var rect = document.getElementById('chartContainer').getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var tooltip = document.getElementById('tooltipDiv');

  if(!_sweepOverlayOn || _sweeps.length === 0){
    tooltip.style.display = 'none';
    return;
  }

  var activeTickers = {};
  if(_mode === 'single'){
    activeTickers[_activeTicker] = true;
  } else {
    _overlayTickers.forEach(function(t){ if(t.on) activeTickers[t.ticker] = true; });
    if(Object.keys(activeTickers).length === 0) activeTickers[_activeTicker] = true;
  }

  var ts = _chart.timeScale();
  var candleTimes2 = _candles.map(function(c){ return c.time; });
  var candleCloseMap2 = {};
  _candles.forEach(function(c){ candleCloseMap2[c.time] = c.close; });

  function nearest2(t){
    if(candleTimes2.length === 0) return null;
    var lo = 0, hi = candleTimes2.length - 1;
    while(lo < hi){ var mid = (lo+hi)>>1; if(candleTimes2[mid]<t) lo=mid+1; else hi=mid; }
    var best = candleTimes2[lo];
    if(lo > 0 && Math.abs(candleTimes2[lo-1]-t) < Math.abs(best-t)) best = candleTimes2[lo-1];
    return best;
  }

  var closest = null;
  var closestDist = 30;

  for(var i = 0; i < _sweeps.length; i++){
    var s = _sweeps[i];
    if(!activeTickers[s.ticker]) continue;
    var ct = nearest2(s.time_unix);
    if(ct === null) continue;
    var x = ts.timeToCoordinate(ct);
    if(x === null) continue;
    var plotPrice2 = candleCloseMap2[ct];
    if(!plotPrice2) continue;
    var y = _candleSeries.priceToCoordinate(plotPrice2);
    if(y === null) continue;
    var dist = Math.sqrt((mx-x)*(mx-x) + (my-y)*(my-y));
    if(dist < closestDist){
      closestDist = dist;
      closest = s;
    }
  }

  if(closest){
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 12) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    tooltip.innerHTML = '<b>' + closest.ticker + '</b> ' + closest.time
      + '<br>$' + fmt$(closest.notional) + ' @ $' + closest.price.toFixed(2)
      + '<br>Percentile: ' + closest.percentile + '%';
  } else {
    tooltip.style.display = 'none';
  }
}

// ====================================================================
// CONTROLS
// ====================================================================
function onTickerToggle(el){
  var ticker = el.getAttribute('data-ticker');
  _overlayTickers.forEach(function(t){ if(t.ticker === ticker) t.on = el.checked; });
  syncGroupCheckboxes();
  drawBubbles();
  updateStats();
  updateFeed();
}

function onGroupToggle(gi, el){
  var g = _overlayGroups[gi];
  g.on = el.checked;
  g.tickers.forEach(function(t){ t.on = el.checked; });
  var rows = document.querySelectorAll('[data-group="'+gi+'"] .ticker-check');
  rows.forEach(function(cb){ cb.checked = el.checked; });
  drawBubbles();
  updateStats();
  updateFeed();
}

function syncGroupCheckboxes(){
  var hdrs = document.querySelectorAll('.ticker-group-hdr input');
  _overlayGroups.forEach(function(g, gi){
    if(!hdrs[gi]) return;
    var allOn = g.tickers.every(function(t){ return t.on; });
    var anyOn = g.tickers.some(function(t){ return t.on; });
    hdrs[gi].checked = allOn;
    hdrs[gi].indeterminate = !allOn && anyOn;
  });
}

function togglePanel(){
  var panel = document.getElementById('leftPanel');
  var btn = document.getElementById('collapseBtn');
  panel.classList.toggle('collapsed');
  btn.innerHTML = panel.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
  setTimeout(function(){
    var container = document.getElementById('chartContainer');
    _chart.resize(container.clientWidth, container.clientHeight);
    resizeCanvas();
    drawBubbles();
  }, 250);
}

function setCandleInterval(mins, btn){
  if(_candleInterval === mins) return;
  _candleInterval = mins;
  var btns = document.getElementById('candleIntervalCtrl').querySelectorAll('button');
  btns.forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  loadAll(true);
}

function _syncIntervalButtons(){
  var btns = document.getElementById('candleIntervalCtrl').querySelectorAll('button');
  var intervalMap = {'1m':1,'5m':5,'1h':60,'4h':240,'1D':1440,'2D':2880,'W':10080,'M':43200,'3M':129600};
  btns.forEach(function(b){
    b.classList.toggle('active', intervalMap[b.textContent] === _candleInterval);
  });
}

function toggleFilter(which){
  var fg = document.getElementById(which === 'notional' ? 'fgNotional' : 'fgPercentile');
  var lbl = fg.querySelector('.flbl');
  var isOn = fg.classList.contains('on');
  if(isOn){
    fg.classList.remove('on');
    lbl.classList.remove('active');
  } else {
    fg.classList.add('on');
    lbl.classList.add('active');
  }
  applyClientFilter();
}

function toggleSweepOverlay(){
  _sweepOverlayOn = !_sweepOverlayOn;
  var btn = document.getElementById('btnSweepToggle');
  btn.classList.toggle('active', _sweepOverlayOn);
  document.getElementById('sweepControls').classList.toggle('off', !_sweepOverlayOn);
  if(_sweepOverlayOn){
    fetchSweeps();
  } else {
    _sweeps = [];
    _allSweeps = [];
    drawBubbles();
    updateStats();
    updateFeed();
  }
}

function toggleAutoRefresh(){
  _autoRefresh = !_autoRefresh;
  var btn = document.getElementById('btnAutoRefresh');
  btn.classList.toggle('active', _autoRefresh);
  _startStopTimers();
}

function _startStopTimers(){
  clearInterval(_sweepTimer);
  clearInterval(_candleTimer);
  if(_autoRefresh){
    _sweepTimer = setInterval(fetchSweeps, 15000);
    _candleTimer = setInterval(fetchCandles, 60000);
    fetchCandles();
    fetchSweeps();
  }
}

document.addEventListener('visibilitychange', function(){
  if(!document.hidden && _autoRefresh){
    _startStopTimers();
  }
});

// ====================================================================
// STATS & FEED
// ====================================================================
function updateStats(){
  var activeTickers = {};
  if(_mode === 'single'){
    activeTickers[_activeTicker] = true;
  } else {
    _overlayTickers.forEach(function(t){ if(t.on) activeTickers[t.ticker] = true; });
    if(Object.keys(activeTickers).length === 0) activeTickers[_activeTicker] = true;
  }
  var total = 0, totalN = 0, largest = 0;
  _sweeps.forEach(function(s){
    if(!activeTickers[s.ticker]) return;
    total++;
    totalN += s.notional;
    if(s.notional > largest) largest = s.notional;
  });
  document.getElementById('statSweeps').textContent = total;
  document.getElementById('statNotional').textContent = '$' + fmt$(totalN);
  document.getElementById('statLargest').textContent = '$' + fmt$(largest);
}

function updateFeed(){
  var feed = document.getElementById('sweepFeed');
  var activeTickers = {};
  if(_mode === 'single'){
    activeTickers[_activeTicker] = true;
  } else {
    _overlayTickers.forEach(function(t){ if(t.on) activeTickers[t.ticker] = true; });
    if(Object.keys(activeTickers).length === 0) activeTickers[_activeTicker] = true;
  }
  var recent = _sweeps.filter(function(s){ return activeTickers[s.ticker]; }).slice(-50).reverse();
  if(recent.length === 0){
    feed.innerHTML = '<div style="color:#555;font-size:11px;">No sweeps found</div>';
    return;
  }
  var html = '';
  recent.forEach(function(s){
    var tConf = _overlayTickers.find(function(t){return t.ticker === s.ticker;});
    var color = tConf ? tConf.stroke : '#3b82f6';
    html += '<div class="feed-item">'
      + '<span class="feed-time">' + s.time + '</span>'
      + '<span class="feed-ticker" style="color:'+color+'">' + s.ticker + '</span>'
      + '<span>$' + s.price.toFixed(2) + '</span>'
      + '<span class="feed-notional">$' + fmt$(s.notional) + '</span>'
      + '</div>';
  });
  feed.innerHTML = html;
}

// ====================================================================
// UTILS
// ====================================================================
function fmt$(v){
  if(v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if(v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if(v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return v.toFixed(0);
}

// ====================================================================
// PRESETS (localStorage)
// ====================================================================
var PRESET_KEY = '0dte_presets_v2';

function _getPresets(){
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || {}; } catch(e){ return {}; }
}

function _populatePresetSelect(){
  var sel = document.getElementById('presetSelect');
  var presets = _getPresets();
  sel.innerHTML = '<option value="">Presets...</option>';
  Object.keys(presets).sort().forEach(function(name){
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function savePreset(){
  var name = prompt('Preset name:');
  if(!name || !name.trim()) return;
  name = name.trim();
  var cfg = {
    mode: _mode,
    ticker: _activeTicker,
    watchlist: _activeWatchlist,
    interval: _candleInterval,
    sweepOverlayOn: _sweepOverlayOn,
    notionalOn: document.getElementById('fgNotional').classList.contains('on'),
    percentileOn: document.getElementById('fgPercentile').classList.contains('on'),
    minNotional: parseFloat(document.getElementById('minNotional').value) || 500000,
    minPercentile: parseInt(document.getElementById('minPercentile').value) || 85,
    tickers: {}
  };
  // Save per-watchlist ticker on/off state for index watchlists
  Object.keys(WATCHLIST_CONFIG).forEach(function(key){
    var wCfg = WATCHLIST_CONFIG[key];
    if(wCfg.groups){
      cfg.tickers[key] = {};
      wCfg.groups.forEach(function(g){
        g.tickers.forEach(function(t){
          cfg.tickers[key][t.ticker] = t.on;
        });
      });
    }
  });
  var presets = _getPresets();
  presets[name] = cfg;
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
  document.getElementById('presetSelect').value = name;
}

function loadPreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name) return;
  var presets = _getPresets();
  var cfg = presets[name];
  if(!cfg) return;

  // Restore filter toggles
  var fgN = document.getElementById('fgNotional');
  var fgP = document.getElementById('fgPercentile');
  fgN.classList.toggle('on', !!cfg.notionalOn);
  fgN.querySelector('.flbl').classList.toggle('active', !!cfg.notionalOn);
  fgP.classList.toggle('on', !!cfg.percentileOn);
  fgP.querySelector('.flbl').classList.toggle('active', !!cfg.percentileOn);
  document.getElementById('minNotional').value = cfg.minNotional || 500000;
  document.getElementById('minPercentile').value = cfg.minPercentile || 85;

  // Restore sweep overlay
  _sweepOverlayOn = cfg.sweepOverlayOn !== false;
  document.getElementById('btnSweepToggle').classList.toggle('active', _sweepOverlayOn);
  document.getElementById('sweepControls').classList.toggle('off', !_sweepOverlayOn);

  // Restore interval
  if(cfg.interval){
    _candleInterval = cfg.interval;
    _syncIntervalButtons();
  }

  // Restore per-watchlist ticker states
  if(cfg.tickers){
    Object.keys(WATCHLIST_CONFIG).forEach(function(key){
      var wCfg = WATCHLIST_CONFIG[key];
      if(!wCfg.groups || !cfg.tickers[key]) return;
      wCfg.groups.forEach(function(g){
        var allOn = true;
        g.tickers.forEach(function(t){
          if(cfg.tickers[key].hasOwnProperty(t.ticker)){
            t.on = cfg.tickers[key][t.ticker];
          }
          if(!t.on) allOn = false;
        });
        g.on = allOn;
      });
    });
  }

  // Restore mode
  if(cfg.mode === 'single' && cfg.ticker){
    _mode = 'single';
    _activeWatchlist = null;
    document.getElementById('watchlistSelect').value = '';
    setActiveTicker(cfg.ticker, 'input');
  } else if(cfg.watchlist){
    _mode = 'watchlist';
    _activeWatchlist = cfg.watchlist;
    document.getElementById('watchlistSelect').value = cfg.watchlist;
    buildWatchlistView();
    loadAll(true);
  }
}

function deletePreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name){ alert('Select a preset first'); return; }
  if(!confirm('Delete preset "'+name+'"?')) return;
  var presets = _getPresets();
  delete presets[name];
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
}

_populatePresetSelect();
</script>
