<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBD Technologies — Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c0c14;color:#e0e0e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh;}

/* Header */
.header{background:#0c0c14;padding:8px 12px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px;height:48px;z-index:10;}
.header-title{font-size:17px;font-weight:700;color:#f59e0b;white-space:nowrap;padding-left:8px;}
.header input[type="text"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 10px;border-radius:4px;font-size:13px;font-family:inherit;width:100px;font-weight:600;height:32px;}
.header input[type="text"]:focus{border-color:#f59e0b;outline:none;}
.header select{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit;height:32px;}
/* Divider */
.hdr-sep{width:1px;height:24px;background:#334155;flex-shrink:0;}
/* Layer toggle buttons */
.layer-ctrl{display:inline-flex;border:1px solid #334155;border-radius:4px;overflow:hidden;}
.layer-btn{background:#1e293b;color:#888;border:none;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;border-right:1px solid #334155;font-weight:700;letter-spacing:0.3px;white-space:nowrap;height:32px;}
.layer-btn:last-child{border-right:none;}
.layer-btn:hover{color:#ccc;}
.layer-btn.active.lyr-daily{background:#f59e0b22;color:#f59e0b;}
.layer-btn.active.lyr-single{background:#3b82f622;color:#3b82f6;}
.layer-btn.active.lyr-rare{background:#a78bfa22;color:#c4b5fd;}
.layer-btn.active.lyr-cb{background:#eab30822;color:#eab308;}
.layer-btn.active.lyr-monster{background:#f9731622;color:#f97316;}
.layer-btn.active.lyr-sweeps{background:#60a5fa18;color:#60a5fa;}
/* Sweep filter mode toggle ($ vs Pctl) */
.sweep-filter{display:flex;align-items:center;gap:4px;}
.sweep-mode-btn{background:#1e293b;color:#555;border:1px solid #334155;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;height:32px;border-radius:4px 0 0 4px;}
.sweep-mode-btn:last-of-type{border-radius:0 4px 4px 0;border-left:none;}
.sweep-mode-btn.active{background:#60a5fa18;color:#60a5fa;border-color:#60a5fa44;}
.sweep-filter input[type="number"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 10px;border-radius:4px;font-size:13px;font-family:inherit;width:100px;height:32px;text-align:center;font-weight:600;}
.sweep-filter input[type="number"]:focus{border-color:#60a5fa;outline:none;}
/* Layer config inputs */
.lyr-cfg{display:flex;align-items:center;gap:3px;font-size:11px;color:#555;}
.lyr-cfg input[type="number"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 8px;border-radius:4px;font-size:13px;font-family:inherit;width:48px;text-align:center;height:32px;font-weight:600;}
.lyr-cfg input[type="number"]:focus{border-color:#f59e0b;outline:none;}
.lyr-cfg .cfg-label{font-weight:600;}

/* Layout */
.main{display:flex;height:calc(100vh - 48px);}
.left-panel{width:280px;min-width:280px;background:#0a0a12;border-right:1px solid #1e1e2e;padding:12px;overflow-y:auto;display:flex;flex-direction:column;transition:width 0.2s,min-width 0.2s,padding 0.2s;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.left-panel.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border-right:none;}
.chart-area{flex:1;position:relative;overflow:hidden;}
#chartContainer{width:100%;height:100%;position:relative;}
#bubbleCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
#tooltipDiv{position:absolute;display:none;background:rgba(0,0,0,0.90);border:1px solid #334155;border-radius:4px;padding:6px 10px;font-size:11px;color:#e0e0e8;pointer-events:none;z-index:10;white-space:nowrap;max-height:400px;overflow-y:auto;}

/* Left panel sections */
.panel-section{margin-bottom:12px;}
.panel-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}

/* Watchlist dropdown */
#watchlistSelect{width:100%;background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:6px 10px;border-radius:4px;font-size:12px;font-family:inherit;margin-bottom:12px;}

/* Ticker list — fills available space, scrollable */
.ticker-list{min-height:80px;max-height:calc(50vh - 48px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.ticker-list::-webkit-scrollbar{width:6px;}
.ticker-list::-webkit-scrollbar-track{background:#0a0a12;}
.ticker-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.ticker-list-item{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;font-size:12px;}
.ticker-list-item:hover{background:#14141e;}
.ticker-list-item.active{background:#f59e0b15;border-left:2px solid #f59e0b;}
.ticker-list-item .tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ticker-list-item .tl-ticker{font-weight:600;min-width:48px;}
.ticker-list-item .tl-price{color:#888;margin-left:auto;font-size:11px;font-family:'SF Mono',monospace;}
.ticker-list-item .tl-change{font-size:11px;font-weight:600;min-width:52px;text-align:right;font-family:'SF Mono',monospace;}
.tl-change.pos{color:#10b981;}
.tl-change.neg{color:#ef4444;}

/* Overlay checkboxes section — never scrolls, always full height */
.overlay-section{margin-top:8px;margin-bottom:8px;flex-shrink:0;}
.overlay-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 8px;}
.ticker-group-hdr{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;margin-top:6px;grid-column:1/-1;}
.ticker-group-hdr:first-child{margin-top:0;}
.ticker-group-hdr input{accent-color:#f59e0b;}
.ticker-group-hdr span{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.ticker-group-hdr:hover span{color:#ccc;}
.ticker-row{display:flex;align-items:center;gap:6px;padding:3px 0 3px 4px;cursor:pointer;font-size:11px;}
.ticker-row:hover{background:#14141e;border-radius:4px;}
.ticker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ticker-label{font-size:11px;font-weight:600;}
.ticker-check{accent-color:#f59e0b;width:13px;height:13px;}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
.stat-val{color:#f59e0b;font-weight:600;}

/* Buttons */
.ctrl-btn{background:#1e293b;color:#e2e8f0;border:1px solid #334155;padding:6px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;width:100%;}
.ctrl-btn:hover{background:#334155;}
.ctrl-btn.active{background:#f59e0b22;color:#f59e0b;border-color:#f59e0b66;}

/* Segmented control */
.seg-ctrl{display:inline-flex;border:1px solid #334155;border-radius:4px;overflow:hidden;}
.seg-ctrl button{background:#1e293b;color:#888;border:none;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;border-right:1px solid #334155;font-weight:600;height:32px;}
.seg-ctrl button:last-child{border-right:none;}
.seg-ctrl button:hover{color:#ccc;}
.seg-ctrl button.active{background:#f59e0b22;color:#f59e0b;}
.collapse-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:#1e293b;border:1px solid #334155;border-left:none;color:#888;padding:8px 4px;cursor:pointer;border-radius:0 4px 4px 0;z-index:6;font-size:10px;}
.collapse-btn:hover{color:#f59e0b;}

/* Sweep feed */
.feed{margin-top:8px;flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.feed::-webkit-scrollbar{width:6px;}
.feed::-webkit-scrollbar-track{background:#0a0a12;}
.feed::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.feed::-webkit-scrollbar-thumb:hover{background:#555;}
.feed-item{font-size:11px;padding:4px 0;border-bottom:1px solid #1a1a26;display:flex;gap:6px;}
.feed-time{color:#555;min-width:55px;}
.feed-ticker{font-weight:600;min-width:32px;}
.feed-notional{color:#f59e0b;margin-left:auto;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Chart</div>
  <input type="text" id="tickerInput" placeholder="Ticker..." spellcheck="false">
  <div class="hdr-sep"></div>
  <div class="seg-ctrl" id="candleIntervalCtrl">
    <button class="active" onclick="setCandleInterval(1,this)">1m</button>
    <button onclick="setCandleInterval(5,this)">5m</button>
    <button onclick="setCandleInterval(60,this)">1h</button>
    <button onclick="setCandleInterval(240,this)">4h</button>
    <button onclick="setCandleInterval(1440,this)">1D</button>
    <button onclick="setCandleInterval(2880,this)">2D</button>
    <button onclick="setCandleInterval(10080,this)">W</button>
    <button onclick="setCandleInterval(43200,this)">M</button>
    <button onclick="setCandleInterval(129600,this)">3M</button>
  </div>
  <div class="hdr-sep"></div>
  <div class="layer-ctrl" id="layerCtrl">
    <button class="layer-btn lyr-sweeps active" onclick="toggleLayer('sweeps',this)">Sweeps</button>
    <button class="layer-btn lyr-daily" onclick="toggleLayer('daily',this)">Daily</button>
    <button class="layer-btn lyr-single" onclick="toggleLayer('single',this)">Single</button>
    <button class="layer-btn lyr-rare" onclick="toggleLayer('rare',this)">Rare</button>
    <button class="layer-btn lyr-cb" onclick="toggleLayer('cb',this)">CB</button>
    <button class="layer-btn lyr-monster" onclick="toggleLayer('monster',this)">Monster</button>
  </div>
  <div class="hdr-sep"></div>
  <div class="sweep-filter">
    <button class="sweep-mode-btn active" id="modeNotional" onclick="setSweepFilterMode('notional')">$</button><button class="sweep-mode-btn" id="modePctl" onclick="setSweepFilterMode('percentile')">Pctl</button>
    <input type="number" id="cfgSweepValue" value="500000" step="100000" min="0" onchange="onLayerCfgChange()" title="Min notional ($)">
  </div>
  <div class="hdr-sep"></div>
  <div class="lyr-cfg">
    <span class="cfg-label" style="color:#f59e0b;">D</span><input type="number" id="cfgDailyFrom" value="1" min="1" onchange="onLayerCfgChange()">–<input type="number" id="cfgDailyTo" value="20" min="1" onchange="onLayerCfgChange()">
    <span class="cfg-label" style="color:#3b82f6;margin-left:3px;">S</span><input type="number" id="cfgSingleFrom" value="1" min="1" onchange="onLayerCfgChange()">–<input type="number" id="cfgSingleTo" value="10" min="1" onchange="onLayerCfgChange()">
  </div>
  <div class="hdr-sep"></div>
  <select id="presetSelect" style="width:120px;" onchange="loadPreset()">
    <option value="">Presets...</option>
  </select>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;" onclick="savePreset()">Save</button>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;color:#ef4444;" onclick="deletePreset()">Del</button>
</div>

<div class="main">
  <div class="left-panel" id="leftPanel">
    <div class="panel-section">
      <select id="watchlistSelect" onchange="onWatchlistChange()">
        <option value="">-- Select Watchlist --</option>
      </select>
      <div class="ticker-list" id="tickerListBox">
        <!-- Populated by JS -->
      </div>
    </div>
    <div class="overlay-section" id="overlaySection" style="display:none;">
      <div class="panel-label">Overlay Tickers</div>
      <div class="overlay-grid" id="overlayList">
        <!-- Group checkboxes populated by JS -->
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Sweep Events</div>
      <div id="statsBox">
        <div class="stat-row"><span>Events</span><span class="stat-val" id="statSweeps">0</span></div>
        <div class="stat-row"><span>Total $</span><span class="stat-val" id="statNotional">$0</span></div>
        <div class="stat-row"><span>Largest</span><span class="stat-val" id="statLargest">$0</span></div>
      </div>
    </div>
    <div class="panel-section" style="display:flex;flex-direction:column;min-height:0;max-height:200px;">
      <div class="panel-label">Recent Sweeps</div>
      <div class="feed" id="sweepFeed">
        <div style="color:#555;font-size:11px;">No data yet</div>
      </div>
    </div>
  </div>
  <div class="chart-area">
    <button class="collapse-btn" id="collapseBtn" onclick="togglePanel()">&#x25C0;</button>
    <div id="chartContainer"></div>
    <canvas id="bubbleCanvas"></canvas>
    <div id="tooltipDiv"></div>
  </div>
</div>

  SLV: { leveraged: ['AGQ','ZSL'] },
  GDX: { leveraged: ['DUST','JDST','JNUG','NUGT'] },
  CPER:{ leveraged: ['COPZ','CPXR'] },
  CORN:{ leveraged: ['CXRN'] },
  WEAT:{ leveraged: ['WXET'] },
  USO: { leveraged: ['SCO','UCO'] },
  UNG: { leveraged: ['BOIL','KOLD'] },
  XOM: { leveraged: ['XOMX','XOMZ'] },
  HYG: { leveraged: ['UJB'] },
};

// ====================================================================
// STATE
// ====================================================================
var _mode = 'watchlist';          // 'single' | 'watchlist'
var _activeTicker = 'SPY';       // ticker whose candles are displayed
var _activeWatchlist = 'Priority';// current watchlist key

// Overlay state — per-ticker overlay tickers
var _overlayGroups = [];         // [{name, on, tickers}] for current active ticker
var _overlayTickers = [];        // flat array of overlay ticker objects

var _candleInterval = 1;
var _sweepFilterMode = 'notional';   // 'notional' | 'percentile'
// Days of candle data per interval (for Polygon API)
var INTERVAL_DAYS = {1:5, 5:30, 60:120, 240:365, 1440:730, 2880:730, 10080:1460, 43200:2520, 129600:3780};
// Days of sweep data per interval (separate, much tighter to avoid loading millions of trades)
var SWEEP_DAYS =    {1:5, 5:30, 60:90,  240:180, 1440:365, 2880:365, 10080:730,  43200:1460, 129600:2520};

// Layer system — 6 layers: raw sweeps + 5 event layers
var _activeLayers = {sweeps:true, daily:false, single:false, rare:false, cb:false, monster:false};
var _layerCfg = {minNotional:500000, percentile:85, dailyFrom:1, dailyTo:20, singleFrom:1, singleTo:10};
// Raw data from /api/sweeps/chart
var _chartSweeps = [];       // individual sweep trades
var _chartEvents = [];       // clusterbomb/rare/monster events with ranks
var _tickerColorMap = {};    // ticker → {stroke} for tooltip coloring

var _chart = null;
var _candleSeries = null;
var _canvas = null;
var _ctx = null;
var _candles = [];
var _initialLoad = true;
var _loading = false;
var _fetchController = null;   // AbortController — cancels in-flight fetches on ticker change
var _sweepTimer = null;
var _candleTimer = null;
var _tickerPrices = {};  // {ticker: {price, change, changePct}}

// ====================================================================
// INIT
// ====================================================================
(function init(){
  // Populate watchlist dropdown
  var sel = document.getElementById('watchlistSelect');
  Object.keys(WATCHLISTS).forEach(function(key){
    var opt = document.createElement('option');
    opt.value = key;
    opt.textContent = key;
    sel.appendChild(opt);
  });
  sel.value = _activeWatchlist;

  // Ticker input — Enter key
  var tickerInput = document.getElementById('tickerInput');
  tickerInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      var val = tickerInput.value.trim().toUpperCase();
      if(val){
        setActiveTicker(val, 'input');
      }
    }
  });

  // Build initial watchlist view
  buildWatchlistView();

  // Init chart
  initChart();
  loadAll(true);

  // Always-live: auto-refresh candles every 60s, sweeps every 30s
  _startLiveTimers();
})();

// ====================================================================
// CHART
// ====================================================================
function initChart(){
  var container = document.getElementById('chartContainer');
  _chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: {background:{type:'solid',color:'#0c0c14'}, textColor:'#888', fontSize:11},
    grid: {vertLines:{color:'#1a1a26'}, horzLines:{color:'#1a1a26'}},
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#f59e0b33',width:1,style:3},
      horzLine:{color:'#f59e0b33',width:1,style:3},
    },
    timeScale: {borderColor:'#1e1e2e', timeVisible:true, secondsVisible:false},
    rightPriceScale: {borderColor:'#1e1e2e'},
  });

  _candleSeries = _chart.addCandlestickSeries({
    upColor:'transparent', downColor:'#b22833',
    borderUpColor:'#056656', borderDownColor:'#b22833',
    wickUpColor:'#056656', wickDownColor:'#b22833',
  });

  _canvas = document.getElementById('bubbleCanvas');
  _ctx = _canvas.getContext('2d');
  resizeCanvas();

  _chart.timeScale().subscribeVisibleTimeRangeChange(drawBubbles);

  window.addEventListener('resize', function(){
    _chart.resize(container.clientWidth, container.clientHeight);
    resizeCanvas();
    drawBubbles();
  });

  container.addEventListener('mousemove', onMouseMove);
  container.addEventListener('mouseleave', function(){
    document.getElementById('tooltipDiv').style.display = 'none';
  });
}

function resizeCanvas(){
  var container = document.getElementById('chartContainer');
  _canvas.width = container.clientWidth;
  _canvas.height = container.clientHeight;
}

// ====================================================================
// MODE & TICKER MANAGEMENT
// ====================================================================
function setActiveTicker(ticker, source){
  var tickerChanged = (_activeTicker !== ticker);
  _activeTicker = ticker;
  document.getElementById('tickerInput').value = ticker;

  if(source === 'input'){
    _mode = 'single';
    _activeWatchlist = null;
    document.getElementById('watchlistSelect').value = '';
    // Clear ticker list
    document.getElementById('tickerListBox').innerHTML = '';
  } else if(source === 'watchlist-click'){
    highlightTickerList(ticker);
  }

  // Build overlay for this ticker
  buildOverlayForTicker(ticker);

  // Clear old candles so chart resets price scale to new ticker's range
  if(tickerChanged){
    _candles = [];
    _candleSeries.setData([]);
    _chartSweeps = [];
    _chartEvents = [];
    if(_ctx) _ctx.clearRect(0, 0, _canvas.width, _canvas.height);
  }

  loadAll(true);
}

function buildOverlayForTicker(ticker){
  var overlaySection = document.getElementById('overlaySection');
  var overlayList = document.getElementById('overlayList');
  overlayList.innerHTML = '';
  _overlayGroups = [];
  _overlayTickers = [];

  var map = OVERLAY_MAP[ticker];

  // Always build Underlying group — at minimum contains the active ticker itself
  var uGroup = {name: 'Underlying', on: true, tickers: []};
  // Active ticker is always first, with a distinct amber color
  uGroup.tickers.push({ticker: ticker, label: ticker, color: 'rgba(245,158,11,0.45)', stroke: '#fbbf24', on: true, group: 'Underlying'});
  // Add additional underlying tickers from overlay map (e.g. SPX components)
  if(map && map.underlying && map.underlying.length > 0){
    map.underlying.forEach(function(tk, i){
      var col = _COLORS[i % _COLORS.length];
      uGroup.tickers.push({ticker: tk, label: tk, color: col.c, stroke: col.s, on: true, group: 'Underlying'});
    });
  }
  _overlayGroups.push(uGroup);

  // Leveraged group (only if overlay map exists)
  if(map && map.leveraged && map.leveraged.length > 0){
    var lGroup = {name: 'Leveraged', on: true, tickers: []};
    map.leveraged.forEach(function(tk, i){
      var col = _COLORS[(i + 3) % _COLORS.length];
      lGroup.tickers.push({ticker: tk, label: tk, color: col.c, stroke: col.s, on: true, group: 'Leveraged'});
    });
    _overlayGroups.push(lGroup);
  }

  // Flatten
  _overlayGroups.forEach(function(g){ g.tickers.forEach(function(t){ _overlayTickers.push(t); }); });

  // Render checkboxes in two-column grid
  _overlayGroups.forEach(function(g, gIdx){
    var hdr = document.createElement('div');
    hdr.className = 'ticker-group-hdr';
    hdr.innerHTML = '<input type="checkbox" '+(g.on?'checked':'')+' onchange="onGroupToggle('+gIdx+',this)">'
      + '<span>'+g.name+' ('+g.tickers.length+')</span>';
    overlayList.appendChild(hdr);
    g.tickers.forEach(function(t){
      var row = document.createElement('div');
      row.className = 'ticker-row';
      row.setAttribute('data-group', gIdx);
      row.innerHTML = '<input type="checkbox" class="ticker-check" data-ticker="'+t.ticker+'" '+(t.on?'checked':'')+' onchange="onTickerToggle(this)">'
        + '<div class="ticker-dot" style="background:'+t.stroke+';"></div>'
        + '<span class="ticker-label">'+t.label+'</span>';
      overlayList.appendChild(row);
    });
  });

  overlaySection.style.display = _overlayGroups.length > 0 ? '' : 'none';
}

function buildWatchlistView(){
  var key = _activeWatchlist;
  var tickers = key ? WATCHLISTS[key] : null;
  var listBox = document.getElementById('tickerListBox');
  listBox.innerHTML = '';

  if(!tickers || tickers.length === 0) return;

  _activeTicker = tickers[0].ticker;
  document.getElementById('tickerInput').value = _activeTicker;

  tickers.forEach(function(t, i){
    var col = _COLORS[i % _COLORS.length];
    var item = document.createElement('div');
    item.className = 'ticker-list-item' + (t.ticker === _activeTicker ? ' active' : '');
    item.setAttribute('data-ticker', t.ticker);
    item.onclick = function(){ setActiveTicker(t.ticker, 'watchlist-click'); };
    item.innerHTML = '<div class="tl-dot" style="background:'+col.s+';"></div>'
      + '<span class="tl-ticker">'+t.label+'</span>'
      + '<span class="tl-price" id="price_'+t.ticker+'">—</span>'
      + '<span class="tl-change" id="change_'+t.ticker+'">—</span>';
    listBox.appendChild(item);
  });

  // Build overlay for initial ticker
  buildOverlayForTicker(_activeTicker);

  // Fetch prices for visible tickers
  fetchTickerPrices(tickers.map(function(t){ return t.ticker; }));
}

function highlightTickerList(ticker){
  var items = document.querySelectorAll('.ticker-list-item');
  items.forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-ticker') === ticker);
  });
}

function onWatchlistChange(){
  var sel = document.getElementById('watchlistSelect');
  var key = sel.value;
  if(!key){
    _activeWatchlist = null;
    _mode = 'single';
    return;
  }
  _activeWatchlist = key;
  _mode = 'watchlist';
  buildWatchlistView();
  loadAll(true);
}

// ====================================================================
// TICKER PRICES (for left panel list)
// ====================================================================
function fetchTickerPrices(tickers){
  // Fetch last daily candle for each ticker to get price + change
  tickers.forEach(function(ticker){
    fetch('/api/0dte/candles?ticker='+ticker+'&date='+getDate()+'&days=2&interval=1440')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var candles = d.candles || [];
        if(candles.length === 0) return;
        var last = candles[candles.length - 1];
        var prev = candles.length > 1 ? candles[candles.length - 2] : null;
        var price = last.close;
        var change = prev ? (price - prev.close) : 0;
        var changePct = prev ? ((change / prev.close) * 100) : 0;
        _tickerPrices[ticker] = {price: price, change: change, changePct: changePct};
        // Update DOM
        var priceEl = document.getElementById('price_'+ticker);
        var changeEl = document.getElementById('change_'+ticker);
        if(priceEl) priceEl.textContent = '$' + price.toFixed(2);
        if(changeEl){
          var sign = changePct >= 0 ? '+' : '';
          changeEl.textContent = sign + changePct.toFixed(2) + '%';
          changeEl.className = 'tl-change ' + (changePct >= 0 ? 'pos' : 'neg');
        }
      })
      .catch(function(){});
  });
}

// ====================================================================
// DATA LOADING
// ====================================================================
function getDate(){
  return new Date().toISOString().slice(0,10);
}
function getDays(){ return INTERVAL_DAYS[_candleInterval] || 10; }

function loadAll(resetView){
  // Abort any in-flight fetches so stale responses don't overwrite current ticker
  if(_fetchController) _fetchController.abort();
  _fetchController = new AbortController();
  if(resetView) _initialLoad = true;
  fetchCandles();
  fetchSweepChart();
}

function fetchCandles(){
  var date = getDate();
  var days = getDays();
  var signal = _fetchController ? _fetchController.signal : undefined;
  _setLoading(true);
  fetch('/api/0dte/candles?ticker='+_activeTicker+'&date='+date+'&days='+days+'&interval='+_candleInterval, {signal: signal})
    .then(function(r){return r.json();})
    .then(function(d){
      var newCandles = d.candles || [];
      if(newCandles.length === 0){ _setLoading(false); return; }

      if(_initialLoad || _candles.length === 0){
        _candles = newCandles;
        _candleSeries.setData(_candles);
        _chart.timeScale().fitContent();
        _initialLoad = false;
      } else {
        var oldLast = _candles.length > 0 ? _candles[_candles.length - 1].time : 0;
        var updated = false;
        newCandles.forEach(function(c){
          if(c.time > oldLast){
            _candleSeries.update(c);
            _candles.push(c);
            updated = true;
          } else if(c.time === oldLast){
            _candleSeries.update(c);
            _candles[_candles.length - 1] = c;
            updated = true;
          }
        });
        if(!updated && newCandles.length > 0 && newCandles[0].time !== (_candles[0] || {}).time){
          _candles = newCandles;
          _candleSeries.setData(_candles);
          _chart.timeScale().fitContent();
        }
      }
      drawBubbles();
      _setLoading(false);
    })
    .catch(function(e){ if(e.name === 'AbortError' || (e instanceof TypeError && _fetchController && _fetchController.signal.aborted)) return; console.error('Candle fetch error:', e); _setLoading(false); });
}

function fetchSweepChart(){
  // Fetch sweep chart data for active ticker + all enabled overlay tickers
  var sweepDays = SWEEP_DAYS[_candleInterval] || 30;
  var end = new Date();
  var start = new Date(end.getTime() - (sweepDays + 2) * 86400000);
  var dateFrom = start.toISOString().slice(0,10);
  var dateTo = end.toISOString().slice(0,10);

  // Build list of tickers to fetch: only those checked ON in overlay
  var tickers = [];
  _overlayTickers.forEach(function(t){
    if(t.on) tickers.push(t.ticker);
  });
  // If nothing is checked, nothing to fetch
  if(tickers.length === 0){
    _chartSweeps = []; _chartEvents = [];
    drawBubbles(); updateStats(); updateFeed();
    return;
  }

  // Fetch all tickers in parallel (with abort signal)
  var signal = _fetchController ? _fetchController.signal : undefined;
  var promises = tickers.map(function(ticker){
    var url = '/api/sweeps/chart?ticker='+ticker
      +'&date_from='+dateFrom+'&date_to='+dateTo
      +'&daily_from='+_layerCfg.dailyFrom+'&daily_to='+_layerCfg.dailyTo
      +'&rank_from='+_layerCfg.singleFrom+'&rank_to='+_layerCfg.singleTo;
    return fetch(url, {signal: signal}).then(function(r){ return r.json(); }).then(function(d){
      return {ticker: ticker, sweeps: d.sweeps || [], events: d.clusterbombs || []};
    });
  });

  Promise.all(promises)
    .then(function(results){
      // Merge all tickers' data, tagging each sweep/event with its ticker
      _chartSweeps = [];
      _chartEvents = [];
      results.forEach(function(r){
        r.sweeps.forEach(function(s){ s.ticker = r.ticker; _chartSweeps.push(s); });
        r.events.forEach(function(e){ e.ticker = r.ticker; _chartEvents.push(e); });
      });
      drawBubbles();
      updateStats();
      updateFeed();
    })
    .catch(function(e){ if(e.name === 'AbortError' || (e instanceof TypeError && _fetchController && _fetchController.signal.aborted)) return; console.error('Sweep chart fetch error:', e); });
}

function _setLoading(on){
  _loading = on;
  document.getElementById('tickerInput').style.borderColor = on ? '#f59e0b' : '#2a2a3a';
}

// ====================================================================
// BUBBLE DRAWING (Canvas overlay)
// ====================================================================

// Exponential sizing curve: p ∈ [0,1] → radius. Same curve for ALL layers.
// p=0 → 3px (barely visible), p=0.5 → ~12px, p=1 → 30px
function _bubbleRadius(p){ return 3 + Math.pow(p, 2.5) * 27; }
function _bubbleAlpha(p){ return 0.30 + p * 0.55; }

function drawBubbles(){
  if(!_ctx || !_chart || !_candleSeries) {
    if(_ctx) _ctx.clearRect(0, 0, _canvas.width, _canvas.height);
    return;
  }
  _ctx.clearRect(0, 0, _canvas.width, _canvas.height);

  var anyLayer = _activeLayers.sweeps || _activeLayers.daily || _activeLayers.single || _activeLayers.rare || _activeLayers.cb || _activeLayers.monster;
  if(!anyLayer) return;

  var ts = _chart.timeScale();
  var candleCloseMap = {};
  _candles.forEach(function(c){ candleCloseMap[c.time] = c.close; });
  var candleTimes = _candles.map(function(c){ return c.time; });

  function nearestCandleTime(t){
    if(candleTimes.length === 0) return null;
    var lo = 0, hi = candleTimes.length - 1;
    while(lo < hi){
      var mid = (lo + hi) >> 1;
      if(candleTimes[mid] < t) lo = mid + 1;
      else hi = mid;
    }
    var best = candleTimes[lo];
    if(lo > 0 && Math.abs(candleTimes[lo-1] - t) < Math.abs(best - t)) best = candleTimes[lo-1];
    return best;
  }

  function dateToUnix(dateStr){
    return Math.floor(new Date(dateStr + 'T20:00:00Z').getTime() / 1000);
  }

  function getXY(timeVal){
    var candleT = nearestCandleTime(timeVal);
    if(candleT === null) return null;
    var x = ts.timeToCoordinate(candleT);
    if(x === null || x < 0 || x > _canvas.width) return null;
    var plotPrice = candleCloseMap[candleT];
    if(!plotPrice) return null;
    var y = _candleSeries.priceToCoordinate(plotPrice);
    if(y === null || y < 0 || y > _canvas.height) return null;
    return {x:x, y:y};
  }

  function drawCircle(x, y, radius, fillColor, strokeColor, lineWidth){
    _ctx.beginPath();
    _ctx.arc(x, y, radius, 0, Math.PI * 2);
    _ctx.fillStyle = fillColor;
    _ctx.fill();
    if(strokeColor){
      _ctx.strokeStyle = strokeColor;
      _ctx.lineWidth = lineWidth || 1;
      _ctx.stroke();
    }
  }

  function drawLabel(x, y, text, color){
    _ctx.font = '9px -apple-system, sans-serif';
    _ctx.fillStyle = color;
    _ctx.textAlign = 'center';
    _ctx.fillText(text, x, y + 20);
  }

  // Convert rank to percentile (rank 1 = top = p≈1.0, last rank = p≈0.0)
  function rankToP(rank, from, to){
    var range = Math.max(to - from, 1);
    return 1 - (rank - from) / range;
  }

  // Build sorted notional array for percentile computation within a set
  function buildPctLookup(values){
    var sorted = values.slice().sort(function(a,b){ return a - b; });
    return function(v){
      var lo = 0, hi = sorted.length;
      while(lo < hi){ var mid = (lo+hi)>>1; if(sorted[mid] < v) lo = mid+1; else hi = mid; }
      return sorted.length > 0 ? Math.min(0.99, lo / sorted.length) : 0.5;
    };
  }

  // Build ticker → color lookup from overlay tickers (writes to global for tooltip access)
  _tickerColorMap = {};
  _overlayTickers.forEach(function(t){ _tickerColorMap[t.ticker] = {stroke: t.stroke}; });
  // Fallback for tickers not in overlay
  var _defaultStroke = '#60a5fa';

  // ---- LAYER: Sweeps (per-ticker color, sized by notional percentile) ----
  if(_activeLayers.sweeps && _chartSweeps.length > 0){
    var sortedN = _chartSweeps.map(function(s){ return s.notional; }).sort(function(a,b){ return a - b; });
    var totalS = sortedN.length;
    function computePct(notional){
      var lo = 0, hi = totalS;
      while(lo < hi){ var mid = (lo+hi)>>1; if(sortedN[mid] < notional) lo = mid+1; else hi = mid; }
      return Math.min(99, Math.floor(lo / totalS * 100));
    }

    _chartSweeps.forEach(function(s){
      var pct = computePct(s.notional);
      // Filter: $ mode OR percentile mode (mutually exclusive)
      if(_sweepFilterMode === 'notional'){
        if(s.notional < _layerCfg.minNotional) return;
      } else {
        if(pct < _layerCfg.percentile) return;
      }

      var timeUnix;
      if(s.time && s.time.length >= 5){
        var dt = new Date(s.date + 'T' + s.time + '-04:00');
        timeUnix = Math.floor(dt.getTime() / 1000);
      } else {
        timeUnix = dateToUnix(s.date);
      }
      timeUnix = Math.floor(timeUnix / 60) * 60;

      var pos = getXY(timeUnix);
      if(!pos) return;

      var p = pct / 100;
      var radius = _bubbleRadius(p);
      var alpha = _bubbleAlpha(p);
      var tc = _tickerColorMap[s.ticker];
      var stroke = tc ? tc.stroke : _defaultStroke;
      // Parse stroke hex to rgb for fill with dynamic alpha
      var r = parseInt(stroke.slice(1,3),16), g = parseInt(stroke.slice(3,5),16), b = parseInt(stroke.slice(5,7),16);
      drawCircle(pos.x, pos.y, radius, 'rgba('+r+','+g+','+b+',' + (alpha * 0.75).toFixed(2) + ')', stroke, 1);
    });
  }

  // ---- LAYER: CB (yellow + red border, percentile-sized by notional) ----
  if(_activeLayers.cb){
    var cbNotionals = [];
    _chartEvents.forEach(function(ev){
      if(ev.event_type === 'clusterbomb' || ev.event_type === 'rare_sweep')
        cbNotionals.push(ev.total_notional || 0);
    });
    var cbPct = buildPctLookup(cbNotionals);

    _chartEvents.forEach(function(ev){
      if(ev.event_type !== 'clusterbomb' && ev.event_type !== 'rare_sweep') return;
      var pos = getXY(dateToUnix(ev.date));
      if(!pos) return;
      var p = cbPct(ev.total_notional || 0);
      var innerR = _bubbleRadius(p) * 0.6;
      var outerR = innerR + 4;
      drawCircle(pos.x, pos.y, outerR, 'rgba(220,38,38,0.20)', 'rgba(220,38,38,0.95)', 2);
      drawCircle(pos.x, pos.y, innerR, 'rgba(234,179,8,' + _bubbleAlpha(p).toFixed(2) + ')', '#eab308', 1);
      var label = 'CB';
      if(ev.sweep_count) label += ' (' + ev.sweep_count + ')';
      drawLabel(pos.x, pos.y + innerR - 2, label, '#eab308');
    });
  }

  // ---- LAYER: Monster (orange + red border, percentile-sized by max_notional) ----
  if(_activeLayers.monster){
    var mNotionals = [];
    _chartEvents.forEach(function(ev){
      if(ev.is_monster || ev.event_type === 'monster_sweep')
        mNotionals.push(ev.max_notional || ev.total_notional || 0);
    });
    var mPct = buildPctLookup(mNotionals);

    _chartEvents.forEach(function(ev){
      if(!ev.is_monster && ev.event_type !== 'monster_sweep') return;
      var pos = getXY(dateToUnix(ev.date));
      if(!pos) return;
      var val = ev.max_notional || ev.total_notional || 0;
      var p = mPct(val);
      var innerR = _bubbleRadius(p) * 0.7;
      var outerR = innerR + 4;
      drawCircle(pos.x, pos.y, outerR, 'rgba(220,38,38,0.15)', 'rgba(220,38,38,0.95)', 2);
      drawCircle(pos.x, pos.y, innerR, 'rgba(249,115,22,' + _bubbleAlpha(p).toFixed(2) + ')', '#f97316', 1);
      var label = val ? fmt$(val) + ' [M]' : '[M]';
      drawLabel(pos.x, pos.y + innerR, label, '#f97316');
    });
  }

  // ---- LAYER: Daily (amber, rank→percentile→exponential curve) ----
  if(_activeLayers.daily){
    _chartEvents.forEach(function(ev){
      var dr = ev.daily_rank;
      if(dr == null) return;
      if(dr < _layerCfg.dailyFrom || dr > _layerCfg.dailyTo) return;
      var pos = getXY(dateToUnix(ev.date));
      if(!pos) return;
      var p = rankToP(dr, _layerCfg.dailyFrom, _layerCfg.dailyTo);
      var radius = _bubbleRadius(p);
      var alpha = _bubbleAlpha(p);
      drawCircle(pos.x, pos.y, radius, 'rgba(245,158,11,' + alpha.toFixed(2) + ')', '#f59e0b', 1);
      drawLabel(pos.x, pos.y, 'D#' + dr, '#f59e0b');
    });
  }

  // ---- LAYER: Single (blue, rank→percentile→exponential curve) ----
  if(_activeLayers.single){
    _chartEvents.forEach(function(ev){
      var sr = ev.sweep_rank;
      if(sr == null) return;
      if(sr < _layerCfg.singleFrom || sr > _layerCfg.singleTo) return;
      var pos = getXY(dateToUnix(ev.date));
      if(!pos) return;
      var p = rankToP(sr, _layerCfg.singleFrom, _layerCfg.singleTo);
      var radius = _bubbleRadius(p);
      var alpha = _bubbleAlpha(p);
      drawCircle(pos.x, pos.y - 2, radius, 'rgba(59,130,246,' + alpha.toFixed(2) + ')', '#3b82f6', 1);
      drawLabel(pos.x, pos.y - 2, 'S#' + sr, '#3b82f6');
    });
  }

  // ---- LAYER: Rare (purple, percentile-sized by notional) ----
  if(_activeLayers.rare){
    var rareN = [];
    _chartEvents.forEach(function(ev){ if(ev.is_rare) rareN.push(ev.total_notional || 0); });
    var rarePct = buildPctLookup(rareN);

    _chartEvents.forEach(function(ev){
      if(!ev.is_rare) return;
      var pos = getXY(dateToUnix(ev.date));
      if(!pos) return;
      var p = rarePct(ev.total_notional || 0);
      var radius = _bubbleRadius(p) * 0.6;
      var alpha = _bubbleAlpha(p);
      drawCircle(pos.x, pos.y + 2, radius, 'rgba(167,139,250,' + alpha.toFixed(2) + ')', '#a78bfa', 1);
      drawLabel(pos.x, pos.y + 2, '[R]', '#c4b5fd');
    });
  }
}

// ====================================================================
// TOOLTIP
// ====================================================================
function onMouseMove(e){
  var rect = document.getElementById('chartContainer').getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var tooltip = document.getElementById('tooltipDiv');

  var anyLayer = _activeLayers.sweeps || _activeLayers.daily || _activeLayers.single || _activeLayers.rare || _activeLayers.cb || _activeLayers.monster;
  if(!anyLayer || (_chartEvents.length === 0 && _chartSweeps.length === 0)){
    tooltip.style.display = 'none';
    return;
  }

  var ts = _chart.timeScale();
  var candleTimes2 = _candles.map(function(c){ return c.time; });
  var candleCloseMap2 = {};
  _candles.forEach(function(c){ candleCloseMap2[c.time] = c.close; });

  function nearest2(t){
    if(candleTimes2.length === 0) return null;
    var lo = 0, hi = candleTimes2.length - 1;
    while(lo < hi){ var mid = (lo+hi)>>1; if(candleTimes2[mid]<t) lo=mid+1; else hi=mid; }
    var best = candleTimes2[lo];
    if(lo > 0 && Math.abs(candleTimes2[lo-1]-t) < Math.abs(best-t)) best = candleTimes2[lo-1];
    return best;
  }

  function dateToUnix2(d){ return Math.floor(new Date(d + 'T20:00:00Z').getTime() / 1000); }

  var hitRadius = 30;
  var hits = []; // collect ALL bubbles within range

  // Hit-test events (daily/single/rare/cb/monster)
  for(var i = 0; i < _chartEvents.length; i++){
    var ev = _chartEvents[i];
    var ct = nearest2(dateToUnix2(ev.date));
    if(ct === null) continue;
    var x = ts.timeToCoordinate(ct);
    if(x === null) continue;
    var plotPrice2 = candleCloseMap2[ct];
    if(!plotPrice2) continue;
    var y = _candleSeries.priceToCoordinate(plotPrice2);
    if(y === null) continue;
    var dist = Math.sqrt((mx-x)*(mx-x) + (my-y)*(my-y));
    if(dist < hitRadius){
      hits.push({type:'event', data:ev, dist:dist});
    }
  }

  // Hit-test individual sweeps
  if(_activeLayers.sweeps){
    for(var j = 0; j < _chartSweeps.length; j++){
      var s = _chartSweeps[j];
      var timeUnix;
      if(s.time && s.time.length >= 5){
        var dt = new Date(s.date + 'T' + s.time + '-04:00');
        timeUnix = Math.floor(dt.getTime() / 1000);
      } else {
        timeUnix = Math.floor(new Date(s.date + 'T20:00:00Z').getTime() / 1000);
      }
      timeUnix = Math.floor(timeUnix / 60) * 60;
      var ct2 = nearest2(timeUnix);
      if(ct2 === null) continue;
      var x2 = ts.timeToCoordinate(ct2);
      if(x2 === null) continue;
      var pp = candleCloseMap2[ct2];
      if(!pp) continue;
      var y2 = _candleSeries.priceToCoordinate(pp);
      if(y2 === null) continue;
      var d2 = Math.sqrt((mx-x2)*(mx-x2) + (my-y2)*(my-y2));
      if(d2 < hitRadius){
        hits.push({type:'sweep', data:s, dist:d2});
      }
    }
  }

  if(hits.length > 0){
    // Sort by distance (closest first)
    hits.sort(function(a,b){ return a.dist - b.dist; });
    // Cap at 15 to keep tooltip manageable
    if(hits.length > 15) hits = hits.slice(0, 15);

    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 12) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    var lines = [];

    if(hits.length > 1){
      lines.push('<b style="color:#94a3b8">' + hits.length + ' items</b>');
      lines.push('<hr style="border:0;border-top:1px solid #475569;margin:3px 0">');
    }

    hits.forEach(function(hit, idx){
      if(idx > 0) lines.push('<hr style="border:0;border-top:1px solid #334155;margin:2px 0">');
      if(hit.type === 'sweep'){
        var sw = hit.data;
        var tkr = sw.ticker || _activeTicker;
        var tc = _tickerColorMap[tkr];
        var clr = tc ? tc.stroke : '#60a5fa';
        lines.push('<b style="color:'+clr+'">' + tkr + '</b> ' + sw.date + (sw.time ? ' ' + sw.time : ''));
        if(sw.price) lines.push('Price: $' + Number(sw.price).toFixed(2));
        if(sw.notional) lines.push('Notional: $' + fmt$(sw.notional));
        if(sw.size) lines.push('Size: ' + sw.size.toLocaleString());
        if(sw.condition) lines.push('Type: ' + sw.condition);
      } else {
        var ev2 = hit.data;
        var tkr2 = ev2.ticker || _activeTicker;
        var tc2 = _tickerColorMap[tkr2];
        var clr2 = tc2 ? tc2.stroke : '#60a5fa';
        lines.push('<b style="color:'+clr2+'">' + tkr2 + '</b> ' + ev2.date);
        if(ev2.daily_rank) lines.push('Daily Rank: #' + ev2.daily_rank);
        if(ev2.sweep_rank) lines.push('Single Rank: #' + ev2.sweep_rank);
        if(ev2.total_notional) lines.push('Total: $' + fmt$(ev2.total_notional));
        if(ev2.sweep_count) lines.push('Sweeps: ' + ev2.sweep_count);
        if(ev2.is_rare) lines.push('<span style="color:#c4b5fd">[Rare]</span>');
        if(ev2.is_monster) lines.push('<span style="color:#f97316">[Monster]</span>');
        if(ev2.event_type === 'clusterbomb') lines.push('<span style="color:#eab308">[Clusterbomb]</span>');
        if(ev2.direction) lines.push('Direction: ' + ev2.direction);
      }
    });
    tooltip.innerHTML = lines.join('<br>');
  } else {
    tooltip.style.display = 'none';
  }
}

// ====================================================================
// CONTROLS
// ====================================================================
function onTickerToggle(el){
  var ticker = el.getAttribute('data-ticker');
  _overlayTickers.forEach(function(t){ if(t.ticker === ticker) t.on = el.checked; });
  syncGroupCheckboxes();
  // Re-fetch sweep data — the enabled ticker set changed
  fetchSweepChart();
}

function onGroupToggle(gi, el){
  var g = _overlayGroups[gi];
  g.on = el.checked;
  g.tickers.forEach(function(t){ t.on = el.checked; });
  var rows = document.querySelectorAll('[data-group="'+gi+'"] .ticker-check');
  rows.forEach(function(cb){ cb.checked = el.checked; });
  // Re-fetch sweep data — the enabled ticker set changed
  fetchSweepChart();
}

function syncGroupCheckboxes(){
  var hdrs = document.querySelectorAll('.ticker-group-hdr input');
  _overlayGroups.forEach(function(g, gi){
    if(!hdrs[gi]) return;
    var allOn = g.tickers.every(function(t){ return t.on; });
    var anyOn = g.tickers.some(function(t){ return t.on; });
    hdrs[gi].checked = allOn;
    hdrs[gi].indeterminate = !allOn && anyOn;
  });
}

function togglePanel(){
  var panel = document.getElementById('leftPanel');
  var btn = document.getElementById('collapseBtn');
  panel.classList.toggle('collapsed');
  btn.innerHTML = panel.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
  setTimeout(function(){
    var container = document.getElementById('chartContainer');
    _chart.resize(container.clientWidth, container.clientHeight);
    resizeCanvas();
    drawBubbles();
  }, 250);
}

function setCandleInterval(mins, btn){
  if(_candleInterval === mins) return;
  _candleInterval = mins;
  var btns = document.getElementById('candleIntervalCtrl').querySelectorAll('button');
  btns.forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  loadAll(true);
}

function _syncIntervalButtons(){
  var btns = document.getElementById('candleIntervalCtrl').querySelectorAll('button');
  var intervalMap = {'1m':1,'5m':5,'1h':60,'4h':240,'1D':1440,'2D':2880,'W':10080,'M':43200,'3M':129600};
  btns.forEach(function(b){
    b.classList.toggle('active', intervalMap[b.textContent] === _candleInterval);
  });
}

function toggleLayer(layer, btn){
  _activeLayers[layer] = !_activeLayers[layer];
  btn.classList.toggle('active', _activeLayers[layer]);
  drawBubbles();
  updateStats();
}

function setSweepFilterMode(mode){
  _sweepFilterMode = mode;
  document.getElementById('modeNotional').classList.toggle('active', mode === 'notional');
  document.getElementById('modePctl').classList.toggle('active', mode === 'percentile');
  var inp = document.getElementById('cfgSweepValue');
  if(mode === 'notional'){
    inp.value = _layerCfg.minNotional || 500000;
    inp.step = '100000';
    inp.min = '0';
    inp.max = '';
    inp.title = 'Min notional ($)';
    inp.placeholder = '500000';
  } else {
    inp.value = _layerCfg.percentile || 85;
    inp.step = '5';
    inp.min = '0';
    inp.max = '99';
    inp.title = 'Min percentile (0-99)';
    inp.placeholder = '85';
  }
  drawBubbles();
  updateStats();
  updateFeed();
}

function onLayerCfgChange(){
  var val = parseFloat(document.getElementById('cfgSweepValue').value) || 0;
  if(_sweepFilterMode === 'notional'){
    _layerCfg.minNotional = val;
  } else {
    _layerCfg.percentile = Math.min(99, Math.max(0, Math.floor(val)));
  }
  _layerCfg.dailyFrom = parseInt(document.getElementById('cfgDailyFrom').value) || 1;
  _layerCfg.dailyTo = parseInt(document.getElementById('cfgDailyTo').value) || 20;
  _layerCfg.singleFrom = parseInt(document.getElementById('cfgSingleFrom').value) || 1;
  _layerCfg.singleTo = parseInt(document.getElementById('cfgSingleTo').value) || 10;
  drawBubbles();
  updateStats();
  updateFeed();
}

// Always-live timers
function _startLiveTimers(){
  clearInterval(_sweepTimer);
  clearInterval(_candleTimer);
  _candleTimer = setInterval(fetchCandles, 60000);
  _sweepTimer = setInterval(fetchSweepChart, 30000);
}

document.addEventListener('visibilitychange', function(){
  if(!document.hidden){
    _startLiveTimers();
    fetchCandles();
  }
});

// ====================================================================
// STATS & FEED
// ====================================================================
function updateStats(){
  var events = _chartEvents.length;
  var totalN = 0, largest = 0;
  _chartEvents.forEach(function(ev){
    if(ev.total_notional){
      totalN += ev.total_notional;
      if(ev.total_notional > largest) largest = ev.total_notional;
    }
  });
  document.getElementById('statSweeps').textContent = events;
  document.getElementById('statNotional').textContent = '$' + fmt$(totalN);
  document.getElementById('statLargest').textContent = '$' + fmt$(largest);
}

function updateFeed(){
  var feed = document.getElementById('sweepFeed');
  // Show recent events (most recent first)
  var recent = _chartEvents.slice().reverse().slice(0, 30);
  if(recent.length === 0){
    feed.innerHTML = '<div style="color:#555;font-size:11px;">No events found</div>';
    return;
  }
  var html = '';
  recent.forEach(function(ev){
    var typeColor = '#888';
    var typeLabel = '';
    if(ev.event_type === 'clusterbomb'){ typeColor = '#eab308'; typeLabel = 'CB'; }
    else if(ev.event_type === 'rare_sweep'){ typeColor = '#c4b5fd'; typeLabel = 'Rare'; }
    else if(ev.event_type === 'monster_sweep'){ typeColor = '#f97316'; typeLabel = 'Monster'; }
    if(ev.daily_rank && !typeLabel){ typeColor = '#f59e0b'; typeLabel = 'D#' + ev.daily_rank; }
    if(ev.sweep_rank && !typeLabel){ typeColor = '#3b82f6'; typeLabel = 'S#' + ev.sweep_rank; }
    html += '<div class="feed-item">'
      + '<span class="feed-time">' + ev.date + '</span>'
      + '<span class="feed-ticker" style="color:'+typeColor+'">' + (typeLabel || 'Event') + '</span>'
      + '<span class="feed-notional">$' + fmt$(ev.total_notional || 0) + '</span>'
      + '</div>';
  });
  feed.innerHTML = html;
}

// ====================================================================
// UTILS
// ====================================================================
function fmt$(v){
  if(v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if(v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if(v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return v.toFixed(0);
}

// ====================================================================
// PRESETS (localStorage)
// ====================================================================
var PRESET_KEY = '0dte_presets_v4';

function _getPresets(){
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || {}; } catch(e){ return {}; }
}

function _populatePresetSelect(){
  var sel = document.getElementById('presetSelect');
  var presets = _getPresets();
  sel.innerHTML = '<option value="">Presets...</option>';
  Object.keys(presets).sort().forEach(function(name){
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function savePreset(){
  var name = prompt('Preset name:');
  if(!name || !name.trim()) return;
  name = name.trim();
  var cfg = {
    mode: _mode,
    ticker: _activeTicker,
    watchlist: _activeWatchlist,
    interval: _candleInterval,
    layers: JSON.parse(JSON.stringify(_activeLayers)),
    layerCfg: JSON.parse(JSON.stringify(_layerCfg)),
    sweepFilterMode: _sweepFilterMode,
    tickers: {}
  };
  // Save overlay ticker on/off state
  _overlayTickers.forEach(function(t){
    cfg.tickers[t.ticker] = t.on;
  });
  var presets = _getPresets();
  presets[name] = cfg;
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
  document.getElementById('presetSelect').value = name;
}

function loadPreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name) return;
  var presets = _getPresets();
  var cfg = presets[name];
  if(!cfg) return;

  // Restore layer toggles
  if(cfg.layers){
    _activeLayers = cfg.layers;
    // Ensure sweeps key exists for backward compat with v3 presets saved before sweeps layer
    if(_activeLayers.sweeps === undefined) _activeLayers.sweeps = true;
    ['sweeps','daily','single','rare','cb','monster'].forEach(function(l){
      var btn = document.querySelector('.lyr-' + l);
      if(btn) btn.classList.toggle('active', !!_activeLayers[l]);
    });
  }
  if(cfg.layerCfg){
    _layerCfg = cfg.layerCfg;
    // Restore sweep filter mode
    if(cfg.sweepFilterMode) _sweepFilterMode = cfg.sweepFilterMode;
    setSweepFilterMode(_sweepFilterMode);
    document.getElementById('cfgDailyFrom').value = _layerCfg.dailyFrom || 1;
    document.getElementById('cfgDailyTo').value = _layerCfg.dailyTo || 20;
    document.getElementById('cfgSingleFrom').value = _layerCfg.singleFrom || 1;
    document.getElementById('cfgSingleTo').value = _layerCfg.singleTo || 10;
  }

  // Restore interval
  if(cfg.interval){
    _candleInterval = cfg.interval;
    _syncIntervalButtons();
  }

  // Restore overlay ticker on/off states
  if(cfg.tickers){
    _overlayTickers.forEach(function(t){
      if(cfg.tickers.hasOwnProperty(t.ticker)){
        t.on = cfg.tickers[t.ticker];
      }
    });
  }

  // Restore mode
  if(cfg.mode === 'single' && cfg.ticker){
    _mode = 'single';
    _activeWatchlist = null;
    document.getElementById('watchlistSelect').value = '';
    setActiveTicker(cfg.ticker, 'input');
  } else if(cfg.watchlist){
    _mode = 'watchlist';
    _activeWatchlist = cfg.watchlist;
    document.getElementById('watchlistSelect').value = cfg.watchlist;
    buildWatchlistView();
    loadAll(true);
  }
}

function deletePreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name){ alert('Select a preset first'); return; }
  if(!confirm('Delete preset "'+name+'"?')) return;
  var presets = _getPresets();
  delete presets[name];
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
}

_populatePresetSelect();
</script>
