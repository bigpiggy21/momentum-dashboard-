<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBD Technologies — Chart</title>
<link rel="stylesheet" href="/static/header.css">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c0c14;color:#e0e0e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* Header */
.header{background:#0c0c14;padding:8px 12px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px;height:48px;z-index:10;}
.header-title{font-size:17px;font-weight:700;color:#f59e0b;white-space:nowrap;padding-left:8px;}
.header input[type="text"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 10px;border-radius:4px;font-size:13px;font-family:inherit;width:100px;font-weight:600;height:32px;}
.header input[type="text"]:focus{border-color:#f59e0b;outline:none;}
.header select{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit;height:32px;}
/* Divider */
.hdr-sep{width:1px;height:24px;background:#334155;flex-shrink:0;}
/* Sweep dropdown (same pattern as indicators) */
.sweep-dropdown{position:relative;display:inline-block;}
.sweep-dd-btn{background:#1e293b;color:#888;border:1px solid #334155;padding:5px 14px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:0.3px;height:32px;border-radius:4px;white-space:nowrap;}
.sweep-dd-btn:hover{color:#ccc;}
.sweep-dd-btn.has-active{color:#60a5fa;border-color:#60a5fa44;}
@keyframes leader-outline{0%{box-shadow:0 0 0 2px #f59e0b;}100%{box-shadow:0 0 0 2px transparent;}}
.sweep-dd-btn.leader-flash{animation:leader-outline 1.5s ease-out forwards;}
.sweep-dd-menu{display:none;position:absolute;top:36px;left:0;background:#14141e;border:1px solid #334155;border-radius:6px;min-width:200px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.6);padding:4px 0;}
.sweep-dd-menu.open{display:block;}
.sweep-dd-item{display:flex;align-items:center;padding:8px 14px;cursor:pointer;font-size:12px;color:#c8c8d4;gap:8px;transition:background 0.1s;}
.sweep-dd-item:hover{background:#1e293b;}
.sweep-dd-item .sw-check{width:14px;height:14px;border:1.5px solid #555;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.sweep-dd-item.active .sw-check{border-color:#60a5fa;background:#60a5fa22;color:#60a5fa;}
.sweep-dd-item .sw-swatch{width:12px;height:3px;border-radius:1px;flex-shrink:0;}
.sweep-dd-item .sw-label{flex:1;}
/* Placeholder dropdown buttons (disabled) */
.placeholder-btn{background:#1e293b;color:#444;border:1px solid #282838;padding:5px 14px;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:0.3px;height:32px;border-radius:4px;white-space:nowrap;cursor:default;opacity:0.45;}
/* Sweep filter mode toggle ($ vs Pctl) */
.sweep-filter{display:flex;align-items:center;gap:4px;}
.sweep-mode-btn{background:#1e293b;color:#555;border:1px solid #334155;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;height:32px;border-radius:4px 0 0 4px;}
.sweep-mode-btn:last-of-type{border-radius:0 4px 4px 0;border-left:none;}
.sweep-mode-btn.active{background:#60a5fa18;color:#60a5fa;border-color:#60a5fa44;}
.sweep-filter input[type="number"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 10px;border-radius:4px;font-size:13px;font-family:inherit;width:100px;height:32px;text-align:center;font-weight:600;}
.sweep-filter input[type="number"]:focus{border-color:#60a5fa;outline:none;}
/* Layer config inputs */
.lyr-cfg{display:flex;align-items:center;gap:3px;font-size:11px;color:#555;}
.lyr-cfg input[type="number"]{background:#14141e;border:1px solid #2a2a3a;color:#e0e0e8;padding:5px 8px;border-radius:4px;font-size:13px;font-family:inherit;width:48px;text-align:center;height:32px;font-weight:600;}
.lyr-cfg input[type="number"]:focus{border-color:#f59e0b;outline:none;}
.lyr-cfg .cfg-label{font-weight:600;}
/* Indicators dropdown */
.ind-dropdown{position:relative;display:inline-block;}
.ind-btn{background:#1e293b;color:#888;border:1px solid #334155;padding:5px 14px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:0.3px;height:32px;border-radius:4px;white-space:nowrap;}
.ind-btn:hover{color:#ccc;}
.ind-btn.has-active{color:#60a5fa;border-color:#60a5fa44;}
.ind-menu{display:none;position:absolute;top:36px;right:0;background:#14141e;border:1px solid #334155;border-radius:6px;min-width:200px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.6);padding:4px 0;}
.ind-menu.open{display:block;}
.ind-item{display:flex;align-items:center;padding:8px 14px;cursor:pointer;font-size:12px;color:#c8c8d4;gap:8px;transition:background 0.1s;}
.ind-item:hover{background:#1e293b;}
.ind-item .ind-check{width:14px;height:14px;border:1.5px solid #555;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.ind-item.active .ind-check{border-color:#60a5fa;background:#60a5fa22;color:#60a5fa;}
.ind-item .ind-swatch{width:12px;height:3px;border-radius:1px;flex-shrink:0;}
.ind-item .ind-label{flex:1;}
/* Chart settings dropdown (same pattern as indicators) */
.cs-dropdown{position:relative;display:inline-block;}
.cs-btn{background:#1e293b;color:#888;border:1px solid #334155;padding:5px 14px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:0.3px;height:32px;border-radius:4px;white-space:nowrap;}
.cs-btn:hover{color:#ccc;}
.cs-menu{display:none;position:absolute;top:36px;left:0;background:#14141e;border:1px solid #334155;border-radius:6px;min-width:180px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.6);padding:4px 0;}
.cs-menu.open{display:block;}
.cs-item{display:flex;align-items:center;padding:7px 14px;cursor:pointer;font-size:12px;color:#c8c8d4;gap:8px;transition:background 0.1s;user-select:none;}
.cs-item:hover{background:#1e293b;}
.cs-item .cs-key{color:#555;font-size:10px;min-width:56px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
.cs-item .cs-val{color:#e0e0e8;font-weight:600;}

/* TTM Squeeze sub-pane */
#ttmContainer{display:none;border-top:1px solid #1e1e2e;z-index:2;flex-shrink:0;}
.ttm-header{display:flex;align-items:center;gap:6px;padding:2px 8px;background:#0a0a12;border-bottom:1px solid #1e1e2e;height:22px;}
.ttm-header .ttm-label{font-size:10px;color:#555;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.ttm-toggle{background:#1e293b;color:#555;border:1px solid #334155;padding:1px 7px;cursor:pointer;font-size:10px;font-family:inherit;font-weight:600;border-radius:3px;height:18px;line-height:16px;}
.ttm-toggle:hover{color:#ccc;}
.ttm-toggle.active{color:#22c55e;border-color:#22c55e44;background:#22c55e11;}
#ttmChartArea{width:100%;height:calc(100% - 22px);position:relative;}

/* Layout */
.main{display:flex;flex:1;overflow:hidden;}
.left-panel{width:290px;min-width:290px;background:#0a0a12;border-right:1px solid #1e1e2e;padding:12px;overflow-y:auto;display:flex;flex-direction:column;transition:width 0.2s,min-width 0.2s,padding 0.2s;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.left-panel.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border-right:none;}
.chart-area{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;}
#chartContainer{width:100%;flex:1;position:relative;min-height:0;}
#bubbleCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
#tickerOverlay{position:absolute;top:12px;left:12px;z-index:6;pointer-events:none;font-family:'Inter',sans-serif;}
#tickerOverlay .overlay-ticker{font-size:26px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1px;}
#tickerOverlay .overlay-name{font-size:13px;font-weight:400;color:rgba(255,255,255,0.2);margin-top:1px;}
#tooltipDiv{position:absolute;display:none;background:rgba(0,0,0,0.92);border:1px solid #334155;border-radius:4px;padding:5px 8px;font-size:11px;color:#c8c8d4;pointer-events:none;z-index:10;white-space:nowrap;line-height:1.5;}

/* Left panel sections */
.panel-section{margin-bottom:12px;}
.panel-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}

/* Watchlist dropdown */
#watchlistSelect{width:100%;background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:6px 10px;border-radius:4px;font-size:12px;font-family:inherit;margin-bottom:12px;}

/* Ticker list — fills available space, scrollable */
.ticker-list{min-height:80px;max-height:calc(50vh - 48px);overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.ticker-list::-webkit-scrollbar{width:6px;}
.ticker-list::-webkit-scrollbar-track{background:#0a0a12;}
.ticker-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.ticker-list-item{display:flex;align-items:center;gap:0;padding:3px 6px;cursor:pointer;border-radius:4px;font-size:12.5px;}
.ticker-list-item:hover{background:#14141e;}
.ticker-list-item.active{background:#f59e0b15;border-left:2px solid #f59e0b;}
.ticker-list-item .tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ticker-list-item .tl-ticker{font-weight:600;min-width:40px;flex-shrink:0;}
.ticker-list-item .tl-price{color:#ccc;margin-left:auto;width:62px;text-align:right;font-size:12px;font-weight:500;font-family:'SF Mono','Consolas',monospace;flex-shrink:0;}
.ticker-list-item .tl-ext{width:56px;text-align:right;font-size:12px;font-weight:600;font-family:'SF Mono','Consolas',monospace;flex-shrink:0;display:none;}
.ticker-list-item .tl-change{width:56px;text-align:right;font-size:12px;font-weight:600;font-family:'SF Mono','Consolas',monospace;flex-shrink:0;}
.tl-change.pos{color:#26a69a;}
.tl-change.neg{color:#ef5350;}
.tl-ext.pos{color:#26a69a;}
.tl-ext.neg{color:#ef5350;}
body.ext-hours .tl-ext{display:inline;}
/* Price flash animation */
@keyframes flash-green{0%{background:#26a69a55;color:#26a69a;}50%{color:#26a69a;}100%{background:transparent;color:#ccc;}}
@keyframes flash-red{0%{background:#ef535055;color:#ef5350;}50%{color:#ef5350;}100%{background:transparent;color:#ccc;}}
.tl-price.flash-up{animation:flash-green 0.8s ease-out forwards;}
.tl-price.flash-down{animation:flash-red 0.8s ease-out forwards;}

/* Overlay checkboxes section — never scrolls, always full height */
.overlay-section{margin-top:8px;margin-bottom:8px;flex-shrink:0;}
.overlay-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 8px;}
.ticker-group-hdr{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;margin-top:6px;grid-column:1/-1;}
.ticker-group-hdr:first-child{margin-top:0;}
.ticker-group-hdr input{accent-color:#f59e0b;}
.ticker-group-hdr span{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.ticker-group-hdr:hover span{color:#ccc;}
.ticker-row{display:flex;align-items:center;gap:6px;padding:3px 0 3px 4px;cursor:pointer;font-size:11px;}
.ticker-row:hover{background:#14141e;border-radius:4px;}
.ticker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ticker-label{font-size:11px;font-weight:600;}
.ticker-check{accent-color:#f59e0b;width:13px;height:13px;}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
.stat-val{color:#f59e0b;font-weight:600;}

/* Buttons */
.ctrl-btn{background:#1e293b;color:#e2e8f0;border:1px solid #334155;padding:6px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;width:100%;}
.ctrl-btn:hover{background:#334155;}
.ctrl-btn.active{background:#f59e0b22;color:#f59e0b;border-color:#f59e0b66;}

/* Segmented control */
.seg-ctrl{display:inline-flex;border:1px solid #334155;border-radius:4px;overflow:hidden;}
.seg-ctrl button{background:#1e293b;color:#888;border:none;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;border-right:1px solid #334155;font-weight:600;height:32px;}
.seg-ctrl button:last-child{border-right:none;}
.seg-ctrl button:hover{color:#ccc;}
.seg-ctrl button.active{background:#f59e0b22;color:#f59e0b;}
.collapse-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:#1e293b;border:1px solid #334155;border-left:none;color:#888;padding:8px 4px;cursor:pointer;border-radius:0 4px 4px 0;z-index:6;font-size:10px;}
.collapse-btn:hover{color:#f59e0b;}

/* Sweep feed */
.feed{margin-top:8px;flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0a0a12;}
.feed::-webkit-scrollbar{width:6px;}
.feed::-webkit-scrollbar-track{background:#0a0a12;}
.feed::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
.feed::-webkit-scrollbar-thumb:hover{background:#555;}
.feed-item{font-size:11px;padding:4px 0;border-bottom:1px solid #1a1a26;display:flex;gap:6px;}
.feed-time{color:#555;min-width:55px;}
.feed-ticker{font-weight:600;min-width:32px;}
.feed-notional{color:#f59e0b;margin-left:auto;}
</style>
</head>
<body>

<!-- ROW 1: Global Navigation Bar (shared) -->
<script>window._activePage='chart';</script>
<div id="headerRow1"></div>
<script src="/static/header.js"></script>

<div class="header">
  <div class="header-title">Chart</div>
  <input type="text" id="tickerInput" placeholder="Ticker..." spellcheck="false">
  <div class="hdr-sep"></div>
  <div class="cs-dropdown" id="csDropdown">
    <button class="cs-btn" onclick="toggleCsMenu()">Chart &#x25BE;</button>
    <div class="cs-menu" id="csMenu"></div>
  </div>
  <div class="hdr-sep"></div>
  <div class="seg-ctrl" id="candleIntervalCtrl">
    <button class="active" onclick="setCandleInterval(1,this)">1m</button>
    <button onclick="setCandleInterval(5,this)">5m</button>
    <button onclick="setCandleInterval(60,this)">1h</button>
    <button onclick="setCandleInterval(240,this)">4h</button>
    <button onclick="setCandleInterval(1440,this)">1D</button>
    <button onclick="setCandleInterval(2880,this)">2D</button>
    <button onclick="setCandleInterval(10080,this)">W</button>
    <button onclick="setCandleInterval(43200,this)">M</button>
    <button onclick="setCandleInterval(129600,this)">3M</button>
  </div>
  <div class="hdr-sep"></div>
  <button class="placeholder-btn" title="Coming soon">All &#x25BE;</button>
  <button class="placeholder-btn" title="Coming soon">Blocks &#x25BE;</button>
  <div class="sweep-dropdown" id="sweepDropdown">
    <button class="sweep-dd-btn has-active" id="sweepDdBtn" onclick="toggleSweepMenu()">Sweeps &#x25BE;</button>
    <div class="sweep-dd-menu" id="sweepDdMenu"></div>
  </div>
  <div class="sweep-filter">
    <button class="sweep-mode-btn active" id="modeNotional" onclick="setSweepFilterMode('notional')">$</button><button class="sweep-mode-btn" id="modePctl" onclick="setSweepFilterMode('percentile')">Pctl</button>
    <input type="number" id="cfgSweepValue" value="500000" step="100000" min="0" onchange="onLayerCfgChange()" title="Min notional ($)">
  </div>
  <div class="lyr-cfg">
    <span class="cfg-label" style="color:#f59e0b;">D</span><input type="number" id="cfgDailyFrom" value="1" min="1" onchange="onLayerCfgChange()">–<input type="number" id="cfgDailyTo" value="20" min="1" onchange="onLayerCfgChange()">
    <span class="cfg-label" style="color:#3b82f6;margin-left:3px;">S</span><input type="number" id="cfgSingleFrom" value="1" min="1" onchange="onLayerCfgChange()">–<input type="number" id="cfgSingleTo" value="10" min="1" onchange="onLayerCfgChange()">
  </div>
  <div class="hdr-sep"></div>
  <select id="presetSelect" style="width:120px;" onchange="loadPreset()">
    <option value="">Presets...</option>
  </select>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;" onclick="savePreset()">Save</button>
  <button class="ctrl-btn" style="width:auto;padding:5px 10px;font-size:11px;color:#ef4444;" onclick="deletePreset()">Del</button>
  <div class="hdr-sep"></div>
  <div class="ind-dropdown" id="indDropdown">
    <button class="ind-btn" id="indBtn" onclick="toggleIndMenu()">Indicators &#x25BE;</button>
    <div class="ind-menu" id="indMenu"></div>
  </div>
</div>

<div class="main">
  <div class="left-panel" id="leftPanel">
    <div class="panel-section">
      <select id="watchlistSelect" onchange="onWatchlistChange()">
        <option value="">-- Select Watchlist --</option>
      </select>
      <div class="ticker-list" id="tickerListBox">
        <!-- Populated by JS -->
      </div>
    </div>
    <div class="overlay-section" id="overlaySection" style="display:none;">
      <div class="panel-label">Overlay Tickers</div>
      <div class="overlay-grid" id="overlayList">
        <!-- Group checkboxes populated by JS -->
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Sweep Events</div>
      <div id="statsBox">
        <div class="stat-row"><span>Events</span><span class="stat-val" id="statSweeps">0</span></div>
        <div class="stat-row"><span>Total $</span><span class="stat-val" id="statNotional">$0</span></div>
        <div class="stat-row"><span>Largest</span><span class="stat-val" id="statLargest">$0</span></div>
      </div>
    </div>
    <div class="panel-section" style="display:flex;flex-direction:column;min-height:0;max-height:200px;">
      <div class="panel-label">Recent Sweeps</div>
      <div class="feed" id="sweepFeed">
        <div style="color:#555;font-size:11px;">No data yet</div>
      </div>
    </div>
  </div>
  <div class="chart-area">
    <button class="collapse-btn" id="collapseBtn" onclick="togglePanel()">&#x25C0;</button>
    <div id="chartContainer"></div>
    <canvas id="bubbleCanvas"></canvas>
    <div id="tickerOverlay"></div>
    <div id="tooltipDiv"></div>
    <div id="ttmContainer">
      <div class="ttm-header">
        <span class="ttm-label">TTM Squeeze</span>
        <button class="ttm-toggle active" id="ttmTogHist" onclick="_ttmSubToggle('hist',this)">Hist</button>
        <button class="ttm-toggle active" id="ttmTogSqz" onclick="_ttmSubToggle('sqz',this)">Sqz</button>
        <button class="ttm-toggle active" id="ttmTogAccel" onclick="_ttmSubToggle('accel',this)">Accel</button>
        <button class="ttm-toggle active" id="ttmTogThrust" onclick="_ttmSubToggle('thrust',this)">Thrust</button>
      </div>
      <div id="ttmChartArea"></div>
    </div>
  </div>
</div>

<script>
// ====================================================================
// WATCHLIST & OVERLAY CONFIG
// ====================================================================
// Color palette for auto-assigning overlay tickers
var _COLORS = [
  {c:'rgba(59,130,246,0.45)',s:'#60a5fa'},{c:'rgba(234,179,8,0.45)',s:'#fbbf24'},
  {c:'rgba(16,185,129,0.45)',s:'#34d399'},{c:'rgba(239,68,68,0.45)',s:'#f87171'},
  {c:'rgba(139,92,246,0.45)',s:'#a78bfa'},{c:'rgba(249,115,22,0.45)',s:'#fb923c'},
  {c:'rgba(236,72,153,0.45)',s:'#f472b6'},{c:'rgba(6,182,212,0.45)',s:'#22d3ee'},
  {c:'rgba(168,85,247,0.45)',s:'#c084fc'},{c:'rgba(20,184,166,0.45)',s:'#2dd4bf'},
  {c:'rgba(220,38,38,0.45)',s:'#f87171'},{c:'rgba(107,114,128,0.45)',s:'#9ca3af'},
  {c:'rgba(148,163,184,0.45)',s:'#cbd5e1'},{c:'rgba(156,163,175,0.45)',s:'#d1d5db'},
  {c:'rgba(75,85,99,0.45)',s:'#9ca3af'},
];

// Priority watchlist — the ~80 parent tickers (from priority_watchlist.py)
var WATCHLISTS = {
  Priority: [
    // S&P 500
    {ticker:'SPY', label:'SPY', group:'S&P 500'},
    // NDX 100
    {ticker:'QQQ', label:'QQQ', group:'NDX 100'},
    // Sectors
    {ticker:'TLT', label:'TLT', group:'Sectors'},
    {ticker:'IEF', label:'IEF', group:'Sectors'},
    {ticker:'SMH', label:'SMH', group:'Sectors'},
    {ticker:'XLE', label:'XLE', group:'Sectors'},
    {ticker:'XLF', label:'XLF', group:'Sectors'},
    // Semis
    {ticker:'NVDA', label:'NVDA', group:'Semis'},
    {ticker:'AVGO', label:'AVGO', group:'Semis'},
    {ticker:'TSM',  label:'TSM',  group:'Semis'},
    {ticker:'AMD',  label:'AMD',  group:'Semis'},
    {ticker:'MU',   label:'MU',   group:'Semis'},
    {ticker:'SMCI', label:'SMCI', group:'Semis'},
    {ticker:'ASML', label:'ASML', group:'Semis'},
    {ticker:'INTC', label:'INTC', group:'Semis'},
    // Mags
    {ticker:'AAPL', label:'AAPL', group:'Mags'},
    {ticker:'AMZN', label:'AMZN', group:'Mags'},
    {ticker:'GOOG', label:'GOOG', group:'Mags'},
    {ticker:'NFLX', label:'NFLX', group:'Mags'},

var _indicators = {};

function registerIndicator(cfg){
  _indicators[cfg.id] = {
    id: cfg.id, name: cfg.name, enabled: false,
    color: cfg.color || '#888',        // swatch color for menu
    hotkey: cfg.hotkey || null,        // keyboard shortcut (e.g. 'b', 'd')
    series: [],                        // LightweightCharts series (created on enable)
    createSeries: cfg.createSeries,    // fn(chart) → creates series objects, stores in .series
    compute: cfg.compute,              // fn(candles, ind) → sets data on series
    remove: cfg.remove || function(){  // cleanup (custom or default)
      var ind = _indicators[cfg.id];
      ind.series.forEach(function(s){ _chart.removeSeries(s); });
      ind.series = [];
    }
  };
}

function toggleIndicator(id){
  var ind = _indicators[id];
  if(!ind) return;
  // Volume: 3-state cycle (off → bars → bars+MA → off)
  if(id === 'volume'){
    _volumeMode = (_volumeMode + 1) % 3;
    if(ind.enabled) ind.remove(); // tear down current
    if(_volumeMode === 0){
      ind.enabled = false;
    } else {
      ind.enabled = true;
      ind.createSeries(_chart);
      ind.compute(_candles, ind);
    }
    buildIndMenu();
    updateIndBtnState();
    return;
  }
  ind.enabled = !ind.enabled;
  if(ind.enabled){
    ind.createSeries(_chart);
    ind.compute(_candles, ind);
  } else {
    ind.remove();
  }
  buildIndMenu();
  updateIndBtnState();
}

function recomputeIndicators(){
  Object.keys(_indicators).forEach(function(id){
    var ind = _indicators[id];
    if(ind.enabled && ind.series.length > 0){
      ind.compute(_candles, ind);
    }
  });
}

function removeAllIndicatorSeries(){
  // Called on ticker change — removes series so they can be recreated with fresh data
  Object.keys(_indicators).forEach(function(id){
    var ind = _indicators[id];
    if(!ind.enabled) return;
    if(id === 'ttm'){
      // Destroy chart internals but keep pane visible (no hide/show flicker)
      _ttmDestroyChart();
      ind.series = [];
      // Don't call _ttmHidePane — pane stays visible, avoids async resize thrash
    } else {
      ind.remove();
    }
  });
}

function recreateEnabledIndicators(){
  // Called after candle load on ticker change — recreates series for enabled indicators
  Object.keys(_indicators).forEach(function(id){
    var ind = _indicators[id];
    if(ind.enabled && ind.series.length === 0){
      ind.createSeries(_chart);
      ind.compute(_candles, ind);
    }
  });
}

// Sweep layer hotkey map: 1=Sweeps, 2=Daily, 3=Single, 4=Rare, 5=CB, 6=Monster
var _sweepHotkeyMap = {'1':'sweeps','2':'daily','3':'single','4':'rare','5':'cb','6':'monster'};

document.addEventListener('keydown', function(e){
  // Skip if typing in an input
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  var key = e.key.toLowerCase();

  // Leader mode active — handle sub-keys
  if(_leaderKey === 's'){
    e.preventDefault();
    if(_sweepHotkeyMap[key]){
      toggleLayerFromMenu(_sweepHotkeyMap[key]);
      // Reset timer — stay in leader mode for chaining
      clearTimeout(_leaderTimer);
      _leaderTimer = setTimeout(_clearLeader, 1500);
    } else {
      _clearLeader();
    }
    return;
  }

  // S = enter sweep leader mode (or master toggle on double-tap)
  if(key === 's'){
    e.preventDefault();
    _leaderKey = 's';
    _showLeader();
    clearTimeout(_leaderTimer);
    _leaderTimer = setTimeout(function(){
      // If still in leader mode after timeout, do master toggle
      if(_leaderKey === 's'){
        masterToggleSweeps();
      }
      _clearLeader();
    }, 1500);
    return;
  }

  // / = focus ticker input (TradingView-style search shortcut)
  if(key === '/'){
    e.preventDefault();
    var ti = document.getElementById('tickerInput');
    ti.focus();
    ti.select();
    return;
  }

  // Indicator hotkeys
  Object.keys(_indicators).forEach(function(id){
    if(_indicators[id].hotkey === key){
      e.preventDefault();
      toggleIndicator(id);
    }
  });
});

function masterToggleSweeps(){
  var anyOn = _sweepLayers.some(function(lyr){ return _activeLayers[lyr.id]; });
  if(anyOn){
    // Save current state, turn all off
    _sweepLayerSnapshot = {};
    _sweepLayers.forEach(function(lyr){ _sweepLayerSnapshot[lyr.id] = _activeLayers[lyr.id]; _activeLayers[lyr.id] = false; });
  } else {
    // Restore saved state (or default all-on)
    if(_sweepLayerSnapshot){
      _sweepLayers.forEach(function(lyr){ _activeLayers[lyr.id] = _sweepLayerSnapshot[lyr.id]; });
    } else {
      _sweepLayers.forEach(function(lyr){ _activeLayers[lyr.id] = true; });
    }
    _sweepLayerSnapshot = null;
    // Fetch sweep data if we skipped it earlier
    if(_chartSweeps.length === 0 && _chartEvents.length === 0){
      fetchSweepChart();
      fetchAnchorBars();
    }
  }
  updateDailyHist();
  drawBubbles();
  updateStats();
  buildSweepMenu();
  updateSweepBtnState();
}

// BOLLINGER BANDS INDICATOR
// 20-period SMA (orange) + 2σ upper/lower bands (grey, step-line)
// ====================================================================
registerIndicator({
  id: 'bb',
  name: 'Bollinger Bands (20, 2)',
  color: '#ff8c00',
  hotkey: 'b',
  createSeries: function(chart){
    var ind = _indicators['bb'];
    // Basis (20 SMA) — orange solid line
    var basis = chart.addLineSeries({
      color: '#ff8c00', lineWidth: 2, lineStyle: 0,
      priceLineVisible: false, lastValueVisible: false,
      crosshairMarkerVisible: false,
    });
    // Upper band — grey step line
    var upper = chart.addLineSeries({
      color: '#b2af9d', lineWidth: 1, lineStyle: 0,
      lineType: 1, // stepLine
      priceLineVisible: false, lastValueVisible: false,
      crosshairMarkerVisible: false,
    });
    // Lower band — grey step line
    var lower = chart.addLineSeries({
      color: '#b2af9d', lineWidth: 1, lineStyle: 0,
      lineType: 1, // stepLine
      priceLineVisible: false, lastValueVisible: false,
      crosshairMarkerVisible: false,
    });
    ind.series = [basis, upper, lower];
  },
  compute: function(candles, ind){
    if(!candles || candles.length < 20) return;
    var period = 20, mult = 2.0;
    var basisData = [], upperData = [], lowerData = [];

    for(var i = period - 1; i < candles.length; i++){
      // Compute SMA
      var sum = 0;
      for(var j = i - period + 1; j <= i; j++) sum += candles[j].close;
      var sma = sum / period;

      // Compute stddev
      var sqSum = 0;
      for(var j = i - period + 1; j <= i; j++){
        var diff = candles[j].close - sma;
        sqSum += diff * diff;
      }
      var std = Math.sqrt(sqSum / period);

      var t = candles[i].time;
      basisData.push({time: t, value: sma});
      upperData.push({time: t, value: sma + mult * std});
      lowerData.push({time: t, value: sma - mult * std});
    }

    ind.series[0].setData(basisData);
    ind.series[1].setData(upperData);
    ind.series[2].setData(lowerData);
  }
});

// BB DEVIATION SIGNALS — buy/sell markers + multi-TF table
// Open below lower BB + close above = Buy (B)
// Open above upper BB + close below = Sell (S)
// ====================================================================
var _bbDevTable = null;  // DOM element for multi-TF table
var _bbDevFetchAbort = null; // AbortController for multi-TF fetches
var _bbDevSignals = [];  // [{time, buy, sell}] — stored for canvas drawing in drawBubbles()

// Map _candleInterval to minutes (for highlighting current TF in dev table)
var _INTERVAL_MINS = {1:1, 5:5, 60:60, 240:240, 1440:1440, 2880:2880, 10080:10080, 43200:43200, 129600:129600};

function _computeBBDev(candles){
  // Returns array of {time, buy, sell} for each candle that has enough history
  if(!candles || candles.length < 20) return [];
  var period = 20, mult = 2.0;
  var signals = [];
  for(var i = period - 1; i < candles.length; i++){
    var sum = 0;
    for(var j = i - period + 1; j <= i; j++) sum += candles[j].close;
    var sma = sum / period;
    var sqSum = 0;
    for(var j = i - period + 1; j <= i; j++){
      var diff = candles[j].close - sma;
      sqSum += diff * diff;
    }
    var std = Math.sqrt(sqSum / period);
    var upper = sma + mult * std;
    var lower = sma - mult * std;
    var c = candles[i];
    var buy = c.open < lower && c.close > lower;
    var sell = c.open > upper && c.close < upper;
    if(buy || sell) signals.push({time: c.time, buy: buy, sell: sell});
  }
  return signals;
}

function _renderBBDevTable(results){

      + '<td style="padding:3px 8px 3px 6px;text-align:center;"><span style="display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;border-radius:3px;background:'+sellBg+';color:#fff;font-size:9px;font-weight:700;">'+(r.sell?'S':'')+'</span></td></tr>';
  });

function _fetchMultiTFDevSignals(){
  // Single server-side endpoint — uses CSV cache, no Polygon API calls
  if(_bbDevFetchAbort) _bbDevFetchAbort.abort();
  _bbDevFetchAbort = new AbortController();
  var signal = _bbDevFetchAbort.signal;
  var currentMins = _INTERVAL_MINS[_candleInterval] || _candleInterval;

  fetch('/api/chart/bb-signals?ticker='+_activeTicker, {signal: signal})
    .then(function(r){ return r.json(); })
    .then(function(d){
      var sigs = d.signals || [];
      var tfMinsMap = {'1H':60,'4H':240,'D':1440,'2D':2880,'W':10080,'M':43200,'3M':129600};
      var results = sigs.map(function(s){
        return {label: s.tf, buy: s.buy, sell: s.sell, current: (tfMinsMap[s.tf]||0) === currentMins};
      });
      _renderBBDevTable(results);
    })
    .catch(function(e){
      if(e.name !== 'AbortError') console.warn('BB dev fetch error:', e);
    });
}

// ====================================================================
// TTM SQUEEZE INDICATOR — sub-pane with momentum histogram, squeeze dots,
// acceleration background, and thrust/dump arrows
// ====================================================================
var _ttmChart = null;        // Second LightweightCharts instance
var _ttmMomSeries = null;    // Histogram — momentum bars
var _ttmSqzSeries = null;    // Histogram — squeeze dots at zero line
var _ttmAccelSeries = null;  // Histogram — acceleration background (wide bars behind momentum)
var _ttmZeroSeries = null;   // Line — zero reference line
var _ttmSyncing = false;     // Guard against infinite sync loop
var _ttmSubs = {hist:true, sqz:true, accel:true, thrust:true}; // Sub-toggle states

// --- TTM math helpers (ported from indicators.py) ---
function _ttm_sma(values, period){
  var out = new Array(values.length);
  for(var i = 0; i < values.length; i++){
    if(i < period - 1){ out[i] = NaN; continue; }
    var s = 0;
    for(var j = i - period + 1; j <= i; j++) s += values[j];
    out[i] = s / period;
  }
  return out;
}

function _ttm_stdev(values, period){
  var means = _ttm_sma(values, period);
  var out = new Array(values.length);
  for(var i = 0; i < values.length; i++){
    if(isNaN(means[i])){ out[i] = NaN; continue; }
    var sqSum = 0;
    for(var j = i - period + 1; j <= i; j++){
      var d = values[j] - means[i];
      sqSum += d * d;
    }
    out[i] = Math.sqrt(sqSum / period); // population stddev (ddof=0)
  }
  return out;
}

function _ttm_highest(values, period){
  var out = new Array(values.length);
  for(var i = 0; i < values.length; i++){
    if(i < period - 1){ out[i] = NaN; continue; }
    var mx = -Infinity;
    for(var j = i - period + 1; j <= i; j++) if(values[j] > mx) mx = values[j];
    out[i] = mx;
  }
  return out;
}

function _ttm_lowest(values, period){
  var out = new Array(values.length);
  for(var i = 0; i < values.length; i++){
    if(i < period - 1){ out[i] = NaN; continue; }
    var mn = Infinity;
    for(var j = i - period + 1; j <= i; j++) if(values[j] < mn) mn = values[j];
    out[i] = mn;
  }
  return out;
}

function _ttm_tr(candles){
  // True Range: max(H-L, |H-prevC|, |L-prevC|)
  var out = new Array(candles.length);
  out[0] = candles[0].high - candles[0].low;
  for(var i = 1; i < candles.length; i++){
    var h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
    out[i] = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
  }
  return out;
}

function _ttm_linreg(values, period, offset){
  // Rolling linear regression value at (period-1-offset) position
  // Matches TradingView linreg() and indicators.py implementation
  var n = period;
  var sumX = n * (n - 1) / 2;
  var sumX2 = n * (n - 1) * (2 * n - 1) / 6;
  var denom = n * sumX2 - sumX * sumX;
  var out = new Array(values.length);
  for(var i = 0; i < values.length; i++){
    if(i < n - 1){ out[i] = NaN; continue; }
    var hasNaN = false;
    var sumY = 0, sumXY = 0;
    for(var j = 0; j < n; j++){
      var v = values[i - n + 1 + j];
      if(isNaN(v)){ hasNaN = true; break; }
      sumY += v;
      sumXY += j * v;
    }
    if(hasNaN){ out[i] = NaN; continue; }
    var slope = (n * sumXY - sumX * sumY) / denom;
    var intercept = (sumY - slope * sumX) / n;
    out[i] = intercept + slope * (n - 1 - offset);
  }
  return out;
}

function _ttm_change(values){
  var out = new Array(values.length);
  out[0] = NaN;
  for(var i = 1; i < values.length; i++){
    out[i] = (isNaN(values[i]) || isNaN(values[i-1])) ? NaN : values[i] - values[i-1];
  }
  return out;
}

// --- TTM Squeeze computation ---
function _computeTTM(candles){
  if(!candles || candles.length < 40) return null;
  var len = 20, bbMult = 2.0, kcHigh = 1.0, kcMid = 1.5, kcLow = 2.0;
  var n = candles.length;

  // Extract OHLC arrays
  var closes = new Array(n), highs = new Array(n), lows = new Array(n);
  for(var i = 0; i < n; i++){
    closes[i] = candles[i].close;
    highs[i] = candles[i].high;
    lows[i] = candles[i].low;
  }

  // --- Momentum ---
  var hh = _ttm_highest(highs, len);
  var ll = _ttm_lowest(lows, len);
  var smaClose = _ttm_sma(closes, len);
  // midline = (hh + ll) / 2;  basis = (midline + sma) / 2
  var delta = new Array(n);
  for(var i = 0; i < n; i++){
    if(isNaN(hh[i]) || isNaN(ll[i]) || isNaN(smaClose[i])){ delta[i] = NaN; continue; }
    var midline = (hh[i] + ll[i]) / 2;
    var basis = (midline + smaClose[i]) / 2;
    delta[i] = closes[i] - basis;
  }
  var mom = _ttm_linreg(delta, len, 0);

  // Momentum color: cyan (pos+rising), blue (pos+falling), yellow (neg+rising), red (neg+falling)
  var momColor = new Array(n);
  for(var i = 0; i < n; i++){
    if(isNaN(mom[i])){ momColor[i] = null; continue; }
    var rising = (i > 0 && !isNaN(mom[i-1])) ? mom[i] > mom[i-1] : false;
    if(mom[i] > 0){
      momColor[i] = rising ? '#00e5ff' : '#2962ff'; // cyan / blue
    } else {
      momColor[i] = rising ? '#ffeb3b' : '#ff1744'; // yellow / red
    }
  }

  // --- Squeeze state ---
  var bbBasis = smaClose;
  var bbDev = _ttm_stdev(closes, len);
  var tr = _ttm_tr(candles);
  var atr = _ttm_sma(tr, len);

  var sqzColor = new Array(n);
  for(var i = 0; i < n; i++){
    if(isNaN(bbBasis[i]) || isNaN(bbDev[i]) || isNaN(atr[i])){ sqzColor[i] = null; continue; }
    var bbUpper = bbBasis[i] + bbMult * bbDev[i];
    var bbLower = bbBasis[i] - bbMult * bbDev[i];
    var kcU_high = bbBasis[i] + atr[i] * kcHigh;
    var kcL_high = bbBasis[i] - atr[i] * kcHigh;
    var kcU_mid  = bbBasis[i] + atr[i] * kcMid;
    var kcL_mid  = bbBasis[i] - atr[i] * kcMid;
    var kcU_low  = bbBasis[i] + atr[i] * kcLow;
    var kcL_low  = bbBasis[i] - atr[i] * kcLow;
    // Squeeze uses OR logic (matching indicators.py)
    var lowSqz  = (bbLower >= kcL_low)  || (bbUpper <= kcU_low);
    var midSqz  = (bbLower >= kcL_mid)  || (bbUpper <= kcU_mid);
    var highSqz = (bbLower >= kcL_high) || (bbUpper <= kcU_high);
    // Priority: orange (tightest) > red > black > green (no squeeze)
    if(highSqz)      sqzColor[i] = '#ff9800'; // orange
    else if(midSqz)  sqzColor[i] = '#ff1744'; // red
    else if(lowSqz)  sqzColor[i] = '#212121'; // black (dark)
    else              sqzColor[i] = '#00c853'; // green
  }

  // --- Acceleration (2nd derivative of momentum) ---
  var momChange = _ttm_change(mom);
  var momSlope = _ttm_linreg(momChange, len, 0);
  var momAccel = _ttm_change(momSlope);

  // Acceleration background color
  var accelColor = new Array(n);
  for(var i = 0; i < n; i++){
    if(isNaN(momAccel[i])){ accelColor[i] = null; continue; }
    accelColor[i] = momAccel[i] > 0 ? 'rgba(0,200,83,0.15)' : 'rgba(255,23,68,0.15)';
  }

  // --- Thrust/Dump signals ---
  // Decel: normalised slope crosses below -1 (from above)
  // Accel: momAccel crosses above 1 (from below)
  var absSlope = new Array(n);
  for(var i = 0; i < n; i++) absSlope[i] = isNaN(momSlope[i]) ? NaN : Math.abs(momSlope[i]);
  var avgSlope = _ttm_sma(absSlope, 50);
  var normDecel = new Array(n);
  for(var i = 0; i < n; i++){
    if(isNaN(momSlope[i]) || isNaN(avgSlope[i]) || avgSlope[i] === 0){ normDecel[i] = NaN; continue; }
    normDecel[i] = momSlope[i] / avgSlope[i];
  }

  var thrustSignals = []; // [{idx, type:'thrust'|'dump'}]
  for(var i = 1; i < n; i++){
    if(!isNaN(normDecel[i]) && !isNaN(normDecel[i-1])){
      if(normDecel[i] <= -1.0 && normDecel[i-1] > -1.0){
        thrustSignals.push({idx: i, type: 'dump'});
      }
    }
    if(!isNaN(momAccel[i]) && !isNaN(momAccel[i-1])){
      if(momAccel[i] >= 1.0 && momAccel[i-1] < 1.0){
        thrustSignals.push({idx: i, type: 'thrust'});
      }
    }
  }

  return {mom: mom, momColor: momColor, sqzColor: sqzColor, accelColor: accelColor, thrustSignals: thrustSignals};
}

function _ttmCreateChart(){
  if(_ttmChart) return;
  var area = document.getElementById('ttmChartArea');
  area.innerHTML = ''; // Clear leftover DOM from previous chart
  _ttmChart = LightweightCharts.createChart(area, {
    width: area.clientWidth,
    height: area.clientHeight,
    layout: {background:{type:'solid',color:'#131721'}, textColor:'#555', fontSize:10},
    grid: {vertLines:{visible:false}, horzLines:{visible:false}},
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#f59e0b33',width:1,style:3},
      horzLine:{color:'#f59e0b33',width:1,style:3},
    },
    timeScale: {borderColor:'#1e1e2e', timeVisible:true, secondsVisible:false, visible:false},
    rightPriceScale: {borderColor:'#1e1e2e', autoScale:true, minimumWidth: 65, drawTicks:false},
  });

  // Momentum price scale — tight margins so histogram fills the pane vertically
  _ttmChart.priceScale('right').applyOptions({
    scaleMargins: {top: 0.05, bottom: 0.05},
  });

  // Acceleration background — wide histogram behind momentum (low opacity)
  _ttmAccelSeries = _ttmChart.addHistogramSeries({
    priceScaleId: 'right',
    priceLineVisible: false, lastValueVisible: false,
    base: 0,
  });

  // Momentum histogram
  _ttmMomSeries = _ttmChart.addHistogramSeries({
    priceScaleId: 'right',
    priceLineVisible: false, lastValueVisible: false,
    base: 0,
  });

  // Zero line — also carries squeeze dot markers
  _ttmZeroSeries = _ttmChart.addLineSeries({
    priceScaleId: 'right',
    color: '#333', lineWidth: 1, lineStyle: 2,
    priceLineVisible: false, lastValueVisible: false,
    crosshairMarkerVisible: false,
    pointMarkersVisible: false,
  });

  // Time scale sync: main ↔ TTM (use logical range for pixel-perfect alignment)
  _chart.timeScale().subscribeVisibleLogicalRangeChange(function(range){
    if(_ttmSyncing || !_ttmChart || !range) return;
    _ttmSyncing = true;
    try { _ttmChart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    _ttmSyncing = false;
  });
  _ttmChart.timeScale().subscribeVisibleLogicalRangeChange(function(range){
    if(_ttmSyncing || !_chart || !range) return;
    _ttmSyncing = true;
    try { _chart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    _ttmSyncing = false;
  });
}

function _ttmDestroyChart(){
  if(!_ttmChart) return;
  _ttmChart.remove();
  _ttmChart = null;
  _ttmMomSeries = null;
  _ttmSqzSeries = null;
  _ttmAccelSeries = null;
  _ttmZeroSeries = null;
}

function _ttmPopulate(candles){
  if(!_ttmChart || !candles || candles.length < 40) return;
  var ttm = _computeTTM(candles);
  if(!ttm) return;

  var momData = [], accelData = [], zeroData = [];
  var sqzMarkers = [];  // squeeze dots as circle markers on the zero line
  var thrustMarkers = [];
  var TRANSPARENT = 'rgba(0,0,0,0)';

  for(var i = 0; i < candles.length; i++){
    var t = candles[i].time;
    // Always add every candle time so TTM chart has same bar count as main chart
    var hasMom = ttm.momColor[i] !== null && !isNaN(ttm.mom[i]);
    momData.push({time: t, value: hasMom ? ttm.mom[i] : 0, color: hasMom ? ttm.momColor[i] : TRANSPARENT});
    zeroData.push({time: t, value: 0});
    accelData.push({time: t, value: hasMom && ttm.accelColor[i] !== null ? ttm.mom[i] : 0,
                    color: ttm.accelColor[i] !== null && hasMom ? ttm.accelColor[i] : TRANSPARENT});
    // Squeeze dots — circle markers at zero on the zero line
    if(ttm.sqzColor[i] !== null){
      sqzMarkers.push({time: t, position: 'inBar', color: ttm.sqzColor[i], shape: 'circle', size: 0.5});
    }
  }

  // Build thrust/dump markers (on momentum series)
  ttm.thrustSignals.forEach(function(sig){
    var t = candles[sig.idx].time;
    var momVal = ttm.mom[sig.idx];
    if(isNaN(momVal)) return;
    if(sig.type === 'thrust'){
      thrustMarkers.push({time: t, position: 'belowBar', color: '#00c853', shape: 'arrowUp', text: ''});
    } else {
      thrustMarkers.push({time: t, position: 'aboveBar', color: '#ff1744', shape: 'arrowDown', text: ''});
    }
  });
  thrustMarkers.sort(function(a,b){ return a.time - b.time; });
  sqzMarkers.sort(function(a,b){ return a.time - b.time; });

  // Set data based on sub-toggle visibility
  if(_ttmSubs.accel && _ttmAccelSeries) _ttmAccelSeries.setData(accelData);
  else if(_ttmAccelSeries) _ttmAccelSeries.setData([]);

  if(_ttmSubs.hist && _ttmMomSeries){
    _ttmMomSeries.setData(momData);
    if(_ttmSubs.thrust) _ttmMomSeries.setMarkers(thrustMarkers);
    else _ttmMomSeries.setMarkers([]);
  } else if(_ttmMomSeries){
    _ttmMomSeries.setData([]);
    _ttmMomSeries.setMarkers([]);
  }

  // Zero line + squeeze dot markers
  if(_ttmZeroSeries){
    _ttmZeroSeries.setData(zeroData);
    if(_ttmSubs.sqz) _ttmZeroSeries.setMarkers(sqzMarkers);
    else _ttmZeroSeries.setMarkers([]);
  }

  // Force sync TTM time scale to main chart (prevents TTM auto-fitting independently)
  if(_chart && _ttmChart){
    var mainRange = _chart.timeScale().getVisibleLogicalRange();
    if(mainRange){
      _ttmSyncing = true;
      _ttmChart.timeScale().setVisibleLogicalRange(mainRange);
      _ttmSyncing = false;
    }
  }
}

function _ttmSubToggle(key, btn){

var _COLOR_SCHEMES = {
  'default': {upColor:'transparent', borderUp:'#056656', borderDown:'#b22833', downColor:'#b22833', wickUp:'#056656', wickDown:'#b22833', label:'🟢🔴'},
  'blue-red': {upColor:'transparent', borderUp:'#2196f3', borderDown:'#b22833', downColor:'#b22833', wickUp:'#2196f3', wickDown:'#b22833', label:'🔵🔴'},
  'amber':   {upColor:'transparent', borderUp:'#f59e0b', borderDown:'#7c3aed', downColor:'#7c3aed', wickUp:'#f59e0b', wickDown:'#7c3aed', label:'🟡🟣'},
  'teal':    {upColor:'transparent', borderUp:'#056656', borderDown:'#056656', downColor:'#056656', wickUp:'#056656', wickDown:'#056656', label:'Teal'},
};

function _getColorScheme(){
  var cs = _COLOR_SCHEMES[_chartColorScheme] || _COLOR_SCHEMES['default'];
  // For filled style, up candle gets solid fill
  if(_candleStyle === 'filled'){
    return Object.assign({}, cs, {upColor: cs.borderUp});
  }
  return cs;
}

function applyChartSettings(){
  if(!_chart || !_candleSeries) return;
  // Scale
  _chart.priceScale('right').applyOptions({mode: _chartScale === 'log' ? 1 : 0});
  // Grid
  _chart.applyOptions({grid: {
    vertLines: {visible: _gridVisible, color: '#1e1e2e'},
    horzLines: {visible: _gridVisible, color: '#1e1e2e'},
  }});
  // Crosshair
  _chart.applyOptions({crosshair: {mode: _crosshairMode === 'magnet' ? LightweightCharts.CrosshairMode.Magnet : LightweightCharts.CrosshairMode.Normal}});
  // Colors + style (hollow/filled handled by upColor)
  if(_candleStyle !== 'line'){
    var cs = _getColorScheme();
    _candleSeries.applyOptions({
      upColor: cs.upColor, downColor: cs.downColor,
      borderUpColor: cs.borderUp, borderDownColor: cs.borderDown,
      wickUpColor: cs.wickUp, wickDownColor: cs.wickDown,
    });
  }
}

function cycleSetting(key){
  if(key === 'scale'){
    var opts = ['linear','log'];
    _chartScale = opts[(opts.indexOf(_chartScale) + 1) % opts.length];
    localStorage.setItem('chart_scale', _chartScale);
  } else if(key === 'style'){
    var opts2 = ['hollow','filled','line'];
    var newStyle = opts2[(opts2.indexOf(_candleStyle) + 1) % opts2.length];
    var oldStyle = _candleStyle;
    _candleStyle = newStyle;
    localStorage.setItem('chart_candleStyle', _candleStyle);
    // Line ↔ candle requires series swap
    if((oldStyle === 'line') !== (newStyle === 'line')){
      rebuildCandleSeries();
    }
  } else if(key === 'colors'){
    var opts3 = ['default','blue-red','amber','teal'];
    _chartColorScheme = opts3[(opts3.indexOf(_chartColorScheme) + 1) % opts3.length];
    localStorage.setItem('chart_colors', _chartColorScheme);
  } else if(key === 'grid'){
    _gridVisible = !_gridVisible;
    localStorage.setItem('chart_grid', _gridVisible ? '1' : '0');
  } else if(key === 'crosshair'){
    _crosshairMode = _crosshairMode === 'normal' ? 'magnet' : 'normal';
    localStorage.setItem('chart_crosshair', _crosshairMode);
  } else if(key === 'sessions'){
    _sessionBands = !_sessionBands;
    localStorage.setItem('chart_sessions', _sessionBands ? '1' : '0');
    drawBubbles(); // redraw canvas immediately
  }
  applyChartSettings();
  buildCsMenu();
}

function _setSeriesData(data){
  // Sets data on _candleSeries, converting format for line series if needed
  if(_candleStyle === 'line'){
    _candleSeries.setData(data.map(function(c){ return {time: c.time, value: c.close}; }));
  } else {
    _candleSeries.setData(data);
  }
}

function _updateSeriesBar(c){
  // Updates a single bar on _candleSeries
  if(_candleStyle === 'line'){
    _candleSeries.update({time: c.time, value: c.close});
  } else {
    _candleSeries.update(c);
  }
}

function rebuildCandleSeries(){
  // Swap between candlestick and line series
  if(!_chart) return;
  _chart.removeSeries(_candleSeries);
  if(_candleStyle === 'line'){
    var cs = _getColorScheme();
    _candleSeries = _chart.addLineSeries({
      color: cs.borderUp, lineWidth: 2,
      priceLineVisible: true, lastValueVisible: true,
      crosshairMarkerVisible: true,
    });
  } else {
    var cs2 = _getColorScheme();
    _candleSeries = _chart.addCandlestickSeries({
      upColor: cs2.upColor, downColor: cs2.downColor,
      borderUpColor: cs2.borderUp, borderDownColor: cs2.borderDown,
      wickUpColor: cs2.wickUp, wickDownColor: cs2.wickDown,
    });
  }
  // Re-apply data
  if(_candles.length > 0){
    if(_candleStyle === 'line'){
      _candleSeries.setData(_candles.map(function(c){ return {time: c.time, value: c.close}; }));
    } else {
      _candleSeries.setData(_candles);
    }
    _fitWithMargin();
  }
  drawBubbles();
  recomputeIndicators();
}

// Fit content with 35% right margin (65% data, 35% empty space)
function _fitWithMargin(){
  if(!_chart) return;
  var ts = _chart.timeScale();
  ts.fitContent();
  var range = ts.getVisibleLogicalRange();
  if(range && range.from !== undefined && range.to !== undefined){
    var span = range.to - range.from;
    var gap = span * (35 / 65);
    ts.setVisibleLogicalRange({from: range.from, to: range.to + gap});
  }
}

function updateTickerOverlay(){
  var el = document.getElementById('tickerOverlay');
  if(!el) return;
  var name = _tickerNames[_activeTicker] || '';
  el.innerHTML = '<div class="overlay-ticker">' + _activeTicker + '</div>'
    + (name ? '<div class="overlay-name">' + name + '</div>' : '');
}

  var tickerChanged = (_activeTicker !== ticker);
  _activeTicker = ticker;

  if(source === 'input'){
    _mode = 'single';
    _activeWatchlist = null;
    document.getElementById('watchlistSelect').value = '';

    document.getElementById('tickerListBox').innerHTML = '';

    highlightTickerList(ticker);
  }

  // Build overlay for this ticker
  buildOverlayForTicker(ticker);
  updateTickerOverlay();

  // Clear old candles so chart resets price scale to new ticker's range
  if(tickerChanged){
    _candles = [];
    _candleSeries.setData([]);
    if(_dailyHistSeries) _dailyHistSeries.setData([]);
    removeAllIndicatorSeries(); // remove BB etc so they recreate with new data
    _chartSweeps = [];
    _chartEvents = [];

    _chart.priceScale('right').applyOptions({autoScale: true});

}

function buildOverlayForTicker(ticker){
  var overlaySection = document.getElementById('overlaySection');
  var overlayList = document.getElementById('overlayList');
  overlayList.innerHTML = '';
  _overlayGroups = [];
  _overlayTickers = [];

  var map = OVERLAY_MAP[ticker];

  // Always build Underlying group — at minimum contains the active ticker itself
  var uGroup = {name: 'Underlying', on: true, tickers: []};
  // Active ticker is always first, with a distinct amber color
  uGroup.tickers.push({ticker: ticker, label: ticker, color: 'rgba(245,158,11,0.45)', stroke: '#fbbf24', on: true, group: 'Underlying'});
  // Add additional underlying tickers from overlay map (e.g. SPX components)
  if(map && map.underlying && map.underlying.length > 0){
    map.underlying.forEach(function(tk, i){
      var col = _COLORS[i % _COLORS.length];
      uGroup.tickers.push({ticker: tk, label: tk, color: col.c, stroke: col.s, on: true, group: 'Underlying'});
    });
  }
  _overlayGroups.push(uGroup);

  // Leveraged group (only if overlay map exists)
  if(map && map.leveraged && map.leveraged.length > 0){
    var lGroup = {name: 'Leveraged', on: true, tickers: []};
    map.leveraged.forEach(function(tk, i){
      var col = _COLORS[(i + 3) % _COLORS.length];
      lGroup.tickers.push({ticker: tk, label: tk, color: col.c, stroke: col.s, on: true, group: 'Leveraged'});
    });
    _overlayGroups.push(lGroup);
  }

  // Flatten
  _overlayGroups.forEach(function(g){ g.tickers.forEach(function(t){ _overlayTickers.push(t); }); });

  // Render checkboxes in two-column grid
  _overlayGroups.forEach(function(g, gIdx){
    var hdr = document.createElement('div');
    hdr.className = 'ticker-group-hdr';
    hdr.innerHTML = '<input type="checkbox" '+(g.on?'checked':'')+' onchange="onGroupToggle('+gIdx+',this)">'
      + '<span>'+g.name+' ('+g.tickers.length+')</span>';
    overlayList.appendChild(hdr);
    g.tickers.forEach(function(t){
      var row = document.createElement('div');
      row.className = 'ticker-row';
      row.setAttribute('data-group', gIdx);
      row.innerHTML = '<input type="checkbox" class="ticker-check" data-ticker="'+t.ticker+'" '+(t.on?'checked':'')+' onchange="onTickerToggle(this)">'
        + '<div class="ticker-dot" style="background:'+t.stroke+';"></div>'
        + '<span class="ticker-label">'+t.label+'</span>';
      overlayList.appendChild(row);
    });
  });

  overlaySection.style.display = _overlayGroups.length > 0 ? '' : 'none';
}
