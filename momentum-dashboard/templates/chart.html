// ====================================================================
// MARKET SESSION DETECTION (EST/EDT)
// ====================================================================
function _getMarketSession(){
  // Returns 'pre' (4:00-9:30), 'regular' (9:30-16:00), 'after' (16:00-20:00), 'closed' (outside)
  var now = new Date();
  // Convert to ET: use America/New_York
  var et = new Date(now.toLocaleString('en-US', {timeZone: 'America/New_York'}));
  var h = et.getHours(), m = et.getMinutes(), mins = h * 60 + m;
  var day = et.getDay(); // 0=Sun, 6=Sat
  if(day === 0 || day === 6) return 'closed';
  if(mins >= 240 && mins < 570) return 'pre';      // 4:00 - 9:30
  if(mins >= 570 && mins < 960) return 'regular';   // 9:30 - 16:00
  if(mins >= 960 && mins < 1200) return 'after';    // 16:00 - 20:00
  return 'closed';
}

var _currentSession = _getMarketSession();
var _prevSession = _currentSession;

function _updateSessionClass(){
  var session = _getMarketSession();
  _prevSession = _currentSession;
  _currentSession = session;

  // Transition: regular → after/closed — snapshot regClose from current live prices
  if(_prevSession === 'regular' && session !== 'regular'){
    Object.keys(_tickerPrices).forEach(function(ticker){
      var tp = _tickerPrices[ticker];
      tp.regClose = tp.price; // freeze today's close
    });
  }

  // Transition: ext/closed → regular — shift references for new trading day
  // regClose (yesterday's close) becomes prevClose, regClose will track live
  if(_prevSession !== 'regular' && session === 'regular'){
    Object.keys(_tickerPrices).forEach(function(ticker){
      var tp = _tickerPrices[ticker];
      tp.prevClose = tp.regClose; // yesterday's close → prevClose
    });
  }

  // During regular hours, continuously update regClose to current price
  // (so it's always fresh when session ends)
  if(session === 'regular'){
    Object.keys(_tickerPrices).forEach(function(ticker){
      _tickerPrices[ticker].regClose = _tickerPrices[ticker].price;
    });
  }

  var isExt = (session === 'pre' || session === 'after');
  document.body.classList.toggle('ext-hours', isExt);
  // Update close price line on session transitions
  if(_prevSession !== session) _updateCloseLine();
}
// Check session every 10s
_updateSessionClass();
setInterval(_updateSessionClass, 10000);

// ====================================================================
// TICKER PRICES (for left panel list)
// ====================================================================
function _extractTickerPrices(ticker, candles){
  if(candles.length === 0) return;
  var now = new Date();
  var etStr = now.toLocaleDateString('en-CA', {timeZone: 'America/New_York'});
  var lastBar = candles[candles.length - 1];
  var lastDate = typeof lastBar.time === 'string' ? lastBar.time : new Date(lastBar.time * 1000).toLocaleDateString('en-CA', {timeZone: 'America/New_York'});

  var regClose, prevClose, livePrice;
  if(lastDate === etStr && candles.length >= 2){
    var yest = candles[candles.length - 2];
    var dayBefore = candles.length >= 3 ? candles[candles.length - 3] : null;
    regClose = yest.close;
    prevClose = dayBefore ? dayBefore.close : yest.open;
    livePrice = lastBar.close;
  } else {
    regClose = lastBar.close;
    var prev = candles.length >= 2 ? candles[candles.length - 2] : null;
    prevClose = prev ? prev.close : lastBar.open;
    livePrice = lastBar.close;
  }
  _tickerPrices[ticker] = {price: livePrice, prevClose: prevClose, regClose: regClose};
  _updateTickerPriceDOM(ticker);
}

function _isCacheStale(candles){
  if(candles.length === 0) return true;
  var lastBar = candles[candles.length - 1];
  var lastDate = typeof lastBar.time === 'string' ? lastBar.time : new Date(lastBar.time * 1000).toLocaleDateString('en-CA', {timeZone: 'America/New_York'});
  var lastMs = new Date(lastDate + 'T00:00:00').getTime();
  var nowMs = new Date().getTime();
  return (nowMs - lastMs) / 86400000 > 2;
}

function fetchTickerPrices(tickers){
  // Fetch last 3 daily candles — cache-first, API fallback if stale
  tickers.forEach(function(ticker){
    fetch('/api/chart/candles?ticker='+ticker+'&date='+getDate()+'&days=3&interval=1440')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var candles = d.candles || [];
        if(_isCacheStale(candles)){
          // Cache too old — fall back to API for correct prev close
          fetch('/api/chart/candles?ticker='+ticker+'&date='+getDate()+'&days=3&interval=1440&source=api')
            .then(function(r2){ return r2.json(); })
            .then(function(d2){
              var ac = d2.candles || [];
              _extractTickerPrices(ticker, ac.length > 0 ? ac : candles);
            })
            .catch(function(){ _extractTickerPrices(ticker, candles); });
        } else {
          _extractTickerPrices(ticker, candles);
        }
      })
      .catch(function(){});
  });
}

function _updateTickerPriceDOM(ticker){
  var tp = _tickerPrices[ticker];
  if(!tp) return;
  var priceEl = document.getElementById('price_'+ticker);
  var changeEl = document.getElementById('change_'+ticker);
  if(priceEl){
    var oldText = priceEl.textContent;
    var newText = '$' + tp.price.toFixed(2);
    // Flash green/red on price change
    if(oldText !== '—' && oldText !== newText){
      var oldVal = parseFloat(oldText.replace('$',''));
      var cls = tp.price > oldVal ? 'flash-up' : tp.price < oldVal ? 'flash-down' : '';
      if(cls){
        // Clone + replace to reliably re-trigger CSS animation
        var clone = priceEl.cloneNode(true);
        clone.textContent = newText;
        clone.className = 'tl-price ' + cls;
        clone.addEventListener('animationend', function(){ clone.classList.remove('flash-up','flash-down'); });
        priceEl.parentNode.replaceChild(clone, priceEl);
      } else {
        priceEl.textContent = newText;
      }
    } else {
      priceEl.textContent = newText;
    }
  }
  // Day change: during regular hours = live vs prevClose, during ext hours = regClose vs prevClose (frozen)
  if(changeEl){
    var isExt = (_currentSession === 'pre' || _currentSession === 'after');
    var dayRef = isExt ? tp.regClose : tp.price;
    var changePct = tp.prevClose ? ((dayRef - tp.prevClose) / tp.prevClose * 100) : 0;
    var sign = changePct >= 0 ? '+' : '';
    changeEl.textContent = sign + changePct.toFixed(2) + '%';
    changeEl.className = 'tl-change ' + (changePct >= 0 ? 'pos' : 'neg');
  }
  // Ext-hours column: live price vs last regular close
  var extEl = document.getElementById('ext_'+ticker);
  if(extEl){
    var isExt = (_currentSession === 'pre' || _currentSession === 'after');
    if(isExt && tp.regClose){
      var extPct = ((tp.price - tp.regClose) / tp.regClose * 100);
      var extSign = extPct >= 0 ? '+' : '';
      extEl.textContent = extSign + extPct.toFixed(2) + '%';
      extEl.className = 'tl-ext ' + (extPct >= 0 ? 'pos' : 'neg');
    } else {
      extEl.textContent = '';
    }
  }
}

function _refreshTickerListPrices(){
  // Batch fetch live bars for all visible tickers in the list
  var items = document.querySelectorAll('.ticker-list-item');
  if(items.length === 0) return;
  var tickers = [];
  items.forEach(function(el){ tickers.push(el.getAttribute('data-ticker')); });
  // Use snapshot endpoint for all tickers at once
  fetch('/api/chart/live-prices?tickers='+tickers.join(','))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var prices = d.prices || {};
      Object.keys(prices).forEach(function(ticker){
        if(_tickerPrices[ticker]){
          _tickerPrices[ticker].price = prices[ticker];
          _updateTickerPriceDOM(ticker);
        }
      });
    })
    .catch(function(){});
}

// ====================================================================
// DATA LOADING
// ====================================================================
function getDate(){
  return new Date().toISOString().slice(0,10);
}
function getDays(){ return INTERVAL_DAYS[_candleInterval] || 10; }

// Anchor price lookup: binary search for nearest bar close at a given unix timestamp
function _anchorPriceAt(unixTs){
  if(_anchorBars.length === 0) return null;
  var lo = 0, hi = _anchorBars.length - 1;
  while(lo < hi){
    var mid = (lo + hi + 1) >> 1;
    if(_anchorBars[mid].time <= unixTs) lo = mid;
    else hi = mid - 1;
  }
  // lo = largest bar time <= unixTs
  return _anchorBars[lo].close;
}

function fetchAnchorBars(){
  var res = ANCHOR_RESOLUTION[_candleInterval];
  if(!res){
    // No anchor needed for this timeframe — use candle close (already fine)
    _anchorBars = [];
    _anchorReady = true;
    drawBubbles(); // redraw in case sweeps loaded first
    return;
  }
  _anchorReady = false;
  var sweepDays = INTERVAL_DAYS[_candleInterval] || 30;
  var pad = sweepDays <= 10 ? 2 : Math.round(sweepDays * 0.45);
  var end = new Date();
  var start = new Date(end.getTime() - (sweepDays + pad) * 86400000);
  var dateFrom = start.toISOString().slice(0,10);
  var dateTo = end.toISOString().slice(0,10);
  var signal = _fetchController ? _fetchController.signal : undefined;

  var url = '/api/chart/candles?ticker='+_activeTicker
    +'&date='+dateTo+'&days='+sweepDays+'&interval='
    + (res.unit === 'minute' ? res.mult : (res.unit === 'hour' ? res.mult * 60 : res.mult * 1440));

  fetch(url, {signal: signal})
    .then(function(r){ return r.json(); })
    .then(function(d){
      var bars = d.candles || [];
      // Sort by time ascending
      bars.sort(function(a,b){ return a.time - b.time; });
      _anchorBars = bars.map(function(b){ return {time: b.time, close: b.close}; });
      _anchorReady = true;
      drawBubbles(); // redraw with anchor prices
    })
    .catch(function(e){
      if(e.name === 'AbortError') return;
      console.error('Anchor fetch error:', e);
      _anchorReady = true; // fallback to candle close
      drawBubbles();
    });
}

function _anySweepOn(){
  return _sweepLayers.some(function(lyr){ return _activeLayers[lyr.id]; });
}

function loadAll(resetView){
  // Abort any in-flight fetches so stale responses don't overwrite current ticker
  if(_fetchController) _fetchController.abort();
  _fetchController = new AbortController();
  if(resetView) _initialLoad = true;
  fetchCandles();
  // Only fetch sweep data if any sweep layer is toggled on
  if(_anySweepOn()){
    fetchSweepChart();
    fetchAnchorBars();
  } else {
    _chartSweeps = []; _chartEvents = [];
    _anchorBars = []; _anchorReady = true;
    if(_dailyHistSeries) _dailyHistSeries.setData([]);
  }
}

function fetchCandles(){
  var date = getDate();
  var days = getDays();
  var signal = _fetchController ? _fetchController.signal : undefined;
  _setLoading(true);
  fetch('/api/chart/candles?ticker='+_activeTicker+'&date='+date+'&days='+days+'&interval='+_candleInterval, {signal: signal})
    .then(function(r){return r.json();})
    .then(function(d){
      var newCandles = d.candles || [];
      if(newCandles.length === 0){ _setLoading(false); return; }

      if(_initialLoad || _candles.length === 0){
        _candles = newCandles;
        _setSeriesData(_candles);
        // Reset price scale auto-fit + time scale fit for new data
        _chart.priceScale('right').applyOptions({autoScale: true});
        _fitWithMargin();
        _initialLoad = false;
      } else {
        var oldLast = _candles.length > 0 ? _candles[_candles.length - 1].time : 0;
        var updated = false;
        newCandles.forEach(function(c){
          if(c.time > oldLast){
            _updateSeriesBar(c);
            _candles.push(c);
            updated = true;
          } else if(c.time === oldLast){
            _updateSeriesBar(c);
            _candles[_candles.length - 1] = c;
            updated = true;
          }
        });
        if(!updated && newCandles.length > 0 && newCandles[0].time !== (_candles[0] || {}).time){
          _candles = newCandles;
          _setSeriesData(_candles);
          _fitWithMargin();
        }
      }
      drawBubbles();
      recreateEnabledIndicators();
      recomputeIndicators();
      _updateCloseLine();
      _setLoading(false);
    })
    .catch(function(e){ if(e.name === 'AbortError' || (e instanceof TypeError && _fetchController && _fetchController.signal.aborted)) return; console.error('Candle fetch error:', e); _setLoading(false); });
}

// Previous-close price line (orange, like TradingView ext-hours)
function _updateCloseLine(){
  if(!_candleSeries) return;
  // Remove old line
  if(_closePriceLine){
    try{ _candleSeries.removePriceLine(_closePriceLine); }catch(e){}
    _closePriceLine = null;
  }
  var session = _getMarketSession();
  var isExt = (session === 'pre' || session === 'after');
  if(!isExt) return;
  // Get regClose from ticker prices (populated by fetchTickerPrices)
  var tp = _tickerPrices[_activeTicker];
  if(tp && tp.regClose){
    _closePriceLine = _candleSeries.createPriceLine({
      price: tp.regClose,
      color: '#888',
      lineWidth: 1,
      lineStyle: 2, // dashed
      axisLabelVisible: true,
      title: '',
      axisLabelColor: '#888',
      axisLabelTextColor: '#fff',
    });
  }
}

function fetchSweepChart(){
  // Fetch sweep chart data for active ticker + all enabled overlay tickers
  // Use same lookback as candles (INTERVAL_DAYS) with weekend padding to match candle range
  var sweepDays = INTERVAL_DAYS[_candleInterval] || 30;
  var pad = sweepDays <= 10 ? 2 : Math.round(sweepDays * 0.45);
  var end = new Date();
  var start = new Date(end.getTime() - (sweepDays + pad) * 86400000);
  var dateFrom = start.toISOString().slice(0,10);
  var dateTo = end.toISOString().slice(0,10);

  // Build list of tickers to fetch: only those checked ON in overlay
  var tickers = [];
  _overlayTickers.forEach(function(t){
    if(t.on) tickers.push(t.ticker);
  });
  // If nothing is checked, nothing to fetch
  if(tickers.length === 0){
    _chartSweeps = []; _chartEvents = [];
    drawBubbles(); updateStats(); updateFeed();
    return;
  }

  // Fetch all tickers in parallel (with abort signal)
  var signal = _fetchController ? _fetchController.signal : undefined;
  var promises = tickers.map(function(ticker){
    var url = '/api/sweeps/chart?ticker='+ticker
      +'&date_from='+dateFrom+'&date_to='+dateTo
      +'&daily_from='+_layerCfg.dailyFrom+'&daily_to='+_layerCfg.dailyTo
      +'&rank_from='+_layerCfg.singleFrom+'&rank_to='+_layerCfg.singleTo;
    return fetch(url, {signal: signal}).then(function(r){ return r.json(); }).then(function(d){
      return {ticker: ticker, sweeps: d.sweeps || [], events: d.clusterbombs || []};
    });
  });

  Promise.all(promises)
    .then(function(results){
      // Merge all tickers' data, tagging each sweep/event with its ticker
      _chartSweeps = [];
      _chartEvents = [];
      results.forEach(function(r){
        r.sweeps.forEach(function(s){ s.ticker = r.ticker; _chartSweeps.push(s); });
        r.events.forEach(function(e){ e.ticker = r.ticker; _chartEvents.push(e); });
      });
      drawBubbles();
      updateDailyHist();
      updateStats();
      updateFeed();
    })
    .catch(function(e){ if(e.name === 'AbortError' || (e instanceof TypeError && _fetchController && _fetchController.signal.aborted)) return; console.error('Sweep chart fetch error:', e); });
}

function _setLoading(on){
  _loading = on;
  document.getElementById('tickerInput').style.borderColor = on ? '#f59e0b' : '#2a2a3a';
}

// ====================================================================
// DAILY DP VOLUME HISTOGRAM (LightweightCharts series)
// ====================================================================
function updateDailyHist(){
  if(!_dailyHistSeries || !_chart) return;
  if(!_activeLayers.daily || _chartEvents.length === 0){
    _dailyHistSeries.setData([]);
    return;
  }
  // Build date→candle_time map so histogram bars align with candles
  var dateToCandleTime = {};
  _candles.forEach(function(c){
    // Convert unix ts to YYYY-MM-DD for matching
    var d = new Date(c.time * 1000);
    var key = d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0');
    dateToCandleTime[key] = c.time;
  });

  // Aggregate daily totals from events with daily_rank in range
  var dailyMap = {}; // candle time → {notional, rank}
  _chartEvents.forEach(function(ev){
    var dr = ev.daily_rank;
    if(dr == null) return;
    if(dr < _layerCfg.dailyFrom || dr > _layerCfg.dailyTo) return;
    var candleT = dateToCandleTime[ev.date];
    if(!candleT) return; // no matching candle on chart
    var prev = dailyMap[candleT];
    if(!prev || ev.total_notional > prev.notional){
      dailyMap[candleT] = {notional: ev.total_notional || 0, rank: dr};
    }
  });
  // Build sorted data array
  var data = [];
  Object.keys(dailyMap).map(Number).sort(function(a,b){return a-b;}).forEach(function(t){
    var d = dailyMap[t];
    data.push({time: t, value: d.notional, color: 'rgba(245,158,11,0.35)'});
  });
  _dailyHistSeries.setData(data);
}

// ====================================================================
// BUBBLE DRAWING (Canvas overlay)
// ====================================================================

// Exponential sizing curve: p ∈ [0,1] → radius. Same curve for ALL layers.
// p=0 → 3px (barely visible), p=0.5 → ~12px, p=1 → 30px
function _bubbleRadius(p){ return 3 + Math.pow(p, 2.5) * 32; }
function _bubbleAlpha(p){ return 0.30 + p * 0.55; }

// Session background bands — paints pre/regular/after as vertical color zones on intraday charts
// Uses actual candle timestamps to determine session, so it works regardless of data source
var _etFormatter = null;
try { _etFormatter = new Intl.DateTimeFormat('en-US', {timeZone:'America/New_York', hour:'numeric', minute:'numeric', hour12:false}); } catch(e){}

function _getETMins(unixSec){
  // Returns minutes since midnight ET for a unix timestamp
  if(_etFormatter){
    // formatToParts gives reliable {hour, minute} objects
    var parts = _etFormatter.formatToParts(new Date(unixSec * 1000));
    var hh = 0, mm = 0;
    for(var i = 0; i < parts.length; i++){
      if(parts[i].type === 'hour') hh = parseInt(parts[i].value);
      if(parts[i].type === 'minute') mm = parseInt(parts[i].value);
    }
    // Intl can return hour=24 for midnight — treat as 0
    if(hh === 24) hh = 0;
    return hh * 60 + mm;
  }
  // Fallback: parse toLocaleString
  var d = new Date(unixSec * 1000);
  var s = d.toLocaleString('en-US', {timeZone:'America/New_York'});
  var m = s.match(/(\d+):(\d+):(\d+)\s*(AM|PM)/i);
  if(m){
    var h = parseInt(m[1]); var mn = parseInt(m[2]); var ap = m[4].toUpperCase();
    if(ap === 'PM' && h !== 12) h += 12;
    if(ap === 'AM' && h === 12) h = 0;
    return h * 60 + mn;
  }
  return -1;
}

function _drawSessionBands(){
  if(!_sessionBands) return;
  if(!_ctx || !_chart || !_candleSeries || !_candles.length) return;
  if(_candleInterval >= 1440) return;
  if(typeof _candles[0].time === 'string') return;

  var ts = _chart.timeScale();
  var PRE_COLOR = 'rgba(99,99,99,0.07)';      // #636363 at 7%
  var AFTER_COLOR = 'rgba(12,50,153,0.07)';    // #0c3299 at 7%
  var h = _canvas.height;

  function getSession(unixSec){
    var mins = _getETMins(unixSec);
    if(mins < 0) return null;
    if(mins < 240) return null;        // before 4am
    if(mins < 570) return 'pre';       // 4:00 - 9:29
    if(mins < 960) return 'regular';   // 9:30 - 15:59
    if(mins < 1200) return 'after';    // 16:00 - 19:59
    return null;
  }

  // Build runs of consecutive candles in the same ext session
  var runs = [];
  var curRun = null;
  for(var i = 0; i < _candles.length; i++){
    var c = _candles[i];
    var sess = getSession(c.time);
    if(sess === 'pre' || sess === 'after'){
      if(curRun && curRun.session === sess){
        curRun.toTime = c.time;
      } else {
        if(curRun) runs.push(curRun);
        curRun = {session: sess, fromTime: c.time, toTime: c.time};
      }
    } else {
      if(curRun){ runs.push(curRun); curRun = null; }
    }
  }
  if(curRun) runs.push(curRun);

  // Draw each run as a filled rectangle
  for(var r = 0; r < runs.length; r++){
    var run = runs[r];
    var x1 = ts.timeToCoordinate(run.fromTime);
    var x2 = ts.timeToCoordinate(run.toTime);
    if(x1 === null || x2 === null) continue;
    // Pad half a candle width on each side
    var pad = Math.max(3, (x2 - x1) / Math.max(1, (run.toTime - run.fromTime) / (_candleInterval * 60)) * 0.6);
    x1 -= pad; x2 += pad;
    if(x2 < 0 || x1 > _canvas.width) continue;
    x1 = Math.max(0, x1); x2 = Math.min(_canvas.width, x2);
    _ctx.fillStyle = (run.session === 'pre') ? PRE_COLOR : AFTER_COLOR;
    _ctx.fillRect(x1, 0, x2 - x1, h);
  }
}

function drawBubbles(){
  if(!_ctx || !_chart || !_candleSeries) {
    if(_ctx) _ctx.clearRect(0, 0, _canvas.width, _canvas.height);
    return;
  }
  _ctx.clearRect(0, 0, _canvas.width, _canvas.height);

  // Draw session background bands first (underneath everything)
  _drawSessionBands();

  var anyLayer = _activeLayers.sweeps || _activeLayers.daily || _activeLayers.single || _activeLayers.rare || _activeLayers.cb || _activeLayers.monster;
  if(!anyLayer) return;

  var ts = _chart.timeScale();
  var candleCloseMap = {};
  _candles.forEach(function(c){ candleCloseMap[c.time] = c.close; });
  var candleTimes = _candles.map(function(c){ return c.time; });

  function nearestCandleTime(t){
    if(candleTimes.length === 0) return null;
    var lo = 0, hi = candleTimes.length - 1;
    while(lo < hi){
      var mid = (lo + hi) >> 1;
      if(candleTimes[mid] < t) lo = mid + 1;
      else hi = mid;
    }
    var best = candleTimes[lo];
    if(lo > 0 && Math.abs(candleTimes[lo-1] - t) < Math.abs(best - t)) best = candleTimes[lo-1];
    return best;
  }

  function dateToUnix(dateStr){
    return Math.floor(new Date(dateStr + 'T20:00:00Z').getTime() / 1000);
  }

  // getXY with optional override price (for exact trade price placement)
  function getXY(timeVal, overridePrice){
    var candleT = nearestCandleTime(timeVal);
    if(candleT === null) return null;
    var x = ts.timeToCoordinate(candleT);
    if(x === null || x < 0 || x > _canvas.width) return null;
    var plotPrice = overridePrice || candleCloseMap[candleT];
    if(!plotPrice) return null;
    var y = _candleSeries.priceToCoordinate(plotPrice);
    if(y === null || y < 0 || y > _canvas.height) return null;
    return {x:x, y:y};
  }

  function drawCircle(x, y, radius, fillColor, strokeColor, lineWidth){
    _ctx.beginPath();
    _ctx.arc(x, y, radius, 0, Math.PI * 2);
    _ctx.fillStyle = fillColor;
    _ctx.fill();
    if(strokeColor){
      _ctx.strokeStyle = strokeColor;
      _ctx.lineWidth = lineWidth || 1;
      _ctx.stroke();
    }
  }

  function drawLabel(x, y, text, color){
    _ctx.font = '9px -apple-system, sans-serif';
    _ctx.fillStyle = color;
    _ctx.textAlign = 'center';
    _ctx.fillText(text, x, y + 20);
  }

  // Convert rank to percentile (rank 1 = top = p≈1.0, last rank = p≈0.0)
  function rankToP(rank, from, to){
    var range = Math.max(to - from, 1);
    return 1 - (rank - from) / range;
  }

  // Build sorted notional array for percentile computation within a set
  function buildPctLookup(values){
    var sorted = values.slice().sort(function(a,b){ return a - b; });
    return function(v){
      var lo = 0, hi = sorted.length;
      while(lo < hi){ var mid = (lo+hi)>>1; if(sorted[mid] < v) lo = mid+1; else hi = mid; }
      return sorted.length > 0 ? Math.min(0.99, lo / sorted.length) : 0.5;
    };
  }

  // Build ticker → color lookup from overlay tickers (writes to global for tooltip access)
  _tickerColorMap = {};
  _overlayTickers.forEach(function(t){ _tickerColorMap[t.ticker] = {stroke: t.stroke}; });
  // Fallback for tickers not in overlay
  var _defaultStroke = '#60a5fa';

  // Reset drawn bubble positions for overlay layers + tooltip hit-testing
  _drawnBubbles = [];
  _largestPerDate = {};

  // ---- LAYER: Sweeps (per-ticker color, sized by notional percentile) ----
  if(_activeLayers.sweeps && _chartSweeps.length > 0){
    var sortedN = _chartSweeps.map(function(s){ return s.notional; }).sort(function(a,b){ return a - b; });
    var totalS = sortedN.length;
    function computePct(notional){
      var lo = 0, hi = totalS;
      while(lo < hi){ var mid = (lo+hi)>>1; if(sortedN[mid] < notional) lo = mid+1; else hi = mid; }
      return Math.min(99, Math.floor(lo / totalS * 100));
    }

    _chartSweeps.forEach(function(s){
      var pct = computePct(s.notional);
      // Filter: $ mode OR percentile mode (mutually exclusive)
      if(_sweepFilterMode === 'notional'){
        if(s.notional < _layerCfg.minNotional) return;
      } else {
        if(pct < _layerCfg.percentile) return;
      }

      var timeUnix;
      if(s.time && s.time.length >= 5){
        // trade_time is stored as UTC in the DB — parse as UTC
        var dt = new Date(s.date + 'T' + s.time + 'Z');
        timeUnix = Math.floor(dt.getTime() / 1000);
      } else {
        timeUnix = dateToUnix(s.date);
      }
      timeUnix = Math.floor(timeUnix / 60) * 60;

      // Active ticker: use exact trade price (its scale matches the chart).
      // Overlay tickers: use anchor bars (finer-grained active ticker price at trade time).
      // Fallback: candle close (getXY default when no override price given).
      var usePrice;
      if(s.ticker === _activeTicker && s.price){
        usePrice = Number(s.price);
      } else if(s.ticker !== _activeTicker && _anchorReady && _anchorBars.length > 0){
        usePrice = _anchorPriceAt(timeUnix);
      }
      var pos = getXY(timeUnix, usePrice);
      if(!pos) return;

      var p = pct / 100;
      var radius = _bubbleRadius(p);
      var alpha = _bubbleAlpha(p);
      var tc = _tickerColorMap[s.ticker];
      var stroke = tc ? tc.stroke : _defaultStroke;
      // Parse stroke hex to rgb for fill with dynamic alpha
      var r = parseInt(stroke.slice(1,3),16), g = parseInt(stroke.slice(3,5),16), b = parseInt(stroke.slice(5,7),16);
      drawCircle(pos.x, pos.y, radius, 'rgba('+r+','+g+','+b+',' + (alpha * 0.75).toFixed(2) + ')', stroke, 1);

      // Track for overlays
      var bIdx = _drawnBubbles.length;
      _drawnBubbles.push({x: pos.x, y: pos.y, radius: radius, date: s.date, ticker: s.ticker, notional: s.notional, _isLargestForDate: false, type: 'sweep', data: s});
      var prevLargest = _largestPerDate[s.date];
      if(prevLargest == null || s.notional > _drawnBubbles[prevLargest].notional){
        if(prevLargest != null) _drawnBubbles[prevLargest]._isLargestForDate = false;
        _drawnBubbles[bIdx]._isLargestForDate = true;
        _largestPerDate[s.date] = bIdx;
      }
    });
  }

  // Build event metadata lookup: date → {sweep_rank, daily_rank, is_rare, is_cb, is_monster, total_notional}
  _evMetaCache = {};
  var _evMeta = _evMetaCache;
  _chartEvents.forEach(function(ev){
    var prev = _evMeta[ev.date];
    if(!prev){
      _evMeta[ev.date] = {
        sweep_rank: ev.sweep_rank, daily_rank: ev.daily_rank,
        is_rare: ev.is_rare, is_cb: ev.event_type === 'clusterbomb',
        is_monster: ev.is_monster || ev.event_type === 'monster_sweep',
        total_notional: ev.total_notional || 0, sweep_count: ev.sweep_count || 0,
      };
    } else {
      if(ev.sweep_rank != null && (prev.sweep_rank == null || ev.sweep_rank < prev.sweep_rank)) prev.sweep_rank = ev.sweep_rank;
      if(ev.daily_rank != null && (prev.daily_rank == null || ev.daily_rank < prev.daily_rank)) prev.daily_rank = ev.daily_rank;
      prev.is_rare = prev.is_rare || ev.is_rare;
      prev.is_cb = prev.is_cb || ev.event_type === 'clusterbomb';
      prev.is_monster = prev.is_monster || ev.is_monster || ev.event_type === 'monster_sweep';
      prev.total_notional = Math.max(prev.total_notional, ev.total_notional || 0);
      prev.sweep_count = Math.max(prev.sweep_count, ev.sweep_count || 0);
    }
  });

  // ---- OVERLAY: Single rank number on biggest sweep per date ----
  if(_activeLayers.single){
    // For each date with a sweep_rank, find the largest sweep and draw rank number on it
    _drawnBubbles.forEach(function(b){
      var meta = _evMeta[b.date];
      if(!meta || meta.sweep_rank == null) return;
      if(meta.sweep_rank < _layerCfg.singleFrom || meta.sweep_rank > _layerCfg.singleTo) return;
      // Only draw on the biggest sweep for this date (highest notional)
      if(!b._isLargestForDate) return;
      _ctx.font = 'bold 10px -apple-system, sans-serif';
      _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
      _ctx.fillStyle = '#000';
      _ctx.fillText('#' + meta.sweep_rank, b.x, b.y);
    });
  }

  // Helper: draw a dark backing disc behind overlay text for contrast
  function drawOverlayBacking(x, y, r){
    _ctx.beginPath();
    _ctx.arc(x, y, Math.max(7, r * 0.55), 0, Math.PI * 2);
    _ctx.fillStyle = 'rgba(12,12,20,0.75)';
    _ctx.fill();
  }

  // ---- OVERLAY: CB 💣 emoji on largest bubble per clusterbomb day ----
  if(_activeLayers.cb){
    _drawnBubbles.forEach(function(b){
      if(!b._isLargestForDate) return;
      var meta = _evMeta[b.date];
      if(!meta || !meta.is_cb) return;
      drawOverlayBacking(b.x, b.y, b.radius);
      var sz = Math.max(12, Math.round(b.radius * 1.1));
      _ctx.font = sz + 'px serif';
      _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
      _ctx.globalAlpha = 1.0;
      _ctx.fillText('\uD83D\uDCA3', b.x, b.y);
    });
  }

  // ---- OVERLAY: Monster 💥 emoji on largest bubble per monster day ----
  if(_activeLayers.monster){
    _drawnBubbles.forEach(function(b){
      if(!b._isLargestForDate) return;
      var meta = _evMeta[b.date];
      if(!meta || !meta.is_monster) return;
      drawOverlayBacking(b.x, b.y, b.radius);
      var sz = Math.max(12, Math.round(b.radius * 1.1));
      _ctx.font = sz + 'px serif';
      _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
      _ctx.globalAlpha = 1.0;
      _ctx.fillText('\uD83D\uDCA5', b.x, b.y);
    });
  }

  // ---- OVERLAY: Rare purple R on largest bubble per rare day ----
  if(_activeLayers.rare){
    _drawnBubbles.forEach(function(b){
      if(!b._isLargestForDate) return;
      var meta = _evMeta[b.date];
      if(!meta || !meta.is_rare) return;
      drawOverlayBacking(b.x, b.y, b.radius);
      var sz = Math.max(10, Math.round(b.radius * 0.8));
      _ctx.font = 'bold ' + sz + 'px -apple-system, sans-serif';
      _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
      _ctx.fillStyle = '#a855f6';
      _ctx.globalAlpha = 1.0;
      _ctx.fillText('R', b.x, b.y);
    });
  }

  // --- BB Deviation Signals (canvas-drawn labels) ---
  if(_bbDevSignals.length > 0 && _indicators['bb_dev'] && _indicators['bb_dev'].enabled){
    var ts2 = _chart.timeScale();
    _bbDevSignals.forEach(function(sig){
      var xCoord = ts2.timeToCoordinate(sig.time);
      if(xCoord === null || xCoord < 0 || xCoord > _canvas.width) return;

      // Find the candle to position above/below
      var candle = null;
      for(var ci = 0; ci < _candles.length; ci++){
        if(_candles[ci].time === sig.time){ candle = _candles[ci]; break; }
      }
      if(!candle) return;

      var isBuy = sig.buy;
      var color = isBuy ? '#0b570f' : '#700909';
      var text = isBuy ? 'B' : 'S';
      var priceCoord;

      if(isBuy){
        // Below bar — use low price
        priceCoord = _candleSeries.priceToCoordinate(candle.low);
        if(priceCoord === null) return;
        var labelY = priceCoord + 20; // below the bar
        // Draw downward-pointing label (rounded rect with arrow on top pointing up toward bar)
        var w = 12, h = 14, arrowH = 4, r = 2;
        var lx = xCoord - w/2, ly = labelY;
        _ctx.beginPath();
        // Arrow point (top center, pointing up toward bar)
        _ctx.moveTo(xCoord, ly - arrowH);
        _ctx.lineTo(xCoord + 4, ly);
        _ctx.lineTo(xCoord + w/2 - r, ly);
        _ctx.arcTo(xCoord + w/2, ly, xCoord + w/2, ly + r, r);
        _ctx.lineTo(xCoord + w/2, ly + h - r);
        _ctx.arcTo(xCoord + w/2, ly + h, xCoord + w/2 - r, ly + h, r);
        _ctx.lineTo(xCoord - w/2 + r, ly + h);
        _ctx.arcTo(xCoord - w/2, ly + h, xCoord - w/2, ly + h - r, r);
        _ctx.lineTo(xCoord - w/2, ly + r);
        _ctx.arcTo(xCoord - w/2, ly, xCoord - w/2 + r, ly, r);
        _ctx.lineTo(xCoord - 4, ly);
        _ctx.closePath();
        _ctx.fillStyle = color;
        _ctx.fill();
        // White bold text
        _ctx.font = 'bold 10px -apple-system, sans-serif';
        _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
        _ctx.fillStyle = '#ffffff';
        _ctx.fillText(text, xCoord, ly + h/2);
      } else {
        // Above bar — use high price
        priceCoord = _candleSeries.priceToCoordinate(candle.high);
        if(priceCoord === null) return;
        var labelY = priceCoord - 20; // above the bar
        // Draw upward label (rounded rect with arrow on bottom pointing down toward bar)
        var w = 12, h = 14, arrowH = 4, r = 2;
        var topY = labelY - h;
        _ctx.beginPath();
        // Top-left corner
        _ctx.moveTo(xCoord - w/2 + r, topY);
        _ctx.lineTo(xCoord + w/2 - r, topY);
        _ctx.arcTo(xCoord + w/2, topY, xCoord + w/2, topY + r, r);
        _ctx.lineTo(xCoord + w/2, topY + h - r);
        _ctx.arcTo(xCoord + w/2, topY + h, xCoord + w/2 - r, topY + h, r);
        _ctx.lineTo(xCoord + 4, topY + h);
        // Arrow point (bottom center, pointing down toward bar)
        _ctx.lineTo(xCoord, topY + h + arrowH);
        _ctx.lineTo(xCoord - 4, topY + h);
        _ctx.lineTo(xCoord - w/2 + r, topY + h);
        _ctx.arcTo(xCoord - w/2, topY + h, xCoord - w/2, topY + h - r, r);
        _ctx.lineTo(xCoord - w/2, topY + r);
        _ctx.arcTo(xCoord - w/2, topY, xCoord - w/2 + r, topY, r);
        _ctx.closePath();
        _ctx.fillStyle = color;
        _ctx.fill();
        // White bold text
        _ctx.font = 'bold 10px -apple-system, sans-serif';
        _ctx.textAlign = 'center'; _ctx.textBaseline = 'middle';
        _ctx.fillStyle = '#ffffff';
        _ctx.fillText(text, xCoord, topY + h/2);
      }
    });
  }

}

// ====================================================================
// TOOLTIP
// ====================================================================
function onMouseMove(e){
  var rect = document.getElementById('chartContainer').getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var tooltip = document.getElementById('tooltipDiv');

  if(_drawnBubbles.length === 0){
    tooltip.style.display = 'none';
    return;
  }

  var hitRadius = 30;
  var hits = [];

  // Hit-test only actually-drawn bubbles (respects all filters: percentile, notional, overlay on/off)
  for(var i = 0; i < _drawnBubbles.length; i++){
    var b = _drawnBubbles[i];
    var dist = Math.sqrt((mx - b.x) * (mx - b.x) + (my - b.y) * (my - b.y));
    if(dist < hitRadius){
      hits.push({type: b.type || 'sweep', data: b.data || b, dist: dist});
    }
  }

  if(hits.length > 0){
    // Sort by time (newest first), then distance
    hits.sort(function(a,b){
      var aDate = a.data.date || '', bDate = b.data.date || '';
      var aTime = a.data.time || '99:99', bTime = b.data.time || '99:99';
      var cmp = (bDate + bTime).localeCompare(aDate + aTime);
      return cmp !== 0 ? cmp : a.dist - b.dist;
    });
    // Cap at 20 rows
    if(hits.length > 20) hits = hits.slice(0, 20);

    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 12) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    var rows = [];

    // Build percentile lookup for tooltip
    var _tipSorted = _chartSweeps.map(function(s){ return s.notional; }).sort(function(a,b){ return a - b; });
    function _tipPct(n){
      var lo = 0, hi = _tipSorted.length;
      while(lo < hi){ var mid = (lo+hi)>>1; if(_tipSorted[mid] < n) lo = mid+1; else hi = mid; }
      return _tipSorted.length > 0 ? Math.min(99, Math.floor(lo / _tipSorted.length * 100)) : 0;
    }

    hits.forEach(function(hit){
      if(hit.type === 'sweep'){
        var sw = hit.data;
        var tkr = sw.ticker || _activeTicker;
        var tc = _tickerColorMap[tkr];
        var clr = tc ? tc.stroke : '#60a5fa';
        var parts = [];
        parts.push('<span style="color:'+clr+';font-weight:bold">' + tkr + '</span>');
        parts.push(sw.date.slice(5)); // MM-DD
        if(sw.time) parts.push(sw.time.slice(0,8)); // HH:MM:SS
        if(sw.size) parts.push(sw.size.toLocaleString() + ' shares');
        if(sw.price) parts.push('@ $' + Number(sw.price).toFixed(2));
        if(sw.notional) parts.push('= <b>$' + fmt$(sw.notional) + '</b>');
        if(sw.notional) parts.push('Pct: ' + _tipPct(sw.notional) + '%');
        // Add event metadata tags from _evMetaCache
        var swMeta = _evMetaCache[sw.date];
        if(swMeta){
          var mtags = [];
          if(swMeta.sweep_rank != null) mtags.push('<span style="color:#3b82f6">S#' + swMeta.sweep_rank + '</span>');
          if(swMeta.daily_rank != null) mtags.push('<span style="color:#f59e0b">D#' + swMeta.daily_rank + '</span>');
          if(swMeta.is_cb) mtags.push('<span style="color:#eab308">\uD83D\uDCA3</span>');
          if(swMeta.is_monster) mtags.push('<span style="color:#f97316">\uD83D\uDCA5</span>');
          if(swMeta.is_rare) mtags.push('<span style="color:#c4b5fd">R</span>');
          if(mtags.length) parts.push(mtags.join(' '));
        }
        rows.push(parts.join('; '));
      } else {
        var ev2 = hit.data;
        var tkr2 = ev2.ticker || _activeTicker;
        var tc2 = _tickerColorMap[tkr2];
        var clr2 = tc2 ? tc2.stroke : '#60a5fa';
        var parts2 = [];
        parts2.push('<span style="color:'+clr2+';font-weight:bold">' + tkr2 + '</span>');
        parts2.push(ev2.date.slice(5));
        // Type tags
        var tags = [];
        if(ev2.event_type === 'clusterbomb') tags.push('<span style="color:#eab308">CB</span>');
        if(ev2.is_rare) tags.push('<span style="color:#c4b5fd">Rare</span>');
        if(ev2.is_monster || ev2.event_type === 'monster_sweep') tags.push('<span style="color:#f97316">Monster</span>');
        if(tags.length) parts2.push(tags.join(' '));
        if(ev2.daily_rank) parts2.push('D#' + ev2.daily_rank);
        if(ev2.sweep_rank) parts2.push('S#' + ev2.sweep_rank);
        if(ev2.total_notional) parts2.push('<b>$' + fmt$(ev2.total_notional) + '</b>');
        if(ev2.sweep_count) parts2.push(ev2.sweep_count + ' sweeps');
        if(ev2.direction) parts2.push(ev2.direction);
        rows.push(parts2.join('; '));
      }
    });
    tooltip.innerHTML = rows.join('<br>');
  } else {
    tooltip.style.display = 'none';
  }
}

function onTickerToggle(el){
  var ticker = el.getAttribute('data-ticker');
  _overlayTickers.forEach(function(t){ if(t.ticker === ticker) t.on = el.checked; });
  syncGroupCheckboxes();
  // Re-fetch sweep data — the enabled ticker set changed
  fetchSweepChart();
}

function onGroupToggle(gi, el){
  var g = _overlayGroups[gi];
  g.on = el.checked;
  g.tickers.forEach(function(t){ t.on = el.checked; });
  var rows = document.querySelectorAll('[data-group="'+gi+'"] .ticker-check');
  rows.forEach(function(cb){ cb.checked = el.checked; });
  // Re-fetch sweep data — the enabled ticker set changed
  fetchSweepChart();
}

function syncGroupCheckboxes(){
  var hdrs = document.querySelectorAll('.ticker-group-hdr input');
  _overlayGroups.forEach(function(g, gi){
    if(!hdrs[gi]) return;
    var allOn = g.tickers.every(function(t){ return t.on; });
    var anyOn = g.tickers.some(function(t){ return t.on; });
    hdrs[gi].checked = allOn;
    hdrs[gi].indeterminate = !allOn && anyOn;
  });
}

function togglePanel(){
  var panel = document.getElementById('leftPanel');
  var btn = document.getElementById('collapseBtn');
  panel.classList.toggle('collapsed');
  btn.innerHTML = panel.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
  setTimeout(function(){
    var container = document.getElementById('chartContainer');
    _chart.resize(container.clientWidth, container.clientHeight);

}

function _syncIntervalButtons(){
  var btns = document.getElementById('candleIntervalCtrl').querySelectorAll('button');
  var intervalMap = {'1m':1,'5m':5,'1h':60,'4h':240,'1D':1440,'2D':2880,'W':10080,'M':43200,'3M':129600};
  btns.forEach(function(b){
    b.classList.toggle('active', intervalMap[b.textContent] === _candleInterval);
  });

function toggleLayer(layer){

  if(layer === 'daily') updateDailyHist();
  drawBubbles();
  updateStats();
  buildSweepMenu();
  updateSweepBtnState();
}

function setSweepFilterMode(mode){
  _sweepFilterMode = mode;
  document.getElementById('modeNotional').classList.toggle('active', mode === 'notional');
  document.getElementById('modePctl').classList.toggle('active', mode === 'percentile');
  var inp = document.getElementById('cfgSweepValue');
  if(mode === 'notional'){
    inp.value = _layerCfg.minNotional || 500000;
    inp.step = '100000';
    inp.min = '0';
    inp.max = '';

    inp.placeholder = '500000';

    inp.step = '5';
    inp.min = '0';
    inp.max = '99';
    inp.title = 'Min percentile (0-99)';
    inp.placeholder = '85';
  }
  drawBubbles();
  updateStats();
  updateFeed();

function onLayerCfgChange(){
  var val = parseFloat(document.getElementById('cfgSweepValue').value) || 0;
  if(_sweepFilterMode === 'notional'){
    _layerCfg.minNotional = val;
  } else {
    _layerCfg.percentile = Math.min(99, Math.max(0, Math.floor(val)));
  }
  _layerCfg.dailyFrom = parseInt(document.getElementById('cfgDailyFrom').value) || 1;
  _layerCfg.dailyTo = parseInt(document.getElementById('cfgDailyTo').value) || 20;
  _layerCfg.singleFrom = parseInt(document.getElementById('cfgSingleFrom').value) || 1;
  _layerCfg.singleTo = parseInt(document.getElementById('cfgSingleTo').value) || 10;
  drawBubbles();
  updateStats();
  updateFeed();
}

// Always-live timers
function _startLiveTimers(){
  clearInterval(_sweepTimer);
  clearInterval(_candleTimer);
  clearInterval(_liveBarTimer);
  clearInterval(_tickerListTimer);
  _candleTimer = setInterval(fetchCandles, 60000);
  _sweepTimer = setInterval(fetchSweepChart, 30000);
  // Fast live-bar polling: 1s for 1m, 2s for 5m, 5s for ≥15m
  var liveMs = _candleInterval <= 1 ? 1000 : _candleInterval <= 5 ? 2000 : 5000;
  _liveBarTimer = setInterval(fetchLiveBar, liveMs);
  // Refresh ticker list prices every 2s
  _tickerListTimer = setInterval(_refreshTickerListPrices, 1000);
}

function fetchLiveBar(){
  if(!_activeTicker || !_candleSeries) return;
  fetch('/api/chart/live-bar?ticker='+_activeTicker+'&interval='+_candleInterval)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var bars = d.bars || [];
      if(bars.length === 0) return;
      // Debug: log timestamps to see if they match
      var lastCandle = _candles.length > 0 ? _candles[_candles.length - 1] : null;
      if(lastCandle && bars.length > 0){
        console.log('[LIVE] chart last:', lastCandle.time, 'live bar:', bars[bars.length-1].time, 'close:', bars[bars.length-1].close);
      }
      var changed = false;
      bars.forEach(function(b){
        if(_candles.length === 0) return;
        var lastCandle = _candles[_candles.length - 1];
        if(b.time > lastCandle.time){
          // New bar — append
          _candles.push(b);
          _updateSeriesBar(b);
          changed = true;
        } else if(b.time === lastCandle.time){
          // Update forming candle if price changed
          if(b.close !== lastCandle.close || b.high !== lastCandle.high || b.low !== lastCandle.low){
            lastCandle.high = Math.max(lastCandle.high, b.high);
            lastCandle.low = Math.min(lastCandle.low, b.low);
            lastCandle.close = b.close;
            lastCandle.volume = b.volume;
            _updateSeriesBar(lastCandle);
            changed = true;
          }
        }
      });
      if(changed){
        drawBubbles();
        // Also update active ticker's price in ticker list (most reliable live source)
        var livePrice = _candles[_candles.length - 1].close;
        if(_tickerPrices[_activeTicker]){
          _tickerPrices[_activeTicker].price = livePrice;
          _updateTickerPriceDOM(_activeTicker);
        }
      }
    })
    .catch(function(){});
}

document.addEventListener('visibilitychange', function(){
  if(!document.hidden){
    _startLiveTimers();
    fetchCandles();
  } else {
    // Stop fast polling when tab is hidden to save resources
    clearInterval(_liveBarTimer);
  }
});

// ====================================================================
// STATS & FEED
// ====================================================================
function updateStats(){
  var events = _chartEvents.length;
  var totalN = 0, largest = 0;
  _chartEvents.forEach(function(ev){
    if(ev.total_notional){
      totalN += ev.total_notional;
      if(ev.total_notional > largest) largest = ev.total_notional;
    }
  });
  document.getElementById('statSweeps').textContent = events;
  document.getElementById('statNotional').textContent = '$' + fmt$(totalN);
  document.getElementById('statLargest').textContent = '$' + fmt$(largest);
}

function updateFeed(){
  var feed = document.getElementById('sweepFeed');
  // Show recent events (most recent first)
  var recent = _chartEvents.slice().reverse().slice(0, 30);
  if(recent.length === 0){
    feed.innerHTML = '<div style="color:#555;font-size:11px;">No events found</div>';
    return;
  }
  var html = '';
  recent.forEach(function(ev){
    var typeColor = '#888';
    var typeLabel = '';
    if(ev.event_type === 'clusterbomb'){ typeColor = '#eab308'; typeLabel = 'CB'; }
    else if(ev.event_type === 'rare_sweep'){ typeColor = '#c4b5fd'; typeLabel = 'Rare'; }
    else if(ev.event_type === 'monster_sweep'){ typeColor = '#f97316'; typeLabel = 'Monster'; }
    if(ev.daily_rank && !typeLabel){ typeColor = '#f59e0b'; typeLabel = 'D#' + ev.daily_rank; }
    if(ev.sweep_rank && !typeLabel){ typeColor = '#3b82f6'; typeLabel = 'S#' + ev.sweep_rank; }
    html += '<div class="feed-item">'
      + '<span class="feed-time">' + ev.date + '</span>'
      + '<span class="feed-ticker" style="color:'+typeColor+'">' + (typeLabel || 'Event') + '</span>'
      + '<span class="feed-notional">$' + fmt$(ev.total_notional || 0) + '</span>'
      + '</div>';
  });
  feed.innerHTML = html;
}

// ====================================================================
// UTILS
// ====================================================================
function fmt$(v){
  if(v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if(v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if(v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return v.toFixed(0);
}

// ====================================================================
// PRESETS (localStorage)
// ====================================================================
var PRESET_KEY = 'chart_presets_v4';

function _getPresets(){
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || {}; } catch(e){ return {}; }
}

function _populatePresetSelect(){
  var sel = document.getElementById('presetSelect');
  var presets = _getPresets();
  sel.innerHTML = '<option value="">Presets...</option>';
  Object.keys(presets).sort().forEach(function(name){
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function savePreset(){
  var name = prompt('Preset name:');
  if(!name || !name.trim()) return;
  name = name.trim();
  var cfg = {
    mode: _mode,
    ticker: _activeTicker,
    watchlist: _activeWatchlist,
    interval: _candleInterval,
    layers: JSON.parse(JSON.stringify(_activeLayers)),
    layerCfg: JSON.parse(JSON.stringify(_layerCfg)),
    sweepFilterMode: _sweepFilterMode,
    tickers: {}
  };
  // Save overlay ticker on/off state
  _overlayTickers.forEach(function(t){
    cfg.tickers[t.ticker] = t.on;
  });
  var presets = _getPresets();
  presets[name] = cfg;
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
  document.getElementById('presetSelect').value = name;
}

function loadPreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name) return;
  var presets = _getPresets();
  var cfg = presets[name];
  if(!cfg) return;

  // Restore layer toggles
  if(cfg.layers){
    _activeLayers = cfg.layers;
    if(_activeLayers.sweeps === undefined) _activeLayers.sweeps = true;
    buildSweepMenu();
    updateSweepBtnState();
  }
  if(cfg.layerCfg){
    _layerCfg = cfg.layerCfg;
    // Restore sweep filter mode
    if(cfg.sweepFilterMode) _sweepFilterMode = cfg.sweepFilterMode;
    setSweepFilterMode(_sweepFilterMode);
    document.getElementById('cfgDailyFrom').value = _layerCfg.dailyFrom || 1;
    document.getElementById('cfgDailyTo').value = _layerCfg.dailyTo || 20;
    document.getElementById('cfgSingleFrom').value = _layerCfg.singleFrom || 1;
    document.getElementById('cfgSingleTo').value = _layerCfg.singleTo || 10;
  }

  // Restore interval
  if(cfg.interval){
    _candleInterval = cfg.interval;
    _syncIntervalButtons();
  }

  // Restore overlay ticker on/off states
  if(cfg.tickers){
    _overlayTickers.forEach(function(t){
      if(cfg.tickers.hasOwnProperty(t.ticker)){
        t.on = cfg.tickers[t.ticker];
      }
    });
  }

  // Restore mode
  if(cfg.mode === 'single' && cfg.ticker){
    _mode = 'single';
    _activeWatchlist = null;
    document.getElementById('watchlistSelect').value = '';
    setActiveTicker(cfg.ticker, 'input');
  } else if(cfg.watchlist){
    _mode = 'watchlist';
    _activeWatchlist = cfg.watchlist;
    document.getElementById('watchlistSelect').value = cfg.watchlist;
    buildWatchlistView();
    loadAll(true);
  }
}

function deletePreset(){
  var sel = document.getElementById('presetSelect');
  var name = sel.value;
  if(!name){ alert('Select a preset first'); return; }
  if(!confirm('Delete preset "'+name+'"?')) return;
  var presets = _getPresets();
  delete presets[name];
  localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
  _populatePresetSelect();
}

_populatePresetSelect();
</script>
