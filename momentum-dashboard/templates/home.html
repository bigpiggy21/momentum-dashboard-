<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Dashboard</title>
<!-- No header CSS needed — homepage has no nav bar -->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#d0d0d8;font-family:'Segoe UI',-apple-system,sans-serif;font-size:13px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#0a0a10;}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#3a3a4a;}
*{scrollbar-width:thin;scrollbar-color:#2a2a3a #0a0a10;}

/* Background image — brighter/clearer overlay */
.landing-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  background:url('/static/img/montblanc.jpeg') center center / cover no-repeat;
}
.landing-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(8,8,13,0.45) 0%, rgba(8,8,13,0.35) 30%, rgba(8,8,13,0.12) 55%, rgba(8,8,13,0.08) 100%);
}

/* Landing — logo centred right of screen */
.landing{
  position:relative;z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px 50px;
  /* Push right of centre */
  margin-left:auto;
  margin-right:25%;
}

/* Logo + brand */
.landing-logo{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  padding:20px;
}
.landing-logo svg{filter:drop-shadow(0 0 36px rgba(245,158,11,0.40));}
.landing-logo h2{font-size:46px;font-weight:700;color:#fff;letter-spacing:-0.5px;text-shadow:0 2px 28px rgba(0,0,0,0.7);white-space:nowrap;}
.landing-logo h2 .accent{color:#f59e0b;}
.landing-tagline{font-size:18px;color:#ddd;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 10px rgba(0,0,0,0.7);}

.landing-footer{
  text-align:center;font-size:10px;color:#555;
  padding:10px 0;margin-top:20px;
}

/* Enter button — top right */
.enter-btn{
  position:fixed;top:20px;right:24px;z-index:10;
  padding:7px 18px;border-radius:4px;
  background:rgba(20,20,30,0.5);border:1px solid #2a2a3a;
  color:#777;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  text-decoration:none;cursor:pointer;
  transition:all 0.2s;
}
.enter-btn:hover{color:#f59e0b;border-color:#f59e0b66;background:rgba(26,26,36,0.8);}

/* Branding toggle — bottom right corner */
.brand-toggle{
  position:fixed;bottom:16px;right:16px;z-index:10;
  width:28px;height:28px;border-radius:50%;
  background:rgba(20,20,30,0.6);border:1px solid #2a2a3a;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;opacity:0.4;
}
.brand-toggle:hover{opacity:1;border-color:#f59e0b66;background:rgba(26,26,36,0.8);}
.brand-toggle svg{width:14px;height:14px;}

/* Responsive */
@media(max-width:900px){
  .landing{margin-left:auto;margin-right:auto;}
}
</style>
</head>
<body>

<!-- Enter button -->
<a class="enter-btn" href="/sweeps">Enter</a>

<!-- Background image -->
<div class="landing-bg"></div>

<!-- LANDING CONTENT — Logo only, centre-right -->
<div class="landing">

<div class="landing-logo">
<svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 78 L30 38 L42 55 L52 32 L68 58 L92 78Z" fill="#b4842a" opacity="0.25"/>
  <path d="M15 78 L42 22 L55 48 L62 18 L85 78Z" fill="#f59e0b" opacity="0.75"/>
  <path d="M62 18 L55 42 L58 35 L65 46 L72 38 L78 52 L68 44Z" fill="#fde68a" opacity="0.6"/>
  <path d="M42 22 L38 38 L44 32 L50 42 L55 48Z" fill="#fde68a" opacity="0.5"/>
  <path d="M42 22 L62 18" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
</svg>
<h2 id="brandName">TBD <span class="accent">Technologies</span></h2>
<div class="landing-tagline">Momentum Intelligence Platform</div>
</div>

<div class="landing-footer">v1</div>

</div>

<!-- Branding toggle (bottom-right, subtle) -->
<div class="brand-toggle" id="brandToggle" onclick="cycleBrand()" title="Cycle brand name">
  <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <path d="M12 3L3 21h18L12 3z"/>
  </svg>
</div>

<script>
var _brands = [
  {prefix:'TBD', title:'TBD Technologies'},
  {prefix:'Lace', title:'Lace Technologies'},
  {prefix:'Pigs', title:'Pigs Technologies'}
];
var _brandIdx = parseInt(localStorage.getItem('brandIdx') || '0', 10);
if(_brandIdx < 0 || _brandIdx >= _brands.length) _brandIdx = 0;

function applyBrand(idx){
  var b = _brands[idx];
  var el = document.getElementById('brandName');
  if(el) el.innerHTML = b.prefix + ' <span class="accent">Technologies</span>';
  document.title = b.title;
}

function cycleBrand(){
  _brandIdx = (_brandIdx + 1) % _brands.length;
  localStorage.setItem('brandIdx', _brandIdx);
  applyBrand(_brandIdx);
}

applyBrand(_brandIdx);
</script>
</body>
</html>
