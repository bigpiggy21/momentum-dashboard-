<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBD Technologies — Screener</title>
<link rel="stylesheet" href="/static/header.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#d0d0d8;font-family:'Segoe UI',-apple-system,sans-serif;font-size:13px;}
/* Row 2: Page Controls */
.header-row2{background:#0c0c14;padding:6px 20px;border-bottom:1px solid #1e1e2e;display:flex;gap:10px;align-items:center;position:sticky;top:var(--row1-h,50px);z-index:101;}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:999;justify-content:center;align-items:center;}
.modal-overlay.open{display:flex;}
.modal{background:#12121a;border:1px solid #2a2a3a;border-radius:10px;padding:28px;max-width:680px;width:92%;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:17px;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-close{float:right;background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:4px;}.modal-close:hover{color:#fff;}
.nav-link{color:#f59e0b;font-size:11px;text-decoration:none;font-weight:500;background:#1e293b;padding:4px 10px;border-radius:4px;border:1px solid #334155;}
.nav-link:hover{background:#334155;}
.dd-wrap{position:relative;}
.dd-btn{background:#1e293b;color:#ccc;border:1px solid #334155;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;}
.dd-btn:hover{background:#334155;}.dd-btn .active-name{color:#f59e0b;}
.dd-menu{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:#14141e;border:1px solid #2a2a3a;border-radius:6px;padding:8px;min-width:180px;z-index:200;max-height:400px;overflow-y:auto;}
.dd-menu.open{display:block;}
.dd-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:3px;cursor:pointer;font-size:11px;color:#ccc;}
.dd-item:hover{background:#1e1e2e;}.dd-item input{accent-color:#f59e0b;}
.dd-item.wl-active{background:#1e293b;color:#f59e0b;font-weight:600;}
/* Criteria builder */
.criteria-bar{background:#0c0c14;padding:12px 20px;border-bottom:1px solid #1e1e2e;}
.criteria-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.criteria-row:last-child{margin-bottom:0;}
.criteria-row select{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:6px 10px;border-radius:4px;font-size:12px;min-width:120px;}
.criteria-row select:focus{border-color:#f59e0b;outline:none;}
.criteria-row select.compound-sub{min-width:90px;background:#0e1525;border-color:#1e3a5e;color:#7cb3d9;font-size:11px;padding:5px 8px;}
/* Join button — IF / AND / OR */
.join-btn{width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;letter-spacing:0.3px;cursor:pointer;border:1px solid #2a2a3a;flex-shrink:0;user-select:none;}
.join-if{background:#1e293b;color:#888;cursor:default;}
.join-and{background:#1546cc;color:#fff;border-color:#1546cc;}
.join-or{background:#e45200;color:#fff;border-color:#e45200;}
.btn-remove{background:#1a0f0f;color:#ff5254;border:1px solid #3a1a1a;width:34px;height:34px;border-radius:3px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-remove:hover{background:#2a1515;border-color:#ff5254;}
/* TF toggle buttons — same size as indicator boxes */
.tf-toggles{display:flex;gap:2px;flex-wrap:nowrap;}
.tf-btn{width:34px;height:34px;border-radius:3px;cursor:pointer;font-weight:700;background:#14141e;color:#555;border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.tf-btn.active{background:#1e293b;color:#fff;border-color:#444;}
.tf-btn.disabled{opacity:0.15;cursor:not-allowed;}
.tf-all-btn{width:22px;height:34px;border-radius:3px;cursor:pointer;font-weight:700;background:#0e0e16;color:#444;border:1px solid #1e1e2e;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.tf-all-btn:hover{color:#f59e0b;border-color:#f59e0b;}
.criteria-actions{display:flex;gap:8px;align-items:center;margin-top:8px;}
.btn-add{background:#1e293b;color:#aaa;border:1px solid #334155;padding:5px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;}
.btn-add:hover{background:#334155;color:#fff;}
.btn-search{background:#f59e0b;color:#000;border:none;padding:6px 24px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:700;letter-spacing:0.3px;}
.btn-search:hover{background:#d97706;}
.btn-search:disabled{opacity:0.4;cursor:not-allowed;}
.btn-export{background:#1e293b;color:#aaa;border:1px solid #334155;padding:5px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;display:none;}
.btn-export:hover{background:#334155;color:#fff;}
.adj-btn{background:#1e293b;color:#888;border:1px solid #334155;padding:5px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-weight:700;letter-spacing:0.5px;}
.adj-btn.active{background:#f59e0b;color:#000;border-color:#f59e0b;}
.result-count{font-size:11px;color:#555;font-family:'Consolas',monospace;margin-left:4px;}
.result-count .match{color:#f59e0b;font-weight:700;}
/* Row visibility toggles */
.results-bar{background:#0a0a10;padding:6px 20px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px;}
.row-toggles{display:flex;gap:4px;}
.row-toggle{font-size:11px;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:700;border:none;}
.row-toggle.active{opacity:1;}.row-toggle.inactive{opacity:0.25;}
.rt-mom{background:#0999a8;color:#fff;}.rt-sqz{background:#e45200;color:#fff;}.rt-band{background:#2c66ff;color:#fff;}.rt-acc{background:#4bb050;color:#fff;}.rt-dev{background:#555;color:#fff;}
/* Scan info */
.scan-info{font-size:11px;color:#666;font-family:'Consolas',monospace;}
/* Ticker summary strip */
.ticker-strip{background:#0c0c14;padding:8px 20px;border-bottom:1px solid #1e1e2e;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.ticker-chip{background:#14141e;color:#ccc;border:1px solid #2a2a3a;padding:4px 10px;border-radius:4px;font-size:12px;font-family:'Consolas',monospace;font-weight:700;cursor:default;}
/* Results table */
.results-wrap{overflow-x:auto;padding:0;}
.results-table{border-collapse:collapse;}
.results-table th{font-size:11px;color:#888;padding:6px 0;text-align:center;background:#0a0a10;border-bottom:1px solid #1e1e2e;font-weight:700;}
.results-table th.th-ticker{text-align:left;padding-left:12px;width:48px;}
.results-table th.th-price{width:56px;}.results-table th.th-change{width:48px;}.results-table th.th-wma{width:28px;}
.results-table th.th-tf{width:40px;padding:6px 1px;}
.ticker-row{border-bottom:1px solid #111118;}.ticker-row:hover{background:#111118;}
.ticker-row td{padding:4px 0;text-align:center;vertical-align:top;}
.ticker-row td.td-tf{padding:4px 1px;}
.ticker-row .td-ticker{text-align:left;padding-left:12px;font-weight:700;color:#fff;font-size:13px;vertical-align:middle;}
.ticker-row .td-ticker a{color:#fff;text-decoration:none;}.ticker-row .td-ticker a:hover{color:#f59e0b;}
.ticker-row .td-price{font-family:'Consolas',monospace;font-size:12px;color:#ccc;font-weight:600;padding:4px 4px;vertical-align:middle;}
.ticker-row .td-change{font-family:'Consolas',monospace;font-size:11px;font-weight:600;padding:4px 4px;vertical-align:middle;}
.td-change.positive{color:#22c55e;}.td-change.negative{color:#ef4444;}
.ticker-row .td-wma{vertical-align:middle;text-align:center;}
.cell-group{display:flex;flex-direction:column;align-items:center;gap:1px;padding:2px 0;}
.ind-box{width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;}
.mom-cell{font-size:14px;}.mom-aqua{background:#0999a8;}.mom-blue{background:#1546cc;}.mom-yellow{background:#d4a800;color:#fff;}.mom-red{background:#b22838;}
.sqz-green{background:#1d5e20;}.sqz-black{background:#282830;border:1px solid #3a3a44;}.sqz-red{background:#821824;}.sqz-orange{background:#e45200;}
.band-cell{font-size:15px;}.band-cell.flip{background:#2c66ff;color:#fff;}.band-up{background:#0f1a12;color:#4bb050;}.band-down{background:#1a0f0f;color:#ff5254;}
.acc-cell{font-size:12px;}.acc-green{background:#4bb050;}.acc-red{background:#ff5254;}
.dev-cell{font-size:9px;font-weight:800;letter-spacing:0.5px;}.dev-buy{color:#fff;background:#2d8a35;}.dev-sell{color:#fff;background:#c43030;}.dev-none{background:#0e0e14;}
.ind-nodata{width:34px;height:34px;border-radius:3px;background:#111118;}
.ind-empty{width:34px;height:34px;border-radius:3px;background:#0e0e14;}
.wma-cell{font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;width:100%;height:100%;}.wma-above{color:#4bb050;}.wma-below{color:#ff5254;}
.wma-cross{color:#f59e0b;text-shadow:0 0 6px rgba(245,158,11,0.6);}
.hide-mom .row-mom{height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;font-size:0!important;line-height:0!important;opacity:0!important;}
.hide-sqz .row-sqz{height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;font-size:0!important;line-height:0!important;opacity:0!important;}
.hide-band .row-band{height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;font-size:0!important;line-height:0!important;opacity:0!important;}
.hide-acc .row-acc{height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;font-size:0!important;line-height:0!important;opacity:0!important;}
.hide-dev .row-dev{height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;font-size:0!important;line-height:0!important;opacity:0!important;}
.criteria-match{box-shadow:0 0 0 2px #f59e0b,0 0 8px rgba(245,158,11,0.3);}
.empty-state{padding:60px 20px;text-align:center;color:#333;font-size:13px;}
.empty-state .big{font-size:16px;color:#555;margin-bottom:8px;}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#f59e0b;padding:10px 18px;border-radius:6px;border:1px solid #334155;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#08080d;}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px;}
/* Saved searches */
.saved-wrap{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.saved-select{background:#14141e;border:1px solid #2a2a3a;color:#ccc;padding:5px 10px;border-radius:4px;font-size:11px;min-width:180px;}
.saved-select:focus{border-color:#f59e0b;outline:none;}
.btn-save-search{background:#1e293b;color:#aaa;border:1px solid #334155;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;}
.btn-save-search:hover{background:#334155;color:#fff;}
.btn-del-search{background:#1a0f0f;color:#ff5254;border:1px solid #3a1a1a;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:500;}
.btn-del-search:hover{background:#2a1515;border-color:#ff5254;}
</style>
</head>
<body>
<!-- Logo Popup Modal -->
<div class="modal-overlay" id="logoModal" onclick="if(event.target===this)closeLogoModal()">
<div class="modal" style="text-align:center;max-width:500px;">
<button class="modal-close" onclick="closeLogoModal()">&times;</button>
<div style="margin:30px 0 20px;">
<svg width="64" height="80" viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M11 2L2 26h8l3-10 3 10h4L11 2z" fill="#f59e0b" opacity="0.9"/>
<path d="M11 2L7 16l4-3 4 3L11 2z" fill="#fbbf24"/>
</svg>
</div>
<h2 style="font-size:28px;font-weight:700;margin-bottom:6px;">TBD <span style="color:#f59e0b;">Technologies</span></h2>
<p style="color:#666;font-size:13px;margin-bottom:30px;">Momentum Intelligence Platform</p>
<div style="border-top:1px solid #2a2a3a;padding-top:16px;color:#555;font-size:11px;">Future home of landing content &amp; system overview</div>
</div></div>

<!-- ROW 1: Global Navigation Bar (shared) -->
<script>window._activePage='search';</script>
<div id="headerRow1"></div>
<script src="/static/header.js"></script>

<!-- Row 2: Screener Controls -->
<div class="header-row2">
<div class="dd-wrap"><div class="dd-btn" onclick="toggleDD('wlMenu')">Watchlist : <span class="active-name" id="wlName">All Cached</span> &#x25BE;</div><div class="dd-menu" id="wlMenu"></div></div>
</div>

<div class="criteria-bar" id="criteriaBar">
<div class="saved-wrap">
  <select class="saved-select" id="savedSearchSelect" onchange="loadSavedSearch()">
    <option value="">-- Saved Searches --</option>
  </select>
  <button class="btn-save-search" onclick="saveSearch()">Save</button>
  <button class="btn-del-search" id="btnDelSearch" onclick="deleteSavedSearch()" style="display:none;">Delete</button>
</div>
<div id="criteriaRows"></div>
<div class="criteria-actions">
<button class="btn-add" onclick="addCriteria()">+ Add Criteria</button>
<button class="btn-search" id="btnSearch" onclick="runSearch()">Search</button>
<div class="adj-btn" id="adjBtn" onclick="toggleAdj()">ADJ</div>
<button class="btn-export" id="btnExport" onclick="exportTV()">Export TradingView</button>
<span class="result-count" id="resultCount"></span>
</div>
</div>

<div id="tickerStrip"></div>
<div id="resultsBarWrap"></div>

<div class="results-wrap" id="resultsWrap">
<div class="empty-state">
<div class="big">Build your criteria above and hit Search</div>
Add up to 6 conditions. Click AND/OR to change how rows combine.
</div>
</div>

<div class="toast" id="toast"></div>

<script>
function openLogoModal(){document.getElementById('logoModal').classList.add('open');}
function closeLogoModal(){document.getElementById('logoModal').classList.remove('open');}
function setStickyOffsets(){
  var r1=document.querySelector('.header-row1');
  var r2=document.querySelector('.header-row2');
  if(!r1)return;
  var h1=r1.offsetHeight;
  var h2=r2?r2.offsetHeight:0;
  document.documentElement.style.setProperty('--row1-h',h1+'px');
  document.documentElement.style.setProperty('--row12-h',(h1+h2)+'px');
}

var ALL_TFS=["1H","4H","8H","1D","2D","3D","5D","1W","2W","6W","1M","3M","6M","12M"];
var INDICATORS={
  mom_color:{label:"Momentum",values:[
    {val:"aqua",label:"Positive Rising (Aqua)"},
    {val:"blue",label:"Positive Falling (Blue)"},
    {val:"yellow",label:"Negative Rising (Yellow)"},
    {val:"red",label:"Negative Falling (Red)"}
  ]},
  sqz_state:{label:"Squeeze",values:[
    {val:"green",label:"No Squeeze (Green)"},
    {val:"black",label:"Low Squeeze (Black)"},
    {val:"red",label:"Mid Squeeze (Red)"},
    {val:"orange",label:"High Squeeze (Orange)"}
  ]},
  band_pos:{label:"Band Position",values:[
    {val:"\u2191",label:"Above 20 SMA"},
    {val:"\u2193",label:"Below 20 SMA"}
  ]},
  band_flip:{label:"Band Flip",values:[
    {val:"true",label:"Just Flipped"}
  ]},
  acc_state:{label:"Acceleration",values:[
    {val:"green",label:"Accelerating (Green)"},
    {val:"red",label:"Decelerating (Red)"}
  ]},
  acc_impulse:{label:"ACC Impulse",values:[
    {val:"\u25B2",label:"Impulse Up"},
    {val:"\u25BC",label:"Impulse Down"}
  ]},
  dev_signal:{label:"Deviation",values:[
    {val:"buy",label:"Buy Signal"},
    {val:"sell",label:"Sell Signal"}
  ]},
  above_wma30:{label:"30WMA Position",values:[
    {val:"true",label:"Above 30WMA"},
    {val:"false",label:"Below 30WMA"}
  ],noTF:true},
  wma30_cross:{label:"30WMA Cross",values:[
    {val:"crossed_above",label:"Crossed Above"},
    {val:"crossed_below",label:"Crossed Below"}
  ],noTF:true},
  hvc_triggered:{label:"Had HVC",values:[
    {val:"today",label:"Today"},
    {val:"week",label:"Within Last Week"},
    {val:"month",label:"Within Last Month"},
    {val:"quarter",label:"Within Last Quarter"}
  ],noTF:true,compound:true,
    compoundOptions:[
      {key:"dir",label:"Direction",choices:[{val:"",label:"Any"},{val:"positive",label:"Positive"},{val:"negative",label:"Negative"}]},
      {key:"gap",label:"Gap",choices:[{val:"",label:"Any"},{val:"has_gap",label:"Has Gap Up"},{val:"has_open_gap",label:"Has Open Gap"}]},
      {key:"count",label:"Count",choices:[{val:"",label:"Any"},{val:"multi_hvc",label:"2+ HVCs"}]}
    ]
  }
};

var watchlists=[];var activeWatchlist='';var adjActive=0;
// Each criterion: {indicator, timeframes: Set, value, join: 'and'|'or'}
var criteria=[];var searchResults=null;var totalTickers=0;var savedSearches={};var currentSearchName='';
var hiddenRows=new Set();var hasSearched=false;

function toggleDD(id){document.querySelectorAll('.dd-menu').forEach(function(m){if(m.id!==id)m.classList.remove('open');});document.getElementById(id).classList.toggle('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.dd-wrap'))document.querySelectorAll('.dd-menu').forEach(function(m){m.classList.remove('open');});});

function buildWatchlistMenu(){
  var m=document.getElementById('wlMenu');
  var html='<div class="dd-item'+(activeWatchlist===''?' wl-active':'')+'" onclick="switchWatchlist(\'\')">All Cached</div>';
  watchlists.forEach(function(w){
    var cnt=0;w.groups.forEach(function(g){cnt+=g.tickers.length;});
    html+='<div class="dd-item'+(w.name===activeWatchlist?' wl-active':'')+'" onclick="switchWatchlist(\''+w.name+'\')">'+w.name+' <span style="color:#555;font-size:9px;margin-left:4px">('+cnt+')</span></div>';
  });
  m.innerHTML=html;
}
function switchWatchlist(name){activeWatchlist=name;document.getElementById('wlName').textContent=name||'All Cached';buildWatchlistMenu();autoSearch();}
function toggleAdj(){adjActive=adjActive?0:1;document.getElementById('adjBtn').classList.toggle('active',adjActive===1);autoSearch();}

function toggleRow(row){
  if(hiddenRows.has(row))hiddenRows.delete(row);else hiddenRows.add(row);
  var wrap=document.getElementById('resultsWrap');
  ['mom','sqz','band','acc','dev'].forEach(function(r){wrap.classList.toggle('hide-'+r,hiddenRows.has(r));});
  document.querySelectorAll('.row-toggle').forEach(function(el){
    var r=el.textContent.toLowerCase();
    el.classList.toggle('active',!hiddenRows.has(r));
    el.classList.toggle('inactive',hiddenRows.has(r));
  });
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function exportTV(){
  if(!searchResults)return;
  var tickers=Object.keys(searchResults).sort();
  if(!tickers.length)return;
  var text=tickers.join(',\n');
  navigator.clipboard.writeText(text).then(function(){showToast('Copied '+tickers.length+' tickers to clipboard');}).catch(function(){
    var blob=new Blob([text],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='screener_results.txt';a.click();showToast('Downloaded screener_results.txt');
  });
}

// Criteria management
function addCriteria(){
  if(criteria.length>=6)return;
  criteria.push({indicator:'sqz_state',timeframes:new Set(['1W']),value:'',join:criteria.length===0?'if':'and'});
  renderCriteria();
}
function removeCriteria(idx){criteria.splice(idx,1);if(criteria.length>0)criteria[0].join='if';renderCriteria();autoSearch();}
function cycleJoin(idx){
  if(idx===0)return;
  criteria[idx].join=criteria[idx].join==='and'?'or':'and';
  renderCriteria();autoSearch();
}
function updateIndicator(idx,val){criteria[idx].indicator=val;criteria[idx].value='';criteria[idx].compoundSubs={};renderCriteria();}
function updateValue(idx,val){
  var def=INDICATORS[criteria[idx].indicator];
  if(def&&def.compound){
    // For compound indicators, store base value and rebuild compound string
    criteria[idx]._baseValue=val;
    rebuildCompoundValue(idx);
    renderCriteria();  // re-render to show/hide compound sub-filters
  }else{
    criteria[idx].value=val;
  }
  autoSearch();
}
function updateCompoundSub(idx,key,val){
  if(!criteria[idx].compoundSubs)criteria[idx].compoundSubs={};
  criteria[idx].compoundSubs[key]=val;
  rebuildCompoundValue(idx);
  autoSearch();
}
function rebuildCompoundValue(idx){
  var c=criteria[idx];
  var base=c._baseValue||'';
  if(!base){c.value='';return;}
  var parts=[base];
  var subs=c.compoundSubs||{};
  Object.keys(subs).forEach(function(k){if(subs[k])parts.push(subs[k]);});
  c.value=parts.join('|');
}
function toggleCriteriaTF(idx,tf){
  var s=criteria[idx].timeframes;
  if(s.has(tf)){if(s.size>1)s.delete(tf);}else s.add(tf);
  renderCriteria();autoSearch();
}
function selectAllTF(idx){ALL_TFS.forEach(function(tf){criteria[idx].timeframes.add(tf);});renderCriteria();autoSearch();}
function deselectAllTF(idx){criteria[idx].timeframes=new Set([ALL_TFS[0]]);renderCriteria();autoSearch();}

function renderCriteria(){
  var wrap=document.getElementById('criteriaRows');
  if(!criteria.length){wrap.innerHTML='';return;}
  var html='';
  criteria.forEach(function(c,i){
    var def=INDICATORS[c.indicator];
    var isNoTF=def&&def.noTF;
    html+='<div class="criteria-row">';
    // Join button
    if(i===0){
      html+='<div class="join-btn join-if">IF</div>';
    }else{
      var jcls=c.join==='or'?'join-or':'join-and';
      html+='<div class="join-btn '+jcls+'" onclick="cycleJoin('+i+')" title="Click to toggle AND/OR">'+c.join.toUpperCase()+'</div>';
    }
    // Indicator select
    html+='<select onchange="updateIndicator('+i+',this.value)">';
    Object.keys(INDICATORS).forEach(function(k){
      html+='<option value="'+k+'"'+(c.indicator===k?' selected':'')+'>'+INDICATORS[k].label+'</option>';
    });
    html+='</select>';
    // Value select
    var isCompound=def&&def.compound;
    var baseVal=isCompound?(c._baseValue||''):c.value;
    html+='<select onchange="updateValue('+i+',this.value)">';
    html+='<option value="">-- Select --</option>';
    if(def){def.values.forEach(function(v){html+='<option value="'+v.val+'"'+(baseVal===v.val?' selected':'')+'>'+v.label+'</option>';});}
    html+='</select>';
    // Compound sub-filters (inline after value select)
    if(isCompound&&baseVal&&def.compoundOptions){
      var subs=c.compoundSubs||{};
      def.compoundOptions.forEach(function(opt){
        html+='<select class="compound-sub" onchange="updateCompoundSub('+i+',\''+opt.key+'\',this.value)" title="'+opt.label+'">';
        opt.choices.forEach(function(ch){
          var sel=(subs[opt.key]===ch.val)?' selected':'';
          html+='<option value="'+ch.val+'"'+sel+'>'+ch.label+'</option>';
        });
        html+='</select>';
      });
    }
    // TF toggle buttons — 34x34 to match indicator boxes
    if(!isNoTF){
      html+='<div class="tf-all-btn" onclick="selectAllTF('+i+')" title="Select all TFs">All</div>';
    }
    html+='<div class="tf-toggles">';
    ALL_TFS.forEach(function(tf){
      var on=c.timeframes.has(tf);
      html+='<div class="tf-btn'+(on?' active':'')+(isNoTF?' disabled':'')+'" onclick="'+(isNoTF?'':'toggleCriteriaTF('+i+',\''+tf+'\')')+'">'+tf+'</div>';
    });
    html+='</div>';
    if(!isNoTF){
      html+='<div class="tf-all-btn" onclick="deselectAllTF('+i+')" title="Deselect all TFs">Clr</div>';
    }
    html+='<div class="btn-remove" onclick="removeCriteria('+i+')">&times;</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

function autoSearch(){if(!hasSearched)return;var valid=criteria.filter(function(c){return c.value!=='';});if(valid.length>0)runSearch();}

function runSearch(){
  var valid=criteria.filter(function(c){return c.value!=='';});
  if(!valid.length)return;
  // Send full criteria with join info
  var payload=valid.map(function(c){
    var def=INDICATORS[c.indicator];
    var tfs=(def&&def.noTF)?[]:Array.from(c.timeframes);
    return {indicator:c.indicator,timeframes:tfs,value:c.value,join:c.join};
  });
  var btn=document.getElementById('btnSearch');
  btn.disabled=true;btn.textContent='Searching...';
  fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({criteria:payload,adj:adjActive,watchlist:activeWatchlist})})
  .then(function(r){return r.json();})
  .then(function(data){
    searchResults=data.matches;totalTickers=data.total;hasSearched=true;
    renderResults();btn.disabled=false;btn.textContent='Search';
  })
  .catch(function(err){console.error('Search error:',err);btn.disabled=false;btn.textContent='Search';});
}

function getMatchSet(){
  var s=new Set();
  criteria.forEach(function(c){
    if(c.value==='')return;
    var def=INDICATORS[c.indicator];
    if(def&&def.noTF)return;
    c.timeframes.forEach(function(tf){s.add(c.indicator+'|'+tf);});
  });
  return s;
}

function renderResults(){
  var wrap=document.getElementById('resultsWrap');
  var countEl=document.getElementById('resultCount');
  var stripEl=document.getElementById('tickerStrip');
  var barEl=document.getElementById('resultsBarWrap');
  var exportBtn=document.getElementById('btnExport');
  if(!searchResults){
    wrap.innerHTML='<div class="empty-state"><div class="big">Build your criteria above and hit Search</div>Add up to 6 conditions. Click AND/OR to change how rows combine.</div>';
    countEl.textContent='';stripEl.innerHTML='';barEl.innerHTML='';exportBtn.style.display='none';return;
  }
  var tickers=Object.keys(searchResults).sort();
  countEl.innerHTML='<span class="match">'+tickers.length+'</span> / '+totalTickers+' match';
  exportBtn.style.display=tickers.length?'inline-block':'none';
  if(!tickers.length){
    wrap.innerHTML='<div class="empty-state"><div class="big">No tickers match all criteria</div>Try removing a condition or changing the watchlist scope</div>';
    stripEl.innerHTML='';barEl.innerHTML='';return;
  }
  // Ticker summary strip
  stripEl.innerHTML='<div class="ticker-strip">'+tickers.map(function(tk){return '<span class="ticker-chip">'+tk+'</span>';}).join('')+'</div>';
  // Results bar
  barEl.innerHTML='<div class="results-bar"><div class="row-toggles">'
    +'<div class="row-toggle rt-mom'+(hiddenRows.has('mom')?' inactive':' active')+'" onclick="toggleRow(\'mom\')">MOM</div>'
    +'<div class="row-toggle rt-sqz'+(hiddenRows.has('sqz')?' inactive':' active')+'" onclick="toggleRow(\'sqz\')">SQZ</div>'
    +'<div class="row-toggle rt-band'+(hiddenRows.has('band')?' inactive':' active')+'" onclick="toggleRow(\'band\')">BAND</div>'
    +'<div class="row-toggle rt-acc'+(hiddenRows.has('acc')?' inactive':' active')+'" onclick="toggleRow(\'acc\')">ACC</div>'
    +'<div class="row-toggle rt-dev'+(hiddenRows.has('dev')?' inactive':' active')+'" onclick="toggleRow(\'dev\')">DEV</div>'
    +'</div></div>';

  var matchSet=getMatchSet();
  var html='<table class="results-table"><thead><tr>';
  html+='<th class="th-ticker">Ticker</th><th class="th-price">Price</th><th class="th-change">%</th><th class="th-wma">30W</th>';
  ALL_TFS.forEach(function(tf){html+='<th class="th-tf">'+tf+'</th>';});
  html+='</tr></thead><tbody>';
  tickers.forEach(function(tk){
    var state=searchResults[tk];var meta=state._meta||{};
    html+='<tr class="ticker-row">';
    html+='<td class="td-ticker"><a href="/?ticker='+tk+'" target="_blank">'+tk+'</a></td>';
    var price=meta.price;html+='<td class="td-price">'+(price!=null?price.toFixed(2):'')+'</td>';
    var chg=meta.price_change_pct;var chgCls=chg>0?'positive':chg<0?'negative':'';
    html+='<td class="td-change '+chgCls+'">'+(chg!=null?(chg>0?'+':'')+chg.toFixed(1)+'%':'')+'</td>';
    var wma=meta.above_wma30;var wmaCross=meta.wma30_cross||'';var wmaHtml='';
    if(wma===true)wmaHtml='<span class="wma-cell wma-above'+(wmaCross?' wma-cross':'')+'">&#x2191;</span>';
    else if(wma===false)wmaHtml='<span class="wma-cell wma-below'+(wmaCross?' wma-cross':'')+'">&#x2193;</span>';
    html+='<td class="td-wma">'+wmaHtml+'</td>';
    ALL_TFS.forEach(function(tf){
      var d=state[tf];
      if(!d){html+='<td class="td-tf"><div class="cell-group"><div class="ind-nodata"></div></div></td>';return;}
      html+='<td class="td-tf"><div class="cell-group">';
      var momCls='ind-nodata';var momTxt='';
      if(d.mom_color){momCls='ind-box mom-cell mom-'+d.mom_color;momTxt=d.mom_rising?'&#x2197;':'&#x2198;';}
      html+='<div class="row-mom '+momCls+(matchSet.has('mom_color|'+tf)?' criteria-match':'')+'">'+momTxt+'</div>';
      var sqzCls='ind-nodata';if(d.sqz_state)sqzCls='ind-box sqz-'+d.sqz_state;
      html+='<div class="row-sqz '+sqzCls+(matchSet.has('sqz_state|'+tf)?' criteria-match':'')+'"></div>';
      var bandCls='ind-nodata';var bandTxt='';
      if(d.band_pos==='\u2191'){bandCls='ind-box band-cell'+(d.band_flip?' flip':' band-up');bandTxt='&#x2191;';}
      else if(d.band_pos==='\u2193'){bandCls='ind-box band-cell'+(d.band_flip?' flip':' band-down');bandTxt='&#x2193;';}
      html+='<div class="row-band '+bandCls+((matchSet.has('band_pos|'+tf)||matchSet.has('band_flip|'+tf))?' criteria-match':'')+'">'+bandTxt+'</div>';
      var accCls='ind-nodata';var accTxt='';
      if(d.acc_state){accCls='ind-box acc-cell acc-'+d.acc_state;accTxt=d.acc_impulse||'';}
      html+='<div class="row-acc '+accCls+((matchSet.has('acc_state|'+tf)||matchSet.has('acc_impulse|'+tf))?' criteria-match':'')+'">'+accTxt+'</div>';
      var devCls='ind-empty';var devTxt='';
      if(d.dev_signal==='buy'){devCls='ind-box dev-cell dev-buy';devTxt='BUY';}
      else if(d.dev_signal==='sell'){devCls='ind-box dev-cell dev-sell';devTxt='SELL';}
      html+='<div class="row-dev '+devCls+(matchSet.has('dev_signal|'+tf)?' criteria-match':'')+'">'+devTxt+'</div>';
      html+='</div></td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

// ── Saved searches ──────────────────────────────────────
function loadSavedSearches(){
  fetch('/api/searches').then(function(r){return r.json();}).then(function(data){
    savedSearches=data;
    var sel=document.getElementById('savedSearchSelect');
    var opts='<option value="">-- Saved Searches --</option>';
    Object.keys(data).sort().forEach(function(name){
      var esc=name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      opts+='<option value="'+esc+'"'+(name===currentSearchName?' selected':'')+'>'+name+'</option>';
    });
    sel.innerHTML=opts;
    document.getElementById('btnDelSearch').style.display=currentSearchName?'inline-block':'none';
  });
}

function loadSavedSearch(){
  var sel=document.getElementById('savedSearchSelect');
  var name=sel.value;
  if(!name){currentSearchName='';document.getElementById('btnDelSearch').style.display='none';return;}
  var s=savedSearches[name];
  if(!s)return;

  // Restore criteria (convert timeframe arrays back to Sets)
  criteria=s.criteria.map(function(c){
    return {indicator:c.indicator,timeframes:new Set(c.timeframes||[]),value:c.value,join:c.join||'if',compoundSubs:c.compoundSubs||{},_baseValue:c._baseValue||''};
  });

  // Restore ADJ toggle
  adjActive=s.adj||0;
  document.getElementById('adjBtn').classList.toggle('active',adjActive===1);

  // Restore watchlist
  activeWatchlist=s.watchlist||'';
  document.getElementById('wlName').textContent=activeWatchlist||'All Cached';
  buildWatchlistMenu();

  currentSearchName=name;
  document.getElementById('btnDelSearch').style.display='inline-block';
  renderCriteria();
  showToast('Loaded: '+name);

  // Auto-run if criteria have values
  var valid=criteria.filter(function(c){return c.value!=='';});
  if(valid.length>0){hasSearched=true;runSearch();}
}

function saveSearch(){
  if(!criteria.length){showToast('Add criteria first');return;}
  var valid=criteria.filter(function(c){return c.value!=='';});
  if(!valid.length){showToast('Select values for criteria first');return;}

  var defaultName=currentSearchName||'';
  var name=prompt('Save search as:',defaultName);
  if(!name||!name.trim())return;
  name=name.trim();

  var payload={
    name:name,
    criteria:criteria.map(function(c){
      var def=INDICATORS[c.indicator];
      var obj={indicator:c.indicator,timeframes:(def&&def.noTF)?[]:Array.from(c.timeframes),value:c.value,join:c.join};
      if(c.compoundSubs)obj.compoundSubs=c.compoundSubs;
      if(c._baseValue)obj._baseValue=c._baseValue;
      return obj;
    }),
    adj:adjActive,
    watchlist:activeWatchlist
  };

  fetch('/api/searches/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.ok){currentSearchName=name;loadSavedSearches();showToast('Saved: '+name);}
    else{showToast('Error: '+(res.error||'Unknown'));}
  }).catch(function(e){showToast('Save failed: '+e.message);});
}

function deleteSavedSearch(){
  if(!currentSearchName)return;
  if(!confirm('Delete saved search "'+currentSearchName+'"?'))return;

  fetch('/api/searches/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:currentSearchName})})
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.ok){showToast('Deleted: '+currentSearchName);currentSearchName='';loadSavedSearches();}
    else{showToast('Error: '+(res.error||'Unknown'));}
  }).catch(function(e){showToast('Delete failed: '+e.message);});
}

// ── Init ────────────────────────────────────────────────
addCriteria();
fetch('/api/watchlists').then(function(r){return r.json();}).then(function(wl){
  watchlists=wl;buildWatchlistMenu();
  // Populate scan info
  var total=0;wl.forEach(function(w){w.groups.forEach(function(g){total+=g.tickers.length;});});
  document.getElementById('tickerCount').textContent=total;
  document.getElementById('lastScan').textContent=new Date().toLocaleTimeString('en-GB');
});
loadSavedSearches();
setStickyOffsets();
window.addEventListener('resize',setStickyOffsets);
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.target.matches('select'))runSearch();});

// Scheduler badge updater
function updateSchedulerBadge(){
  fetch('/api/scheduler/status').then(function(r){return r.json();}).then(function(s){
    var badge=document.getElementById('schedulerBadge');
    if(!badge)return;
    var cur=s.current_watchlists||[];
    if(cur.length){badge.textContent='Scanning: '+cur.join(', ');badge.style.color='#f59e0b';badge.style.borderColor='#f59e0b';}
    else if(!s.enabled){badge.textContent='Scheduler: OFF';badge.style.color='#ef4444';badge.style.borderColor='#334155';}
    else{badge.textContent='Scheduler: Idle';badge.style.color='#22c55e';badge.style.borderColor='#334155';}
  }).catch(function(){});
}
updateSchedulerBadge();setInterval(updateSchedulerBadge,30000);
